# Sample packet field spec consumed by the packet-codegen skill.
#
# This is the committed, clean-room shape of a Docs/RE/packets/<name>.yaml file. It is parsed
# by scripts/gen_packet.py with the STDLIB ONLY (a small line-oriented reader), so keep the
# layout flat and simple -- one key per line; fields as `- { name: X, type: Y }` items.
#
# A spec describes the WIRE LAYOUT in neutral terms. It is the ONLY input to codegen; the
# generated struct re-implements it fresh. Nothing here is ever copied from a decompiler.

name: SmsgMovePlayer        # canonical message name -> C# struct name (PascalCase)
opcode: 0x42                # message opcode in hex (must match Docs/RE/opcodes.md)
direction: S2C              # C2S (client->server) or S2C (server->client), client POV
size: 30                    # total payload size in bytes, or 'var' for variable-length
spec: packets/move.yaml     # self path under Docs/RE/ -- cited in the generated header comment

# Optional one-line neutral description; copied into the struct doc comment.
summary: Server broadcasts an actor's new position and heading after a move tick.

# Fields in wire order, top = offset 0. Offsets are implied by Pack=1 (no manual offsets).
# Supported types: u8 i8 u16 i16 u32 i32 u64 i64 f32 f64 | enum:<Name> | bytes[N]
fields:
  - { name: Opcode,   type: u8 }              # 0x00  echoes `opcode:`; const mirror is generated
  - { name: ActorId,  type: u32 }             # 0x01  server-assigned actor id
  - { name: X,        type: f32 }             # 0x05  world X
  - { name: Y,        type: f32 }             # 0x09  world Y
  - { name: Z,        type: f32 }             # 0x0d  world Z
  - { name: Heading,  type: u16 }             # 0x11  facing, 0..65535 mapped to 0..360 deg
  - { name: MoveFlags, type: enum:MoveFlags } # 0x13  enum lives in MartialHeroes.Shared.Kernel
  - { name: Name,     type: bytes[12] }       # 0x14  fixed name buffer -> [InlineArray(12)]

# Notes: differential-analysis evidence (offset -> hypothesis) goes here, pasted from the
# packet-diff skill. This keeps the byte-level provenance traveling with the spec.
notes: |
  Derived by diffing 8 S2C 0x42 packets from stream_3 of the Vasselix capture while the
  test actor walked a straight line.
    offset 0x05 (4B) increments smoothly -> X coordinate (le f32)
    offset 0x11 (2B) constant while walking straight -> Heading
    offset 0x14.. constant 12B -> actor name buffer (ASCII, nul-padded)
