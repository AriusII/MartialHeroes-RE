notes: |
  CODE-CONFIRMED routing + size + record stride, CAPTURE-UNVERIFIED, per-record field roles PLAUSIBLE.
  Total = 476 bytes (0x1DC), read in one block. ONE opcode rebuilds the WHOLE skill/state window AND
  the buff bar; the older raw label "quest data update" on this handler is stale and must be ignored.

  TWO REGIONS:
    1. STAT BLOCK -- payload bytes 0..115 (116 bytes). A player summary that the handler formats into
       ~20 text widgets (level, class/job, PK/peace mode, primary stats, HP/MP, big counters, title
       reference, an actor idkey). The exact widths of the 64-bit reads in this region are not fully
       pinned and several field MEANINGS are PLAUSIBLE, so it is reserved here as one opaque 116-byte
       block. Best-effort sub-offsets WITHIN the stat block (verify before trusting):
         +0x08 (1B) class/job code
         +0x09 (1B) level
         +0x0A (1B) PK/peace mode
         +0x0B (1B) PK / kill count
         +0x0C (1B) sub-class / promote flag
         +0x0D (1B) stance / sign
         +0x0E..+0x18 (u16 x6) primary stats (order unconfirmed)
         +0x1C (8B) a large counter (exp-class number)
         +0x24 (8B) a large counter
         +0x2C (2B) title / rank reference
         +0x30..+0x38 a coordinate / triple region
         +0x40..+0x4C an HP/MP ratio numerator / denominator group
         +0x50 / +0x54 (u32) two numbers
         +0x58 (8B) actor idkey
       These are aids only; the 116 bytes are modelled opaque so the engine reserves the correct span.

    2. ACTIVE-BUFF ARRAY -- 30 fixed records of 12 bytes each, starting at payload offset 116 (0x074),
       running to the end of the block (116 + 30*12 = 476). CODE-CONFIRMED: the array base is payload
       +116 and the stride is 12 bytes for 30 records.

  PER-RECORD LAYOUT (this spec, per the task directive): each 12-byte record is modelled as
    {u32 buffId @+0, i32 paramX @+4, i32 paramY @+8}
  where buffId is the buff/state catalog id (0 = empty slot, skipped by the client), and the two i32
  values are the icon source coordinates / parameters that position the icon cell on the shared state-
  icon atlas. ID CLASS SPLIT (CODE-CONFIRMED branch): a buff id <= 80 draws as a 23x23 "buff" cell and
  flows left-to-right in a counter; an id > 80 draws as a 25x25 "state/debuff" cell at a fixed per-slot
  screen position.

  COMPETING INTERPRETATION OF THE 12-BYTE RECORD (flagged, NOT modelled): a separate analyst reading of
  the receive loop parses the same 12 bytes as {u16 id @+0, u16 @+2, u32 @+4 (a duration / remaining-
  time candidate), u16 @+8 (stack/level), u8 @+10 (a type/category flag), u8 @+11}. Under that reading
  the per-buff icon coordinates are NOT on the wire -- they are looked up CLIENT-SIDE from the
  data/script/buff_icon_position.xdb table (a flat array of 12-byte {u32 id, i32 srcX, i32 srcY}
  records keyed by id) and only the id/stack/duration/flag travel in this packet. Both readings are 12
  bytes and capture-unverified. A capture of a buff-apply event is REQUIRED to decide which 12-byte
  record shape is correct; the engine should treat the buffId field as reliable and the two trailing
  i32 values as provisional.

  RESET + SERVER-DRIVEN STACKING (CODE-CONFIRMED behaviour): before consuming the array the handler
  clears and HIDES all 30 buff slots and resets the flow counter, then re-shows only the records whose
  id is non-zero. The client does no client-side expiry between packets -- a buff disappears only when
  the next 4/102 omits it. So the server fully owns which buff sits in which slot.

  ICON RENDERING (asset facts, NOT wire fields; for the asset/godot engineers): icons are cells of the
  shared atlas data/ui/skillicon/stateicon.dds (512x512). Per-buff icon UV is data-driven: either it
  arrives in this packet (the {id, X, Y} reading) or it is resolved from buff_icon_position.xdb by id
  (the {id, ..., duration} reading). Cell size 23x23 for buff ids <= 80, 25x25 for state ids > 80.

  UNKNOWNS to resolve with a buff-apply capture (verify FIRST):
    - which 12-byte record shape is correct ({id, X, Y} vs {id, ?, duration, stack, flag});
    - confirm the stat-block sub-offsets and the 64-bit field widths in bytes 0..115;
    - confirm record base = payload + 116 (that payload[116] is the first buff id, and bytes 112..115
      belong to the stat block, not the buff array);
    - the buff/state id boundary at 80 (true catalog partition vs an array-bound guard);
    - the duration unit (ms vs s) if the duration reading holds.

  RELATED: 5/31 SmsgBuffSlotUpdate is a separate per-slot buff push (not specced here). UNBLOCKS the
  buff-bar / skill-state window rebuild in Client.Application and the buff-icon render in the Godot
  presentation layer (server owns slot assignment; clear+hide all 30, re-show active).
