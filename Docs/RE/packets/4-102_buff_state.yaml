name: SmsgSkillWindowStateUpdate   # canonical name (names.yaml); this message is the buff/state-bar snapshot
opcode: 0x40066           # major 4 (Response), minor 102 -> (4 << 16) | 102
direction: S2C
size: 476                # fixed 476-byte payload block (0x1DC)
spec: packets/4-102_buff_state.yaml
status: hypothesis
capture_verified: false

summary: Server pushes the full skill/state window snapshot in one fixed 476-byte block. The first 116 bytes are a player stat block (level, class, primary stats, HP/MP, big counters); the remaining bytes are 30 fixed 12-byte active-buff records. The handler clears and hides all 30 buff slots, then re-shows only the active ones, so buff stacking is entirely server-driven.

# Wire order, offset 0 = first payload byte. Pack=1; widths sum to size: 476.
# Layout = 116-byte stat-block head (modelled opaque, sub-offsets in notes; field MEANINGS PLAUSIBLE)
# + 30 active-buff records of 12 bytes each (116 + 30*12 = 476). The buff-record stride and the
# +116 record-array base are CODE-CONFIRMED; the per-record field roles follow the task directive
# (id + two coords) with the analyst's alternative interpretation flagged in notes.
