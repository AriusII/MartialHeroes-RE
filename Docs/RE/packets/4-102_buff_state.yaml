name: SmsgSkillWindowStateUpdate   # canonical name (names.yaml); this message is the buff/state-bar snapshot
opcode: 0x40066           # major 4 (Response), minor 102 -> (4 << 16) | 102
direction: S2C
size: 476                # fixed 476-byte payload block (0x1DC)
spec: packets/4-102_buff_state.yaml
status: hypothesis
capture_verified: false

summary: >
  Server pushes the full skill/state window snapshot in one fixed 476-byte block. The first 116 bytes
  are a player stat block (level, class, primary stats, HP/MP, big counters); the remaining bytes are
  30 fixed 12-byte active-buff records. Each 12-byte record carries {u16 id@+0, u16 gap@+2, u32@+4,
  u16@+8, u8@+10, u8 pad@+11} (CYCLE 14 deep-verify confirmed). The handler clears and hides all 30
  buff slots, then re-shows only the active ones, so buff stacking is entirely server-driven.

# Wire order, offset 0 = first payload byte. Pack=1; widths sum to size: 476.
# Layout = 116-byte stat-block head (modelled opaque, sub-offsets in notes)
# + 30 active-buff records of 12 bytes each (116 + 30*12 = 476).
# Per-record layout (CYCLE 14 deep-verify, f61f66a9 CONFIRMED):
#   {u16 id@+0, u16 gap@+2, u32@+4, u16@+8, u8@+10, u8 pad@+11}
# The prior {u32 BuffId, i32 X, i32 Y} model is REFUTED by the binary consume loop.
