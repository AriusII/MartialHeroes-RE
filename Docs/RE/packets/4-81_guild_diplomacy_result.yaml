#
# VERIFICATION BANNER
#   verification: confirmed  (opcode->handler routing and the leading status@+0x08 / error@+0x09 reads,
#                 plus the two extra-byte sub-cases (0x15 reads a seconds value formatted mm:ss; 0x17
#                 reads a server-config percent) are control-flow-confirmed; every VALUE meaning is
#                 capture/debugger-pending)
#   ida_reverified: 2026-06-20
#   ida_anchor: 263bd994
#   evidence: [static-ida]
#   conflicts: BINARY-WINS NAME CORRECTION. Response slot 81 was catalogued here as
#              SmsgGuildDiplomacyResult. The binary shows slot 81 is the CROSS-DOMAIN generic
#              SmsgActionErrorResult (action-error / cooldown feedback), NOT a guild-diplomacy reply. The
#              guild-diplomacy verdict rides 4/61 SmsgGuildStateChangeResult
#              (packets/4-61_guild_state_change_result.yaml). The "submitDiplomacy" string is a SEND-side
#              debug log in the 2/81 builder's caller, not a receive handler. (Filename retained;
#              CONTENT corrected.)

name: SmsgActionErrorResult
opcode: 0x40051           # major 4 (Response), minor 81 -> (4 << 16) | 81
direction: S2C
size: var                 # leading status/error region; two sub-cases consume an extra trailing byte/word
spec: packets/4-81_guild_diplomacy_result.yaml
status: hypothesis
capture_verified: false

summary: A generic, cross-domain action-error / feedback result. Carries a status byte and an error code; a value of 0xFF selects a default notice, while specific error codes consume an extra trailing field (one a seconds value formatted as an mm:ss cooldown, the other a server-config percent). Not tied to any one subsystem; used wherever a server action needs a generic error/cooldown reply.

# The leading status/error region is described below; the extra trailing bytes are sub-case-dependent
# (see notes). All offsets are payload-relative (frame +8).
fields:
  - { name: Head,   type: "bytes[8]" }   # 0x00  leading region read before the status/error bytes (opaque; not decoded)
  - { name: Status, type: u8 }           # 0x08  status byte
  - { name: Error,  type: u8 }           # 0x09  error / result code (0xFF => default notice; some codes consume an extra trailing field)

notes: |
  CONTROL-FLOW CONFIRMED routing (the result handler is installed in the Response dispatch table) and
  the status/error read offsets. CAPTURE-UNVERIFIED for the VALUE meanings. The body is mostly the
  leading status/error region; only two error codes consume an extra trailing field.

    0x08 (1B) Status : a status byte (the leading result/state of the generic action).
    0x09 (1B) Error  : an error / result code. The handler maps codes to notice-string ids; a value of
                       0xFF selects a generic/default notice. Two specific codes consume an extra
                       trailing field:
                         - one code (0x15) reads a SECONDS value at the next offset and formats it as an
                           mm:ss cooldown;
                         - another code (0x17) reads a SERVER-CONFIG PERCENT value.
                       The remaining codes resolve to fixed notice strings with no extra field.

  GENERIC / CROSS-DOMAIN: this is NOT a guild-specific reply. It is the shared action-error / cooldown
  feedback used across subsystems. (Guild diplomacy/state outcomes ride 4/61
  SmsgGuildStateChangeResult.)

  STATIC-CONFIRMED ERROR -> NOTICE-STRING MAP (message-database keys, NOT addresses):
    1->21074, 2->21075, 3->21076, 4->21077, 5->2163, 6->21097, 7->2164, 8->2165,
    9->2166, 0xA->2167, 0xB->2168, 0xC->2169 (+ extra UI call), 0xD->2170, 0xE->2171,
    0xF->51016, 0x10->51017, 0x11->51018+51019, 0x12->51020, 0x13->51023, 0x14->51019,
    0x15->mm:ss (reads seconds byte @+0x0A; string id 51024 with minutes / 51025 without),
    0x17->percent (reads server-config percent, no wire byte; string id 51029),
    0x18->51033, default->no-op.
  (Status @+0x08 == 1 -> success forward: passes body+8 onward to an action sub-handler; if
   Error byte == 100 (0x64) it additionally shows message id 51026. Error == 255 (0xFF) ->
   generic default notice, string id 21078.)

  UNKNOWNS to resolve with a capture:
    - value meanings for each Error code in context;
    - the internal fields of the 8-byte leading Head region.

  IMPLEMENTATION NOTE: decode Status + Error; for the two extra-byte codes read the trailing seconds /
  percent field; otherwise the body ends at the error byte's notice resolution.

  RELATED: the guild-diplomacy declare round-trip is C2S 2/81 CmsgGuildDiplomacyDeclare ->
  S2C 4/61 SmsgGuildStateChangeResult (packets/4-61_guild_state_change_result.yaml) -- a DIFFERENT
  opcode from this generic action-error result.
