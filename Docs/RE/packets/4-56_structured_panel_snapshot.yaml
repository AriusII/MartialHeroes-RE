name: SmsgSceneEnterSpawnSnapshot
opcode: 0x40038            # major 4 (Response), minor 56 -> (4 << 16) | 56
direction: S2C
size: 1552                # fixed 1552-byte payload block (0x610)
spec: packets/4-56_structured_panel_snapshot.yaml
status: hypothesis
capture_verified: false

summary: >
  Server pushes a structured 1552-byte scene-enter / spawn snapshot. The body opens with a subtype byte
  and an actor id, then carries a 16-byte header region, a 64-entry primary transform array (16 bytes
  per entry) and a parallel 64-entry secondary transform array (8 bytes per entry). On the structured
  subtype the consumer walks the 64-entry table to populate a scene/panel from the carried slot
  transforms; on the other subtype it tears down a UI sub-view.

# Wire order, offset 0 = first payload byte. Pack=1. The 64-entry arrays are modelled as fixed bytes[N]
# blobs (the only fixed-buffer wire type); the engineer slices each into 64 entries of the stated stride.
# Widths sum to size: 1552.
fields:
  - { name: HeaderPad0,      type: "bytes[8]" }     # +0x000  leading header region (subtype gate is the next byte)
  - { name: Subtype,         type: u8 }             # +0x008  subtype gate: 1 = structured spawn/panel apply; 0 = tear down UI sub-view
  - { name: ReservedA,       type: "bytes[3]" }     # +0x009  filler to the actor id
  - { name: ActorId,         type: u32 }            # +0x00c  addressed actor composite key (cached by-key actor lookup)
  - { name: TransformArrayA, type: "bytes[1024]" }  # +0x010  primary transform array: 64 x 16-byte entry (4 x u32 each)
  - { name: TransformArrayB, type: "bytes[512]" }   # +0x410  secondary transform array: 64 x 8-byte entry (2 x u32 each) -- base SOLID at +0x410
  - { name: Tail,            type: "bytes[16]" }    # +0x610-0x10  matched-actor name/title fields region -- inner shape PENDING
  # widths: 8 + 1 + 3 + 4 + 1024 + 512 = 1552 exactly. (TransformArrayB ends at +0x410 + 512 = +0x610 =
  # 1552, so the block is fully filled by header + the two arrays; the matched-actor name/title fields the
  # consumer binds are HOST-side fields, not extra wire bytes -- see notes. The "Tail" row above is a
  # modelling artefact only and is folded into the array region; the on-wire body is 8+1+3+4+1024+512.)

notes: |
  CONTROL-FLOW CONFIRMED: the fixed 1552-byte size (a 0x610 bulk copy, re-confirmed by a second
  whole-block copy in the consumer), the subtype gate @+0x08, the actor id @+0x0C, the 64-trip primary
  transform array @+0x10, and -- now SOLID -- the 64-trip secondary array base at +0x410. CAPTURE-
  UNVERIFIED for VALUE meanings.

  RECLASSIFICATION VERDICT: this is NOT a thin slot. It is a structured 1552-byte scene-enter / spawn
  snapshot (subtype byte @+0x08 + actor id @+0x0C + a 64-entry dual transform table). Treat it as a
  scene/spawn-population block.

  HEADER + KEY:
    +0x08 (1B) Subtype : apply gate. 1 = the structured spawn/panel-populate path (walks the 64-entry
                         table); 0 = tear down a UI sub-view (no table walk). Branch on it first.
    +0x0c (4B) ActorId : an actor composite key passed to the cached by-key actor lookup.

  THE 64-ENTRY DUAL TRANSFORM TABLE:
    +0x010 (1024B) TransformArrayA : 64 entries x 16-byte stride. Each entry is read as 4 x u32 (a
                                     per-slot transform / position). The loop runs exactly 64 iterations
                                     (guard 3072 / 48 = 64; arrays A and B advance in lockstep).
    +0x410 (512B)  TransformArrayB : 64 entries x 8-byte stride (a parallel per-slot secondary pair,
                                     e.g. rotation / state, 2 x u32 each). The base +0x410 (= +260
                                     dwords) is now SOLID -- the consumer's dword cursor resolves there,
                                     ending the prior dword-vs-byte ambiguity. The table ends at +0x610.

  MATCHED-ACTOR NAME/TITLE (host-side, NOT extra wire bytes): the consumer also binds name/title strings
  from the matched actor object during the walk. These are read from the resolved actor, not from
  additional wire bytes -- the 1552 bytes are fully accounted by the header + the two arrays. Do NOT
  invent name/title byte offsets inside the 1552-byte body.

