notes: |
  Static inference only; no capture available. CODE-CONFIRMED layout (21 bytes), CAPTURE-UNVERIFIED
  meaning.

    0x00 (20B) SearchName : the NPC name to search for, encoded CP949, NUL-padded to 20 bytes.
    0x14 (1B)  Pad        : trailing padding byte, expected zero.

  RELATION TO 0x20086: this opcode is the name-only counterpart to CmsgNpcSearchById (0x20086).
  Where 0x20086 supports dual-mode search (by id or by name), this opcode always searches by
  name and carries a wider 20-byte name field (vs 17 bytes in the dual-mode packet).

