# Clean-room field spec. Promoted from a neutral analyst note; rewritten, not copied.
# CAPTURE-UNVERIFIED: every offset below is a static inference. capture_verified: false.

name: CmsgPartyInvite
opcode: 0x20023           # major 2 (GameAction), minor 35 -> (2 << 16) | 35
direction: C2S
size: 8                  # fixed 8-byte payload built by the shared social-op sender
spec: packets/2-35_party_invite.yaml
status: hypothesis
capture_verified: false

summary: Client party invite / accept request. Carries a 1-byte mode selector and a 4-byte target actor id. Issued from the right-click target menu and the party panel context menu; the server replies in the 4/35 PartyInviteState / 4/76 PartyAcceptResult family.

# Wire order, offset 0 = first payload byte. Pack=1; the widths sum to size: 8.
fields:
  - { name: Mode,    type: u8 }          # 0x00  operation selector (see notes)
  - { name: Pad0,    type: "bytes[3]" }    # 0x01  filler to the next dword; written from uninitialised stack, treat as zero
  - { name: TargetId, type: u32 }        # 0x04  target actor id the invite is directed at

notes: |
  Static inference only; no capture available. CODE-CONFIRMED layout, CAPTURE-UNVERIFIED meaning.
  This message is one instance of a single shared 8-byte "social op" payload shape reused by the
  party/trade/guild senders: a 1-byte mode at offset 0, three filler bytes, then a 4-byte value at
  offset 4. The three bytes at 0x01..0x03 are alignment filler the builder leaves uninitialised on
  the stack -- write them as zero and ignore them on read.

    0x00 (1B) Mode     : operation selector.
                           0 = accept / commit (sent when the timed confirm popup is accepted, i.e.
                               the recipient agreeing to join);
                           2 = issue invite (opens the timed right-click confirm popup on the target
                               and sends the invite).
                         Modes 0 and 2 are the two observed send-path values. Decline / cancel modes
                         (likely 1 and/or 3, by analogy with the trade and leave/kick ops) are
                         PLAUSIBLE but were NOT seen on a send path; do not rely on them.
    0x04 (4B) TargetId : the actor id the party action addresses (le u32). For mode 2 this is the
                         invitee's actor id; for mode 0 it is the responder/committing actor id.

  CONTEXT (client-side gates, not wire fields): before sending, the client resolves the target id
  and applies a self-target guard (it refuses to act on its own actor id and shows a "self-target"
  notice instead of sending). Mode 2 additionally opens a timed confirmation popup (an 8000 ms
  countdown) keyed by the party interaction context code; that timer and popup are purely a client
  UX layer and do not change the bytes on the wire.

  RELATIONSHIP: shares the exact 8-byte shape with 2/23 (trade request), 2/30 (guild op), 2/36
  (party leave/kick) and 2/37 (party leader op). Server-side party state is pushed back via 4/35
  (PartyInviteState), 4/76 (PartyAcceptResult) and 5/21 (PartyRosterEvent).

  UNKNOWNS to resolve with a capture of an invite -> accept and an invite -> decline:
    - the full Mode enum (whether decline/cancel are 1, 3, or another value);
    - whether the Pad0 bytes ever carry meaningful data (believed always zero).

  UNBLOCKS: Client.Application party-invite use-case.
