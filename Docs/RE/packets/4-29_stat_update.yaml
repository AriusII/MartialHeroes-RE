#
# VERIFICATION BANNER
#   verification: confirmed  (opcode->handler routing, the single 36-byte read, the ResultOk@0x08
#                 gate, the five contiguous u32 stat stores @0x0C..0x1C, and RemainingStatPoints@0x20
#                 (six u32 stores total) are control-flow-confirmed); field VALUE semantics
#                 (Handle vs SessionToken split @0x00/@0x04, the three bytes @0x09) are
#                 capture/debugger-pending (no live capture this campaign).
