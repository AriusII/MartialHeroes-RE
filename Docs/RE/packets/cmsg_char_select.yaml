# Clean-room field spec. Promoted from a neutral analyst note; rewritten, not copied.
# CAPTURE-UNVERIFIED field internals; size + builder identity + the two select sub-modes are
# static-HIGH; the mode-byte VALUE meaning (select-and-play vs slot-lock) is capture/debugger-pending.
# capture_verified: false.
#
# VERIFICATION (CYCLE 4 W1.3 re-confrontation -- the binary wins):
#   routing+size:        confirmed   (control-flow: the builder writes header 1/7 + appends a fixed 2-byte body)
#   field split:         confirmed   ([u8 slot][u8 mode]; both emit sites build the same 2-byte body)
#   mode-byte LITERALS:  confirmed   (site A "play/select this character" writes mode = 1; site B the
#                        slot-lock/pre-play path writes mode = 0)
#   delete-mode reading: REFUTED     (both call sites are character-SELECT paths -- there is no delete
#                        verb, no delete payload, and no "mode==1 means delete" semantic in either
#                        emitter; the earlier "{slot,1} = delete" reading is corrected)
#   wire VALUE semantics: capture/debugger-pending (the runtime meaning of mode 1 vs mode 0)
#   ida_reverified: 2026-06-20   ida_anchor: 263bd994   evidence: [static-ida]
#   conflicts: SUPERSEDES the earlier "CmsgManageCharacter / delete-overload" reading of this file --
#              1/7 is CmsgSelectCharacterSlot, NOT a delete carrier. See "DELETE RESOLUTION" below.

name: CmsgSelectCharacterSlot
opcode: 0x10007           # major 1, minor 7 -> (1 << 16) | 7
direction: C2S
size: 2                   # fixed 2-byte payload
spec: packets/cmsg_char_select.yaml
status: confirmed
capture_verified: false

summary: >
  Character-select / slot-confirm commit on the character-select screen -- a 2-byte body of a slot
  index plus a MODE byte that distinguishes two select sub-actions on the same connection. The
  "play / select this character" confirm path sends mode 1; the slot-lock / pre-play confirm path
  sends mode 0. Both emit sites live in the character-select command handler and are SELECT paths.
  The earlier "1/7 = delete-mode" reading is REFUTED: there is no delete payload, no delete verb,
  and no "mode==1 means delete" semantic in either emitter. On this build there is NO dedicated
  major-1 character-delete opcode -- delete outcomes ride the server's major-3 result ladder (3/7
  SmsgCharManageResult subtype 2). The builder sets the select-window in-flight latch while the
  request is outstanding.

# Wire order, offset 0 = first payload byte. Pack=1; the widths sum to size: 2.
fields:
  - { name: SlotIndex, type: u8 }   # 0x00  selected character slot (0..4; the highlighted/committed slot)
  - { name: Mode,      type: u8 }   # 0x01  select sub-mode: 1 = select-and-play, 0 = slot-lock (value meaning capture/debugger-pending)

notes: |
  Static analysis only; no capture. Frame = 8-byte header + 2 = 10 bytes on the wire. Width sum
  check: 1 + 1 = 2.

    0x00 (1B) SlotIndex : the chosen/committed character slot index (0..4), taken from the window's
                          committed-slot field. STATIC HIGH.
    0x01 (1B) Mode      : a select sub-mode byte. Two emit sites build the identical 2-byte body and
                          differ ONLY in this byte:
                            - Site A (command id 6, the "play / select this character" confirm):
                              writes the literal 1.
                            - Site B (command id 54, the slot-lock / pre-play confirm path):
                              writes the literal 0.
                          The mode-byte LITERALS (1 vs 0) are confirmed; their runtime MEANING
                          (select-and-play vs slot-lock) is capture/debugger-pending.

  DELETE RESOLUTION (load-bearing, binary-won): 1/7 is NOT a delete carrier. Both emit sites are
  character-SELECT code paths (the slot-pick confirm in the character-select window), not deletion
  code. On this build there is NO dedicated C2S character-delete opcode in the major-1 family;
  character removal is a server-side decision surfaced by the major-3 char-mgmt result ladder
  (3/7 SmsgCharManageResult subtype 2 = delete-confirmed; see packets/3-7_char_manage_result.yaml).
  This corrects the earlier "delete overloads 1/7 with mode byte" reading.

  CONTRACT / SEQUENCE: Request -> Response. Each site guards on the per-window "already-sending" UI
  flag, plays a 2D cue, sets the committed-slot field, then calls the builder. The builder appends
  the 2 bytes, sends, and SETS the in-flight latch. The select-screen result returns on the major-3
  ladder (3/7 SmsgCharManageResult is the natural char-manage result; 3/4 SmsgSceneEntityUpdate and
  3/1 SmsgCharacterList also clear the shared latch). The precise success minor is
  capture/debugger-pending. World entry itself is then driven by 1/9 CmsgEnterGameRequest
  (packets/cmsg_char_enter.yaml).

  UNKNOWNS (capture/debugger required):
    - the runtime meaning of mode 1 (select-and-play) vs mode 0 (slot-lock);
    - which major-3 result the server returns for each mode (none is a dedicated per-opcode reply).

  RELATED major-1 char-management builders: 1/0 logout (cmsg_logout.yaml), 1/6 create
  (cmsg_char_create.yaml), 1/9 enter (cmsg_char_enter.yaml), 1/13 rename (cmsg_char_rename.yaml),
  1/14 slot-move (cmsg_char_move.yaml). All five payload-carrying builders set the single
  select-window in-flight latch; 1/0 logout does not.

  UNBLOCKS: Client.Application SelectCharacter use-case (the select-screen slot commit; result via
  the major-3 char-mgmt ladder).
