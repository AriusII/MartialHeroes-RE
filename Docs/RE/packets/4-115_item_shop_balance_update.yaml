#
# VERIFICATION BANNER
#   verification: confirmed  (opcode->handler routing and the fixed 24-byte (0x18) body -- Header[8]@0,
#                 Success u8@+0x08, FailCode u8@+0x09, Pad[2]@+0x0A, Gold i64@+0x0C (low/high dwords),
#                 Points u32@+0x14 -- are control-flow-confirmed)
#   ida_reverified: 2026-06-24
#   ida_anchor: 263bd994
#   ida_reverified: 2026-06-27 (CYCLE 14 deep-verify)   ida_anchor: f61f66a9   evidence: [static-ida]
#     -- CYCLE 14 deep-verify (f61f66a9): body layout re-traced against handler, 4 fields re-confirmed SAME
#        (Success@8, FailCode@9, Gold i64@0xc low/high, Points@0x14), 0 corrected.
#   conflicts: none.

name: SmsgItemShopBalanceUpdate
opcode: 0x40073           # major 4 (Response), minor 115 -> (4 << 16) | 115
direction: S2C
size: 24                  # 0x18-byte handler read
spec: packets/4-115_item_shop_balance_update.yaml
status: confirmed
capture_verified: false

summary: The NPC vendor gold/points balance refresh. Commits the carried balance fields onto the local player and refreshes the item-shop panel.

fields:
  - { name: Header,      type: "bytes[8]" }   # 0x00 Opaque header/echo region
  - { name: Success,     type: u8 }           # 0x08 1 = success, 0 = failure
  - { name: FailCode,    type: u8 }           # 0x09 Fail code index mapped to shop error messages
  - { name: Pad0,        type: "bytes[2]" }   # 0x0a Alignment padding
  - { name: Gold,        type: i64 }          # 0x0c Player's gold balance (64-bit integer, low/high words at 0x0c/0x10)
  - { name: Points,      type: u32 }          # 0x14 Player's cash/points balance (32-bit integer at 0x14)

notes: |
  The handler reads a fixed 24-byte body. Frame = 8-byte header + 24 = 32 bytes on the wire.
  Gold is committed onto the local player via the player gold-setter (using its low/high parts), and Points via the player points-setter.
