# Clean-room field spec. Promoted from a neutral analyst note; rewritten, not copied.
# ROUTING: Response table-driven (major-4 / minor-13).
# size: 56 bytes (0x38) fixed-size block read via PacketBuffer_ReadField.
#
# VERIFICATION BANNER
#   verification: confirmed  (56-byte read, the (TargetSort, TargetId) local-player gate, the
#                 X/Y/Z/Heading floats, the sync-mode byte position, and the tail
#                 QwordValue/DwordValue1 destinations are control-flow-confirmed on IDB SHA 263bd994;
#                 field VALUE semantics are capture/debugger-pending)
#   ida_reverified: 2026-06-22   ida_anchor: 263bd994   evidence: [static-ida]
#   ida_reverified: 2026-06-27 (CYCLE 14 deep-verify)   ida_anchor: f61f66a9   evidence: [static-ida]
#     -- CYCLE 14 deep-verify (f61f66a9): body layout re-traced against handler, 8 fields re-confirmed SAME
#        (TargetSort@0, TargetId@4, X@16, Z@20, Mode@33/0x21, QwordValue@36, DwordValue1@44,
#        DwordValue2@48, ArgValue@52), 0 corrected.
#   readiness: IMPLEMENTATION-READY (control-flow-confirmed; capture-pending items are NON-blocking runtime residuals)
#   conflicts: CORRECTED (CYCLE 12 / Phase 3, counter-confirmed on 263bd994) -- the sync-mode byte is
#              consumed at wire offset 33 (0x21), NOT 32. Wire bytes 24..32 are an unconsumed reserved
#              gap; the handler reads exactly one byte for Mode, at +0x21. The prior "Mode @ offset 32"
#              reading is REFUTED by the binary.

name: SmsgLocalPlayerStateSync
opcode: 0x4000d           # major 4 (Response), minor 13 -> (4 << 16) | 13
direction: S2C
size: 56                  # fixed 56-byte payload (0x38)
spec: packets/4-13_local_player_state_sync.yaml
status: confirmed
capture_verified: false

summary: >
  Local player state synchronization. Broadcasts movement coords, orientation/heading,
  current player stance/mode, and portal check updates. Only processed if it references
  the local player actor.

fields:
  - { name: TargetSort, type: u32, offset: 0 }      # target actor sort key (must be 1 for player)
  - { name: TargetId, type: u32, offset: 4 }        # target actor ID (must match local player ID)
  - { name: Y, type: f32, offset: 8 }               # world Y coordinate (ignored by client)
  - { name: Heading, type: f32, offset: 12 }         # heading / yaw orientation
  - { name: X, type: f32, offset: 16 }              # world X coordinate
  - { name: Z, type: f32, offset: 20 }              # world Z coordinate
  - { name: Reserved18, type: "u8[9]", offset: 24 } # unconsumed reserved gap (wire bytes 24..32 are read into the buffer but never consumed by the handler)
  - { name: Mode, type: u8, offset: 33 }            # sync mode @ +0x21: 0 = set-position, 1 = BattleController sync, 5 = no state write
  - { name: Padding, type: "u8[2]", offset: 34 }    # struct alignment padding to the next dword
  - { name: QwordValue, type: i64, offset: 36 }     # sync timeline / budget value stored to LocalPlayer +176
  - { name: DwordValue1, type: u32, offset: 44 }    # sync value stored to LocalPlayer +184
  - { name: DwordValue2, type: u32, offset: 48 }    # sync value stored to a global sync-state dword
  - { name: ArgValue, type: u32, offset: 52 }       # passed to the post-sync update helper if Mode is nonzero

notes: |
  Static analysis only; no capture available.

  CONFLICT RESOLUTION (CYCLE 12 / Phase 3, binary won): the sync-mode byte sits at wire offset 33
  (0x21), not 32. The handler reads the 56-byte body into one buffer and consumes a single byte at
  +0x21 as the mode discriminator; the nine bytes at wire 24..32 are read into the buffer but never
  consumed (an unconsumed reserved gap). Field widths still sum to 56
  (4+4+4+4+4+4 + 9 + 1 + 2 + 8 + 4 + 4 + 4 = 56).

  BEHAVIOUR:
    - Verifies that the composite key (TargetSort, TargetId) matches the local player.
    - Resolves the new cell coordinates from (X, Z).
    - If the client's current location delta is greater than 40000 (distance squared, i.e., > 200 units),
      it snaps/teleports the player to (X, 0, Z) immediately and resets visual animations.
    - If Mode is 1, updates BattleController battle/stance state indicators.
    - Checks for nearby portal triggers and sends a teleport/portal activation request if within range.
