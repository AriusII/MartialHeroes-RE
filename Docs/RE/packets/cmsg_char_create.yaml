# Clean-room field spec. Promoted from neutral analyst notes; rewritten, not copied.
# Intra-payload offsets now CORROBORATED static-HIGH (independent two-analyst + arbitration re-derivation,
# CYCLE 11 / Block A). Wire VALUES of the appearance words remain capture-pending. capture_verified: false.
#
# VERIFICATION (CYCLE 11 / Block A re-verify):
#   routing+size:        confirmed   (control-flow: builder writes header 1/6 + appends a fixed 0x34 = 52-byte body)
#   Name@0x00 placement: confirmed   (the validated name is string-copied to body offset 0 at create-confirm)
#   intra-body offsets:  confirmed   (CORROBORATED: the create-form per-control stores, the stat steppers, and the
#                        wire-append all reference ONE contiguous 52-byte staging region; field stores read at
#                        native word/dword widths -> little-endian; re-derived independently and cross-checked)
#   class remap:         confirmed   (UI button index -> internal class id = {0->4, 1->1, 2->3, 3->2})
#   point-buy:           confirmed   (budget 5; all five stats floor 10; clamp [10,15]; invariant sum(stats)+points=55)
#   wire VALUE semantics: capture/debugger-pending (sex-vs-appearance distinction @0x14/0x16; per-stat semantic order)
#   ida_reverified: 2026-06-22   ida_anchor: 263bd994   evidence: [static-ida]
#   conflicts: RESOLVED -- the prior "fifth stat opens with a smaller floor" reading is REFUTED by the binary;
#              all five stats open at 10 with floor 10, and the value "5" is the points budget, not a low-floor stat.

name: CmsgCreateCharacter
opcode: 0x10006           # major 1, minor 6 -> (1 << 16) | 6
direction: C2S
size: 52                  # fixed 52-byte (0x34) appearance/creation record
spec: packets/cmsg_char_create.yaml
status: confirmed
capture_verified: false

summary: >
  Character-create request. The single emitter is the create-confirm action of the
  character-select window's create sub-form (an in-place transient sub-state of the same window
  object, NOT a separate scene). It blits a 52-byte embedded character appearance/creation record:
  CP949 name at offset 0, then face, two appearance words, the INTERNAL class id (a remap of the UI
  class-button index), five allocatable stats, and a trailing remaining-points counter. The
  "1/6 login-or-create collision" is RESOLVED: 1/6 is char-create ONLY. The login credential is a
  separate sub-opcode on the secure 1/4 frame (packets/login.yaml). Server replies with the create
  result and may refresh the slot list via the 8-byte manage-result handler (3/7).

# Wire order, offset 0 = first payload byte. Pack=1, little-endian; widths sum to size: 52.
# The field split is recovered from the create-form staging buffer: the form edits write each control's
# value directly into this 52-byte region; the validated name is copied to offset 0 at confirm; the stat
# steppers mutate the dword run in place; the wire builder appends the whole region unchanged. All three
# views reference the SAME contiguous 52-byte region (corroborated this cycle).
fields:
  - { name: Name,            type: "bytes[18]" }  # 0x00  18B CP949 name, NUL-padded; min 2 chars, cap 17+NUL
  - { name: Face,            type: u16 }          # 0x12  face index, range 1..7
  - { name: AppearanceA,     type: u16 }          # 0x14  appearance word (init 1; class-implied; semantics UNVERIFIED)
  - { name: AppearanceB,     type: u16 }          # 0x16  appearance word (init 0; semantics UNVERIFIED)
  - { name: ClassInternalId, type: u16 }          # 0x18  INTERNAL class id (button->internal remap)
  - { name: Reserved1A,      type: "bytes[2]" }   # 0x1A  alignment gap before the dword-aligned stat block
  - { name: Stat0,           type: u32 }          # 0x1C  allocatable stat 0 (init 10)
  - { name: Stat1,           type: u32 }          # 0x20  allocatable stat 1 (init 10)
  - { name: Stat2,           type: u32 }          # 0x24  allocatable stat 2 (init 10)
  - { name: Stat3,           type: u32 }          # 0x28  allocatable stat 3 (init 10)
  - { name: Stat4,           type: u32 }          # 0x2C  allocatable stat 4 (init 10)
  - { name: PointsRemaining, type: u32 }          # 0x30  remaining allocation budget (init 5)

notes: |
  Static analysis for the intra-payload layout (no capture, no debugger read), but now CORROBORATED:
  the offsets/widths/inits below were re-derived by two independent analysts and cross-checked against
  the window block-copy layout. Frame = 8-byte header + 52 = 60 bytes on the wire.
  Width sum check: 18 + 2 + 2 + 2 + 2 + 2 + 4*5 + 4 = 52.

  STATIC-HIGH (CONFIRMED) facts:
    - Total body size = 52 bytes (0x34). The create-form staging region spans a contiguous 52-byte
      run; the byte immediately after the run is the in-flight latch, confirming the run length.
    - The CP949 character NAME occupies offset 0 (the validated name is string-copied there at
      create-confirm; the staging copy is capped at 17 chars + terminator; minimum length 2).
    - The class word at 0x18 is the INTERNAL class id, not the UI button index. The UI class buttons
      0..3 map to internal ids by the remap {0->4, 1->1, 2->3, 3->2}, written as explicit per-branch
      constants (not arithmetic). The preview-actor visual switch keys on this internal value.
    - The five stat values form a contiguous dword run at 0x1C..0x2F, followed by the remaining-points
      counter at 0x30. All five stats initialize to 10; the points budget initializes to 5.
    - Multi-byte fields are stored at native word/dword widths with no byte-swap -> little-endian.
    - Single emitter: the create-confirm control of the select-window create sub-form.

  POINT-BUY ARITHMETIC (CONFIRMED): budget = 5 points; every stat starts at 10. A "+" step requires
  PointsRemaining > 0, then decrements the budget and increments the stat. A "-" step requires
  PointsRemaining < 5 AND the stat strictly above its floor, then increments the budget and decrements
  the stat. The per-stat floor is 10 (for an internal class in {1,2,3,4}, which the four create buttons
  always satisfy). Each stat clamps to [10, 15]. Invariant: sum(Stat0..Stat4) + PointsRemaining = 55.
  CORRECTION vs the prior note: there is NO "fifth stat with a smaller floor" -- all five stats share
  floor 10; the value 5 is the points budget. (Binary-won correction, CYCLE 11 / Block A.)

  FIELD NOTES:
    0x00 (18B) Name            : CP949 name, NUL-padded into the 18-byte field. Decode as a fixed
                                 [InlineArray] blob, trim at the first NUL, then decode CP949 -- never
                                 a managed string on the wire. CONFIRMED placement.
    0x12 (2B)  Face            : face index, clamped 1..7 by the face +/- controls. CONFIRMED.
    0x14 (2B)  AppearanceA     : seeded to 1 when the form opens; not user-stepped on the create path
                                 (appears class-implied). Semantics UNVERIFIED (capture-pending).
    0x16 (2B)  AppearanceB     : zeroed when the form opens. Semantics UNVERIFIED (appearance index or
                                 reserved/pad) -- capture-pending.
    0x18 (2B)  ClassInternalId : INTERNAL class id. CONFIRMED remap {0->4, 1->1, 2->3, 3->2}.
    0x1A (2B)  Reserved1A      : alignment gap so the stat block starts dword-aligned at 0x1C. Not
                                 written on the create path -- model as reserved/zero; the actual
                                 on-wire bytes (possible stale residue) are capture-pending (UNVERIFIED).
    0x1C..0x2F Stat0..Stat4    : five allocatable stat values (u32). Floor 10, clamp [10,15], spent
                                 against PointsRemaining. CONFIRMED placement + bounds; the precise
                                 per-stat semantic order is capture/debugger work.
    0x30 (4B)  PointsRemaining : the trailing allocation budget (init 5). CONFIRMED placement; whether
                                 the server re-validates it is UNVERIFIED.

  CLIENT-SIDE NAME VALIDATION (applied before send; useful for a faithful server too): minimum
  length 2; allowed = ASCII lowercase a-z + digits 0-9 + CP949 double-byte Hangul lead+trail pairs;
  standalone uppercase Latin is rejected (uppercase A-Z accepted only as the trail byte of a
  double-byte pair); a profanity/format filter runs; the form also rejects the placeholder caption.
  Only on passing all checks does the send fire. Same character rule as the 1/13 rename name field.

  IN-FLIGHT GUARD: the select-window net-busy latch must be clear before send and is set while the
  request is in flight (blocks re-entrancy across all char-mgmt builders).

  SEQUENCE / RESULT: server answers with the create result; the 8-byte char-manage result (3/7) may
  also refresh the slot list. There is NO dedicated 12-byte create-result message.

  UNKNOWNS (capture/debugger required, do not block codegen):
    - the AppearanceA/AppearanceB semantics at 0x14 / 0x16 (sex vs hair vs reserved);
    - whether the trailing PointsRemaining dword is server-meaningful;
    - the precise per-stat semantic order within the five-stat run;
    - the actual on-wire bytes of Reserved1A (0x1A).
  Recommended: a debugger read of the 52-byte staging region pre-send, or a captured 1/6 C2S frame.

  RELATED major-1 char-management senders: 1/0 (logout), 1/7 (manage/select + delete-overload,
  cmsg_char_select.yaml), 1/9 (enter, cmsg_char_enter.yaml), 1/13 (rename, cmsg_char_rename.yaml),
  1/14 (slot-move, cmsg_char_move.yaml). All gated by the single select-window net-busy latch.

  UNBLOCKS: a typed 52-byte struct may be codegen'd now; the appearance-word and stat semantics can be
  refined later without changing the byte layout.
