# Clean-room field spec. Promoted from a neutral analyst note; rewritten, not copied.
# ROLE CORRECTION (lane-07 audit): the sole builder is Cmsg_PostureToggle_Send, NOT an exit-notify
# path. The two f32 fields are casts from u8 arguments, not world coordinates. The primary
# CmsgExitNotify / CoordX / CoordY reading is refuted by the builder. The posture/action reading
# (secondary, below) is binary-accurate. Size 16 and direction C2S are confirmed.
# Proposed rename: CmsgPostureToggle (opcode catalog correction pending Tier-1 reconciliation).
# capture_verified: false.
#
# verification: sha256:263bd994c927c20a38624cf0ca452eaef365057fa9db1543d8f668c14a6fd8ee

name: CmsgPostureToggle
opcode: 0x20089           # major 2 (GameAction), minor 137 -> (2 << 16) | 137
direction: C2S
size: 16                  # fixed 16-byte payload
spec: packets/2-137_exit_notify.yaml
status: confirmed
capture_verified: false

summary: >
  In-game posture / action toggle sent when the player triggers a posture change while GameState==4.
  Carries an action code, a sub-flag, two float values cast from u8 arguments (orientation/offset pair,
  0.0 in the observed call site), a trailing flag, and padding. The prior reading of this packet as a
  client exit notification (CmsgExitNotify with CoordX/CoordY world coordinates) is refuted: the sole
  builder is the posture-toggle send path and the two f32 are u8->float casts, not coordinate floats.

# Wire order, offset 0 = first payload byte. Pack=1; the widths sum to size: 16.
# Binary-accurate layout per Cmsg_PostureToggle_Send builder (lane-07 audit).
fields:
  - { name: ActionCode,  type: u8  }          # 0x00  posture/action code (2 when a window flag is set, else 1)
  - { name: SubFlag,     type: u8  }          # 0x01  sub-flag [capture/debugger-pending]
  - { name: Pad02,       type: u16 }          # 0x02  padding (only +0x00/+0x01 of the 4-byte slot are written)
  - { name: FloatA,      type: f32 }          # 0x04  (float)(u8 arg) — 0.0 in observed call site; orientation/offset candidate
  - { name: FloatB,      type: f32 }          # 0x08  (float)(u8 arg) — 0.0 in observed call site; orientation/offset candidate
  - { name: TrailFlag,   type: u8  }          # 0x0C  trailing flag [capture/debugger-pending]
  - { name: Pad0D,       type: "u8[3]" }      # 0x0D  padding to 16 bytes

notes: |
  CONTROL-FLOW CONFIRMED body size (16 bytes). Sole builder is Cmsg_PostureToggle_Send.
  Role/field correction applied per lane-07 audit — the prior CmsgExitNotify reading is refuted.

    0x00 (1B) ActionCode : posture/action code. Builder passes 2 when a window flag is set, else 1.
                           [confirmed from builder args]
    0x01 (1B) SubFlag    : sub-flag. [capture/debugger-pending]
    0x02 (2B) Pad02      : only the two leading bytes of a 4-byte slot are written; treated as
                           u16 padding.
    0x04 (4B) FloatA     : a (float)(u8 arg) value; 0.0 in the observed call site. Candidate for
                           an orientation or offset pair, NOT a world coordinate. [capture-pending]
    0x08 (4B) FloatB     : a (float)(u8 arg) value; 0.0 in the observed call site. Same class as
                           FloatA. [capture-pending]
    0x0C (1B) TrailFlag  : trailing flag. [capture/debugger-pending]
    0x0D (3B) Pad0D      : zero padding to bring the total to 16 bytes.

  CONTEXT: fires while GameState==4 (in-world). The two f32 values are cast from u8 arguments at the
  call site — they are bounded to [0.0, 255.0] and cannot carry true world coordinates (which span
  tens of thousands of units). Their exact semantic role (orientation angle, offset, or a packed
  two-value indicator) is capture/debugger-pending.

  PRIOR READING (refuted): the file was originally named CmsgExitNotify and described CoordX/CoordY
  world-coordinate f32 fields at 0x04/0x08. The builder attribution and the u8->float cast evidence
  contradict that reading. The exit-notify interpretation is dropped.

  PROPOSED RENAME: CmsgPostureToggle. Opcode catalog entry 0x20089 carries a name/role drift candidate;
  see opcodesCatalogCorrections from lane-07 audit.

  UNKNOWNS to resolve with a capture:
    - the SubFlag and TrailFlag values/semantics;
    - whether FloatA/FloatB are ever non-zero (orientation/offset values);
    - the server-side response opcode.

  UNBLOCKS: Client.Application in-game posture/action toggle send path (16-byte fixed C2S).
