# Clean-room field spec. Promoted from a neutral analyst note; rewritten, not copied.
#
# VERIFICATION BANNER
#   verification: confirmed  (opcode->handler routing, the 24-byte header read, the per-record stride
#                 36, the record-array base @0x18, and the corrected header offsets -- SkillId@0x0C,
#                 ActionCode@0x10, TargetCount@0x14 (bounded (0,0x28]) -- are control-flow-confirmed;
#                 the bulk read destination is +4 within the work buffer, so the 24 header bytes occupy
#                 payload @0x00..0x17 and records begin at payload @0x18); per-record FIELD meanings and
#                 the @0x11..0x13 / @0x15..0x17 pad-vs-subfield split are capture/debugger-pending.
#   ida_reverified: 2026-06-16
#   ida_anchor: 263bd994
#   ida_reverified: 2026-06-27 (CYCLE 14 deep-verify)   ida_anchor: f61f66a9   evidence: [static-ida]
#     -- body layout re-traced against the handler; 1 field re-confirmed SAME (CYCLE 14 deep-verify, f61f66a9).
#   evidence: [static-ida]
#   conflicts: CORRECTED two real offset conflicts.
#              (1) HEADER: ActionCode is payload @0x10 (NOT @0x14) and TargetCount is payload @0x14
#              (NOT conflated into a 0x14..0x17 dword with ActionCode). There is NO separate
#              "SkillArg" dword between SkillId (@0x0C) and ActionCode (@0x10); the prior
#              "SkillArg@0x10" was actually ActionCode.
#              (2) RECORD (W-C4 disasm verdict, supersedes the prior record reading): the visible
#              damage is ONE 64-bit sum read together as record+0x14 (low) / record+0x18 (high) via
#              an add/adc accumulator -- NOT a 32-bit damage at record+0x0C and NOT an HP pair at
#              record+0x14/+0x1C. There is NO ActionCode at record+0x10; record +0x08/+0x0C/+0x10
#              and the +0x1C..+0x23 tail are OPAQUE (copied but not field-read by this handler). The
#              "ActionCode" concept maps to the HEADER payload @0x10 byte, not to any record field.

name: SmsgActorSkillAction
opcode: 0x50034           # major 5 (Push), minor 52 -> (5 << 16) | 52
direction: S2C
size: var                 # 24-byte header + (target_count x 36-byte target records)
spec: packets/5-52_actor_skill_action.yaml
status: hypothesis
capture_verified: false

summary: >
  Server broadcasts a skill/combat action by an actor, plus per-target hit results. The body carries
  per-target records (36 bytes each) that the client forwards to each target actor's animation/FX
  queue and that drive the floating damage numbers over each victim's head. Pairs with the C2S 2/52
  request.

# Fixed 24-byte header (payload 0x00..0x17). The repeating 36-byte target records begin at payload
# offset 0x18; the engineer hand-codes the loop driven by TargetCount. Widths sum to 24.
fields:
  - { name: CasterSort,    type: u8 }        # 0x00  caster actor sort
  - { name: Pad0,          type: "bytes[3]" }  # 0x01  padding
  - { name: CasterId,      type: u32 }       # 0x04  caster actor id
  - { name: CastFlag,      type: u8 }        # 0x08  0 => cancel/idle branch; nonzero => active cast
  - { name: BasicSelector, type: u8 }        # 0x09  basic/alias selector (0xFF => basic attack)
  - { name: Pad1,          type: "bytes[2]" }  # 0x0a  padding
  - { name: SkillId,       type: u32 }       # 0x0c  skill id / entity key (resolved against the client skill/entity table)
  - { name: ActionCode,    type: u8 }        # 0x10  action code (0=single target; 0xC8..0xCB=motion sub-ops; 0xCC=AoE)
  - { name: Pad2,          type: "bytes[3]" }  # 0x11  pad-vs-subfield UNRESOLVED (see notes)
  - { name: TargetCount,   type: u8 }        # 0x14  number of 36-byte target records that follow; bounded (0, 0x28]
  - { name: Pad3,          type: "bytes[3]" }  # 0x15  pad-vs-subfield UNRESOLVED (see notes)

notes: |
  Routing + header offsets + record stride CONFIRMED (control-flow); per-record FIELD meanings and the
  pad-vs-subfield split capture-pending. VARIABLE-LENGTH packet. No live capture this campaign.

  Header = 24 bytes (payload 0x00..0x17), matching the handler's fixed 0x18-byte read. NOTE the handler
  copies the 24 header bytes into a work buffer at WORK+4, so a work-buffer offset W maps back to payload
  W-4. The offsets below are stated in PAYLOAD coordinates. After the header the handler reads
  TargetCount, bounds it to (0, 0x28] (at most 40 records), then reads TargetCount * 36 bytes of records
  starting at payload @0x18.

  HEADER OFFSETS (CONFIRMED, corrected from the prior conflated reading):
    @0x0c (u32) SkillId / EntityKey : the skill/entity key resolved against the client skill/entity table.
    @0x10 (u8)  ActionCode          : selects the action shape -- 0 = single target; 0xC8..0xCB = motion
                                      sub-ops; 0xCC = AoE. CONFIRMED at payload @0x10 (handler tests
                                      this byte >= 0xC8 / == 0xCC / in 0xC8..0xCB). This is where the prior
                                      spec's mislabelled "SkillArg@0x10" actually sits -- there is NO
                                      separate SkillArg dword between SkillId and ActionCode.
    @0x11..0x13 (3B) : UNRESOLVED -- true padding or sub-fields (e.g. a secondary skill arg / hit flags).
                       Capture-pending.
    @0x14 (u8)  TargetCount         : the number of 36-byte records that follow; bounded (0, 0x28].
                                      CONFIRMED at payload @0x14 (distinct from ActionCode, NOT co-located
                                      in one 0x14..0x17 dword). Drives the 36 * count record read.
    @0x15..0x17 (3B) : UNRESOLVED -- true padding or sub-fields. Capture-pending.
    @0x18 : the first 36-byte target record begins here.

  TARGET RECORD (36 bytes each, repeated target_count times). CODE/DISASM-CONFIRMED stride 36 (the
  loop advances by 0x24 per iteration). RECORD LAYOUT CORRECTED in W-C4 from two independent record
  loops (a damage-total loop and an effect loop) that share the identical record geometry -- this is
  the decisive evidence. Each record is forwarded to the target actor's per-actor animation/FX queue:
    +0x00 (1B)  u8    target actor composite sub-key byte   (actor lookup key, with the key dword below)
    +0x04 (4B)  u32   target actor composite key dword       (actor lookup key)
    +0x08 (4B)  --    OPAQUE (copied wholesale, not field-read by this handler)
    +0x0c (4B)  --    OPAQUE (not read by this handler)
    +0x10 (4B)  --    OPAQUE (not read; NOT part of the damage sum; NOT an ActionCode)
    +0x14 (4B)  u32   visible-damage sum LOW dword           (read into an add accumulator)
    +0x18 (4B)  u32   visible-damage sum HIGH dword          (read into an adc carry accumulator)
    +0x1c (8B)  --    OPAQUE record tail (within the 36-byte stride)

  THE DAMAGE FIELD IS ONE 64-BIT QUANTITY at record +0x14 (low) / +0x18 (high): the handler does
  `add accumulatorLow, [record+0x14]` then `adc accumulatorHigh, [record+0x18]`, proving the two
  adjacent dwords are read together as a single signed 64-bit value. The displayed figure is the
  negated 64-bit sum, formatted with thousands grouping into the on-screen damage-total notice.

  CLIENT BEHAVIOUR (CODE-CONFIRMED, for the engineer's context -- not extra wire fields):
    - Each record is pushed onto the target actor's animation/FX queue, which plays the per-target hit
      animation and hit effect. This is THE driver for "the victim reacts to being hit".
    - The 64-bit visible-damage sum (record +0x14/+0x18) is rendered as a floating / total damage
      figure (subject to the player's damage-message display option).
    - On the cast itself the local player's own stamina/HP cost is drained client-side.

  RECORD OFFSET CORRECTION (binary wins): the earlier record reading placed an anim/hit state at
  +0x08, a 32-bit visible damage at +0x0c, and an HP pair at +0x14/+0x1c. That is REFUTED by the
  add/adc disasm: record +0x08/+0x0C/+0x10 are OPAQUE (copied, never field-read), the visible damage
  is the 64-bit add/adc pair at +0x14/+0x18, and +0x1c..+0x23 is an opaque tail. Absolute HP is NOT
  carried per record here -- it arrives via 5/53 SmsgActorVitalsAndPairState. This is settled by
  static disasm alone; only the VALUE semantics (literal damage vs another magnitude, and the
  +0x08..+0x10 opaque bytes) stay capture-pending.

  SPECIAL: when ActionCode == 0xCC the handler treats the first record as an AoE origin and
  procedurally fans out sub-actors around it (no extra wire fields). ActionCode values 0xC8..0xCB are
  motion sub-ops (animation toggles only, typically with no damage records).

  UNKNOWNS to resolve with a capture (single-target hit, multi-hit combo, and an AoE cast):
    - whether the header bytes @0x11..0x13 and @0x15..0x17 are true padding or carry sub-fields
      (e.g. a secondary skill argument, hit flags);
    - the meaning of the opaque record bytes (record +0x08, +0x0C, +0x10, and the +0x1C tail);
    - whether the 64-bit value at record +0x14/+0x18 is literal damage vs another signed magnitude.

  RELATED: paired request C2S 2/52 CmsgUseSkill (packets/2-52_use_skill.yaml); absolute HP also
  arrives via S2C 5/53 SmsgActorVitalsAndPairState (packets/5-53_actor_vitals_and_pair_state.yaml).
