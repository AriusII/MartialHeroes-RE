# Clean-room field spec. Promoted from a neutral analyst note; rewritten, not copied.
# CYCLE 14 deep-verify (f61f66a9): body layout re-traced against the send-path builder, 7 fields re-confirmed SAME, 0 corrected.
# CAPTURE-UNVERIFIED VALUE semantics; the fixed 12-byte body size and 5+3+4 field shape are
# control-flow CONFIRMED from the item-model quick-move body packer.
# verification: doida.exe sha256 263bd994c927c20a38624cf0ca452eaef365057fa9db1543d8f668c14a6fd8ee

name: CmsgItemQuickMove
opcode: 0x2002c           # major 2 (GameAction), minor 44 -> (2 << 16) | 44
direction: C2S
size: 12                  # fixed 12-byte body: 5 written bytes + 3-byte reserved gap + u32
spec: packets/2-44_item_quick_move.yaml
status: hypothesis
capture_verified: false

summary: Client item quick-move / shift-transfer -- the item-model quick-move send that moves an item to-or-from a container in one shortcut action (no held-item drag). A fixed 12-byte body: five leading parameter bytes (Mode + B1..B4), a 3-byte unwritten reserved gap, then a 4-byte context word. The storage ("keep") grid uses it to quick-transfer items into / out of its 60-cell storage grid.

# Wire order, offset 0 = first payload byte. Pack=1; the widths sum to size: 12.
# CONTROL-FLOW CONFIRMED: the item-model quick-move body packer writes 5 bytes at +0x00..+0x04,
# leaves +0x05..+0x07 unwritten (3-byte reserved gap), then writes a u32 at +0x08.
fields:
  - { name: Mode,    type: u8 }          # 0x00  mode / selector byte (quick-move parameters)
  - { name: B1,      type: u8 }          # 0x01  container / slot parameter
  - { name: B2,      type: u8 }          # 0x02  container / slot parameter
  - { name: B3,      type: u8 }          # 0x03  container / slot parameter
  - { name: B4,      type: u8 }          # 0x04  container / slot parameter
  - { name: Pad0,    type: "bytes[3]" }  # 0x05  3-byte unwritten reserved gap before the context word
  - { name: Context, type: u32 }         # 0x08  context word (held item-model id; 0 in the keep-open path)

notes: |
  CONTROL-FLOW CONFIRMED body size (a fixed 12-byte send) and the 5-byte + 3-byte-gap + 4-byte shape;
  CAPTURE-UNVERIFIED in the exact VALUE meaning of each leading byte. The shape mirrors 2/46
  CmsgItemMove -- the leading bytes encode a mode/selector and a source/destination container & slot
  set. The precise per-byte assignment is capture-pending; model them as raw bytes and do NOT hardcode
  a deposit/withdraw constant.

  CORRECTED (lane-03 audit): the YAML previously listed six leading single bytes (Mode + B1..B5) and
  a 2-byte Pad0 at 0x06. The packer only writes five bytes (+0x00..+0x04); +0x05..+0x07 are unwritten
  stack bytes (3-byte reserved gap). B5 at 0x05 was incorrect and has been removed; Pad0 is 3 bytes
  starting at 0x05, not 2 bytes at 0x06.

    0x00 (1B)  Mode    : the quick-move mode / selector byte.
    0x01..0x04 (4x u8) : the source/destination container & slot parameters (B1..B4).
    0x05 (3B)  Pad0    : 3-byte unwritten reserved gap; treat as zeroed on encode.
    0x08 (4B)  Context : a context word -- the held item-model id, 0 when the keep (storage) window is
                         open. CONTROL-FLOW CONFIRMED as the trailing 4-byte field; meaning is a static
                         inference.

  STORAGE-GRID USAGE: the storage ("keep") grid panel (slot 191, 10x6 = 60 cells) sends 2/44 for a
  quick / shortcut transfer of an item into or out of storage; it computes the unified destination slot
  the same way as the plain move (storage block base +56, +60 per page) and blocks a few specific
  bound item ids from being quick-stored. So 2/44 is the storage grid's quick-transfer lane, distinct
  from the storage OPEN / MONEY lane C2S 2/142 CmsgStorageOp (packets/2-142_storage_op.yaml). The
  quick-move is gated client-side on the keep-open guard flag.

  RELATIONSHIP: 2/46 CmsgItemMove (packets/2-46_item_move.yaml) is the sibling plain (drag-drop) move
  using the same 12-byte body shape. The money deposit / withdraw + storage open-request ride 2/142.
  Storage CONTENTS arrive via the shared item-panel server acks (no dedicated storage-snapshot opcode).

  UNKNOWNS to resolve with an item-quick-move / storage capture (body size is settled at 12; these are
  VALUE questions):
    - the per-byte assignment of Mode + B1..B4 (mode vs source container/slot vs destination slot);
    - confirm Context = held item-model id (0 when keep open) on the wire;
    - whether Pad0 is always zero.

  UNBLOCKS: the Client.Application item-quick-move use-case and the storage-grid quick-transfer path
  (send-only).
