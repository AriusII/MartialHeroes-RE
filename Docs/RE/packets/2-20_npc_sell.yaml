# Clean-room field spec. Promoted from a neutral analyst note; rewritten, not copied.
# CYCLE 14 deep-verify (f61f66a9): body layout re-traced against the send-path builder, 5 fields re-confirmed SAME, 0 corrected.
# CAPTURE-UNVERIFIED: field VALUE meanings are static inferences. capture_verified: false.

name: CmsgNpcSell
opcode: 0x20014           # major 2 (GameAction), minor 20 -> (2 << 16) | 20
direction: C2S
size: 12                  # fixed 12-byte payload staged by the NPC-sell sender
spec: packets/2-20_npc_sell.yaml
status: hypothesis
capture_verified: false

summary: Sell one inventory item to an NPC merchant. Emitted from the inventory/merchant flow when the player confirms a sale. The server replies with S2C 4/20 SmsgNpcSellItemAck. Reconfirmed in HUD-II Wave 3: the 12-byte body layout is recovered (leading id, two selector bytes, a 2-byte gap, trailing quantity word).

# Wire order, offset 0 = first payload byte. Pack=1; the field widths sum to size: 12.
fields:
  - { name: Id,       type: u32 }          # 0x00  item identifier / inventory entity key
  - { name: SlotMode, type: u8 }           # 0x04  slot / mode selector
  - { name: SubSel,   type: u8 }           # 0x05  sub-selector / count code
  - { name: Reserved, type: "bytes[2]" }   # 0x06  not written by the stager -> reserved/padding
  - { name: Quantity, type: u32 }          # 0x08  quantity / price

notes: |
  Static only; no capture this pass. The NPC-sell sender stages a fixed 12-byte body, so the total
  payload = 12 bytes and the frame = 8-byte header + 12 = 20 bytes on the wire. The 12-byte body
  length and the field LAYOUT (a leading u32 id, two single selector bytes, a 2-byte gap, then a
  trailing u32) are control-flow-confirmed; the individual field VALUE meanings are capture-pending.

    0x00 (4B) Id       : an item identifier / inventory entity key. CODE-CONFIRMED as the leading
                         word; the precise id space is the leading hypothesis.
    0x04 (1B) SlotMode : a slot or mode selector.
    0x05 (1B) SubSel   : a sub-selector / count code.
    0x06 (2B) Reserved : the stager does NOT write these two bytes (they sit uninitialised on the
                         send stack) -- modelled as reserved/padding so the struct totals 12 bytes.
                         An implementer should zero them.
    0x08 (4B) Quantity : a quantity (or possibly a unit price) -- capture-pending which.

  RELATIONSHIP: the merchant panel must be opened first (no open packet -- the shop stock is a
  client-side script table). The buy side is a separate opcode (the inventory-driven 2/19
  CmsgNpcBuyOrAcquire and the storefront 2/115 CmsgShopBuy). Server reply: S2C 4/20
  SmsgNpcSellItemAck (24-byte ack -- see packets/4-20_npc_sell_item_ack.yaml).

  UNKNOWNS to resolve with a capture of a single NPC sale:
    - whether SlotMode is the bag slot index or a mode code, and which is SubSel;
    - whether the trailing u32 is a sell quantity or a unit/total price.

  UNBLOCKS: Client.Application NpcSell use-case (ack 4/20).
