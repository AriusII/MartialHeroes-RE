# *** NOT A (major:minor) OPCODE ***
# The LOBBY protocol is a SEPARATE wire surface from the main game connection. It does NOT use
# the 8-byte (size,major,minor) opcode header dispatch and is NOT in opcodes.md's family table.
# It is documented here (and in specs/login_flow.md) so the network-protocol-engineer can
# implement the login-server / game-server split. The two fetches run on dedicated
# blocking-socket worker threads (out-of-band of the main dispatch loop).

name: LobbyProtocol
opcode: lobby             # SENTINEL -- the lobby has no (major:minor) opcode; do not register in the catalog table
direction: S2C            # both lobby queries are request/response; the records below are server->client
size: var                 # two distinct record shapes: 8-byte server records, 30-byte endpoint text
spec: packets/lobby.yaml
status: hypothesis
capture_verified: false

summary: >
  The lobby (login-server) protocol -- a SEPARATE synchronous TCP surface from the main game
  connection, fetched on two dedicated blocking-socket worker threads. Two queries: (1) the
  server-list query on TCP port 10000 returns an 8-byte frame wrapper whose count field is the
  number of 8-byte server-entry records {server_id, status_code, load, open_time} that follow;
  (2) the channel-endpoint query on TCP port (10000 + selected server_id) returns the same 8-byte
  wrapper with a payload whose first 30 bytes are an ASCII "<host> <port>" string (single SPACE
  delimiter) naming the actual GAME server. Both response payloads are LZ4-compressed
  (LZ4_decompress_safe) and carry NO byte cipher. There is NO (major:minor) dispatch on this
  socket. The localized server NAME is client-local (a name table), not on the wire -- only the
  numeric id and a per-row caption message-id travel.

# This file documents THREE record shapes plus a host-resolution order. None are codegen structs in
# the opcode sense; the engineer implements the two lobby queries from the tables below.
fields:
  - { name: SeeNotes, type: u8 }   # placeholder; the real records are the three tables in notes

notes: |
  Static inference only; no capture available. The lobby is a SYNCHRONOUS, BLOCKING TCP surface,
  distinct from the overlapped game connection. Two short-lived fetch threads each open a blocking
  socket, read one response, LZ4-decompress, and close. The recv loop reads exactly the 8-byte
  wrapper first, then (size - 8) payload bytes, accumulating with a short sleep between reads.

  ============================================================================================
  LOGIN-SERVER vs GAME-SERVER SPLIT (the architecture an implementer must build):
  ============================================================================================
    1. LOBBY / LOGIN SERVER: a host:port discovered locally (see HOST RESOLUTION below), queried
       on TCP PORT 10000 for the server list, and on TCP PORT (10000 + selected server_id) for a
       chosen server's game endpoint. Synchronous, blocking, throwaway sockets -- one per query,
       closed after. These fetches are OUT-OF-BAND blocking worker threads, NOT main-dispatch
       opcodes. The lobby host is reached with inet_addr (dotted-decimal IPv4 literal required) --
       NO DNS on this socket.
    2. GAME SERVER: the host:port named by the channel-endpoint query (record shape B). The
       client then opens its single persistent overlapped game connection to that host:port and
       runs the (major:minor) opcode protocol (0/0 key exchange, 1/4 auth, 3/1 character list,
       1/9 enter game, ...). The GAME connect uses gethostbyname (DNS), so the game host may be a
       DNS name OR a dotted quad. The lobby and the game connection NEVER share a socket.

  ============================================================================================
  COMMON LOBBY FRAME WRAPPER (both queries) -- 8 bytes:
  ============================================================================================
    Each lobby response begins with an 8-byte wrapper read as:
      +0 (u32) total_size : TOTAL frame size in bytes = 8 (this wrapper) + payload length.
                            The payload length to receive is computed as (total_size - 8).
                            [CODE-CONFIRMED]
      +4 (u16) record_count : on the SERVER-LIST query this is the RECORD COUNT (number of 8-byte
                            server entries that follow). A positive count gates the parse; the
                            client allocates 8 * record_count bytes and copies that many bytes from
                            the decompressed payload. This reuses the game frame's "major" word as
                            a count -- a quirk of the shared wrapper. [CODE-CONFIRMED]
                            COUNT BRANCHES (server-list re-derive 2026-06-23, static-CONFIRMED): the
                            consumer stores the count signed and branches -- count == 0 => "no servers"
                            (UI msg 4027); count == -1 (the worker writes -1 on a connect/recv failure)
                            => "fetch error" (UI msg 4028); count > 0 => show the list. AUTO-SELECT:
                            when count == 1 the client SKIPS the manual pick -- it reads record[0],
                            writes its server_id (+0) as the selected id / channel port, and (if
                            record[0].status_code == 0) advances directly to the channel-endpoint query
                            (Record Shape B) and persists Lastserver. The list re-fetch control is
                            debounced to 10000 ms (no-op while fetching or within 10 s of the last
                            fetch). These are render/flow facts; the wire fact is the -1 sentinel and
                            the > 0 gate. [STATIC-CONFIRMED]
      +6 (u16) unused     : reuses the game frame's "minor" word; preserved through decompression
                            but NOT read by either lobby thread. Believed unused here.
                            [CODE-CONFIRMED present; role = unused]
    The client then receives (total_size - 8) payload bytes and LZ4-decompresses them
    (LZ4_decompress_safe, raw block; if total_size == 8 the body is empty / pass-through). There is
    NO (major:minor) handler dispatch and NO byte cipher on this socket. There is NO separate
    compressed/uncompressed size field; the only length carried is total_size at +0, and the
    decompressor caps output at a fixed scratch capacity (~11680 bytes). [CODE-CONFIRMED]

  ============================================================================================
  RECORD SHAPE A -- SERVER-LIST entry (server-list query, port 10000):
  ============================================================================================
    The decompressed payload is `record_count` packed 8-byte little-endian entries
    (record_count = the wrapper field above; the count is in the WRAPPER, not a length-prefix
    inside the payload). Field order and the commit gate are now static-CONFIRMED
    (static IDA, doida.exe, CYCLE 18 Phase A). The four-field map (all 16-bit little-endian,
    treated as signed where the consumer sign-extends) is:

      +0 (i16) server_id   : server id / select-key. Read by BOTH consumers (the painter and the
                             plate-pick commit) as the server id, sign-extended; the painter
                             range-checks it as 1..40 and matches it against the remembered last
                             server. [CODE-CONFIRMED: +0 IS the server id]
      +2 (i16) status_code : availability / caption selector. status_code == 0 is the
                             active/selectable state. The plate-pick commit equality-tests this
                             field for == 0 (a non-zero value skips the commit). status_code == 3
                             is the "scheduled-open" branch in the painter (see +4/+6 below); the
                             full status enum beyond 0 and 3 is unverified.
                             [CODE-CONFIRMED: +2 = status, gate uses == 0]
      +4 (i16) load        : population / load gauge. The plate-pick commit compares this field
                             against the literal 2400 (0x960) with a signed branch and requires
                             load < 2400 (strict less-than). When status_code == 3 the painter
                             reuses +4 as the scheduled-open HOUR (see open_time). Render-side
                             thresholds bucket it for the plate color (see PRESENTATION below).
                             [CODE-CONFIRMED: +4 = load, gate cap 0x960 strict <]
      +6 (i16) open_time   : scheduled-open MINUTE value (a time component, NOT a flag/bitfield).
                             Read ONLY in the painter's status_code == 3 branch, where it is
                             combined with +4 to render an HH:MM caption (hour digits from +4,
                             minute digits from +6). Not read when status_code == 0 (active).
                             Read sign-extended. [CODE-CONFIRMED: +6 = open_time, a time value]

      Per-entry total = 2 + 2 + 2 + 2 = 8 bytes. Allocation = 8 * record_count, copy =
      8 * record_count, painter stride = 8 -- sums cleanly, no padding. [CODE-CONFIRMED size]

    FIELD-ORDER NOTE (prior "+0 may be open_time" caveat is now REFUTED):
      An earlier reading flagged the leading u16 as possibly open_time because the plate-pick
      commit ALSO reads the selected id from a separate parallel u32 array indexed by (page,
      plate). That parallel array is an additional source for the registry "Lastserver" write; it
      does NOT displace +0 as the in-record server id. Both consumers read +0 (sign-extended) as
      the server id, and the painter's own embedded debug trace self-documents the field order
      (it labels +2 "status" and +4 the load/count gauge). So field order is firmly
      [i16 server_id][i16 status_code][i16 load][i16 open_time]. The earlier caveat is statically
      refuted -- it is NO LONGER an open question. [STATIC-CONFIRMED]

    COMMIT / SELECTABILITY GATE (the only HARD wire-relevant predicate):
      A row is selectable / committable iff:

          status_code (+2) == 0   AND   load (+4) < 2400

      The constant is exactly 2400 (0x960) and the operator is a signed strict less-than.
      [STATIC-CONFIRMED]

      THERE IS NO `server_id == 100` SELECTION/COMMIT RULE. A `== 100` literal exists ONLY in the
      display painter, where it tests +0 to reposition a cosmetic "new server" label (the single
      uiconfig.lua integer NEW_SERVER_INDEX). It commits nothing and changes no state. It MUST NOT
      be modeled as a selectability gate. [STATIC-CONFIRMED: the == 100 commit claim is DENIED]

    PRESENTATION (not wire fields, render-side only; preserved from a prior render-path pass):
      A prior analysis of the render path enumerated the per-row caption message-ids by branch on
      the status_code field and a population mode. Those caption mappings (e.g. the population
      thresholds and the latency/scheduled captions) are CLIENT-SIDE presentation logic, not part
      of decoding the 8 wire bytes. The only HARD wire-relevant gate is the commit guard above
      (status_code == 0 AND load < 2400). When status_code == 0, the render path buckets load@+4
      into color plates (red/orange/yellow/green by descending load). The displayed list is
      presented in a load-spreading shuffle with the remembered "last server" re-anchored and
      highlighted. The four column-header captions and the per-row caption message-ids are
      localized string-table ids, not wire data. Full caption enumeration and the load color
      thresholds are render-side and capture-pending.

    SERVER-NAME TABLE (client-local, NOT wire data): the wire carries only the numeric server_id
    and per-row caption message-ids. The display NAME is resolved from a client-local localized
    string table keyed by server_id. A fresh implementation MUST supply its own id -> name map.

    CANONICAL C# DTO (for the Phase-C engineer to reconcile):
      LobbyServerListEntry { i16 ServerId; i16 StatusCode; i16 Load; i16 OpenTime; }  // 8 bytes LE
      Selectable  <=>  StatusCode == 0 && Load < 2400
      This SUPERSEDES the older doc-comment shape {ServerId, Status, Population, Flag} with a
      "ServerId == 100" gate: rename Population -> Load, rename Flag -> OpenTime (a scheduled
      hour:minute pair with Load when StatusCode == 3, NOT a bitfield), and DELETE the
      ServerId == 100 condition entirely (it is display-only).

  ============================================================================================
  RECORD SHAPE B -- CHANNEL-ENDPOINT text (channel query, port 10000 + selected server_id):
  ============================================================================================
    After a server is selected (commit guard passed), a second lobby query is made on
    PORT (10000 + selected server_id). The selected server_id (read from the parallel u32 array
    above) is added directly to 10000 to form the channel port and is also persisted to the
    registry as `Lastserver` (see specs/login_flow.md). [CODE-CONFIRMED]

    The channel thread does NOT parse an array. It zero-fills a 30-byte endpoint field, then copies
    the FIRST 30 (0x1E) bytes of the decompressed payload verbatim into it as a fixed char[30]
    ASCII endpoint token, NUL-padded. The token is an ASCII "<host> <port>" string with a SINGLE
    SPACE (0x20) delimiter (NOT colon, NOT NUL -- it is NUL-PADDED but SPACE-DELIMITED); the port
    is decimal ASCII parsed via atol. The endpoint thread copies the 30 bytes OPAQUELY; the
    host/port split happens later when the credential blob is assembled for the secure-context
    builder (see specs/login_flow.md). [CODE-CONFIRMED: 30 bytes copied; SPACE-delimited host/port]

    [LIVE-CONFIRMED 2026-06-20 + IDA-RECONFIRMED] The 30 (0x1E) is a fixed COPY CAP over a
    zero-filled destination, NOT a minimum payload length. There is NO `len >= 30` guard anywhere in
    the reader: it receives exactly (total_size - 8) payload bytes, LZ4-decompresses into a large
    zero-filled scratch, then memcpy's a CONSTANT 30 bytes (content + trailing zero padding) and
    consumes the result as a NUL-terminated C string. A live channel-endpoint reply against the
    replica decompressed to ONLY 23 bytes and parsed correctly. => an implementation MUST tolerate a
    payload shorter than 30 (read up to 30, stop at the first NUL); requiring >= 30 is a bug (this
    was a real defect in the C# LobbyClient, fixed CYCLE 4). The resolved GAME endpoint observed was
    a DOTTED-QUAD host with a port handed out FRESH per channel query (e.g. 211.196.150.4:11402 /
    :11405 / :11407 across runs) -- i.e. NOT 10000+id; the channel QUERY port is 10000+id (10004 for
    server 4), but the GAME port carried in the token differs and varies per query.

      +0 (<=30B) endpoint_token : char[30] copy CAP, ASCII "<host> <port>" naming the GAME server,
                                NUL-terminated within the cap, consumed as one string token. The
                                decompressed payload may be SHORTER than 30 (live: 23B).

    PARSE SHAPE -- static-CONFIRMED (CYCLE 9, 263bd994): the host/port split is on a SINGLE SPACE
    (0x20), the port tail parsed by atol (decimal ASCII) -- NOT colon, NOT NUL (the NUL only terminates
    the whole token). The 30 (0x1E) is a fixed COPY CAP over a zero-filled destination with NO `len>=30`
    guard (an unconditional 30-byte memcpy), so a shorter payload (live: 23B) is tolerated as a
    NUL-terminated C string -- requiring `>=30` is a defect. The reply is a SINGLE endpoint: the channel
    thread reads ONE fixed 30-byte token with NO count field and NO loop/stride -- decisively a single
    endpoint, by direct contrast with the sibling server-roster thread, which DOES read a record count
    and loops an 8-byte-stride array. Nothing past the first 30 bytes is ever read.

    STILL CAPTURE-PENDING on this record (capture_verified: false -- no .pcapng of the
    port-(10000+server_id) stream):
      - host token FORM: LIVE shows a DOTTED-QUAD (211.196.150.4); the GAME connect uses gethostbyname
        so a DNS name would also resolve, but the replica hands out a dotted quad -- which form the live
        server emits is the only open question, and it does not change the parse (split-on-space) shape;
      - the literal on-wire byte VALUES of the token.

    COUPLING: the connect target for THIS query is htons(10000 + selected server_id) against the
    resolved lobby host IP; the 30-byte endpoint token fetched here then feeds the subsequent
    overlapped GAME-connection credential handshake (it is NOT used to re-target the lobby socket).

  ============================================================================================
  HOST RESOLUTION ORDER (where the LOBBY host comes from, before any query):
  ============================================================================================
    The lobby connect helper resolves the lobby host IP in this strict priority order
    (first hit wins), then connects with inet_addr (dotted-decimal IPv4 required, no DNS):
      1. `ip.txt` in the working directory, if present: a single whitespace-free token, truncated
         to 19 characters.
      2. else a `list.dat` connection-IP-list (CIPList) record selected by the registry server-name
         key HKLM\SOFTWARE\crspace\do : servername (REG_SZ; a baked-in default name is used if the
         key is absent). The selected record's host is read at record offset +256. (Record shape C.)
      3. else the hardcoded fallback host 211.196.150.4.
    This resolves the LOBBY host only. The GAME server host comes from record shape B.

  ============================================================================================
  RECORD SHAPE C -- list.dat connection-IP-list (loose client-root file, NOT in the VFS):
  ============================================================================================
    `list.dat` is a loose file in the client root opened in binary mode (the CIPList loader).
    On-disk layout:
      +0 (u32) count   : number of records.
      +4 ...           : `count` x 768-byte records.
    File-size invariant: an internal length field must equal 768 * count + 4 or the load is
    rejected.

    Per-record (768 bytes):
      +0   (string)    : CP949 server NAME -- the match key. Compared against the registry value
                         servername under HKLM\SOFTWARE\crspace\do. If the registry read fails, a
                         default CP949 server name baked into the client is the key.
      +256 (0x100)     : the lobby host string (an IPv4 dotted host the client connects to). The
                         selected record's host at +256 becomes the lobby host.
      The 256-byte gap between the end of the name and +256, and whether +256 also holds a port or
      only a dotted IPv4 string, are unverified (no on-disk sample) -- see unknowns.

  UNKNOWNS to resolve with a LOBBY capture (and an on-disk list.dat sample):
    - the on-wire byte values of either reply, the real server count, and that the payload is
      genuinely LZ4-compressed on the wire (vs the total_size==8 empty pass-through);
    - the full status_code enum beyond the confirmed 0=active gate and 3=scheduled-open branch,
      and the per-row caption strings / load color thresholds (render-side, CP949 message file);
    - the channel endpoint token's host form (DNS name vs dotted quad) and whether the channel
      reply carries one endpoint or a trailing array;
    - the list.dat 768-byte record gap (padding / flags / port) and whether +256 holds a port.
    (RESOLVED this pass, no longer unknown: the in-record FIELD ORDER -- +0 server_id, +2
     status_code, +4 load, +6 open_time -- and the commit gate are static-CONFIRMED.)

  RESOLVED (server-list re-derive 2026-06-23): frontend_layout_tables.md §4.3.5/§4.3.6 now record the
    §4 record map and commit gate as static-CONFIRMED (field order +0 server_id firmly established; +6 =
    open_time/load-valid; commit gate status==0 && load<2400; the server_id == 100 literal is display-only,
    NOT a selection rule), and §4.3.10 adds the construction-order + member-offset cross-reference. The
