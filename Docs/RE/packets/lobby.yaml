# Clean-room field spec. Promoted from neutral analyst notes; rewritten, not copied.
# CAPTURE-UNVERIFIED: every offset below is a static inference. capture_verified: false.
#
# *** NOT A (major:minor) OPCODE ***
# The LOBBY protocol is a SEPARATE wire surface from the main game connection. It does NOT use
# the 8-byte (size,major,minor) opcode header dispatch and is NOT in opcodes.md's family table.
# It is documented here (and in the opcodes.md "Lobby protocol" appendix) so the
# network-protocol-engineer can implement the login-server / game-server split.

name: LobbyProtocol
opcode: lobby             # SENTINEL -- the lobby has no (major:minor) opcode; do not register in the catalog table
direction: S2C            # both lobby queries are request/response; the records below are server->client
size: var                 # two distinct record shapes: 8-byte server records, 30-byte endpoint text
spec: packets/lobby.yaml
status: hypothesis
capture_verified: false

summary: >
  The lobby (login-server) protocol -- a SEPARATE synchronous TCP surface from the main game
  connection. Two queries: (1) the server-list query on port 10000 returns a count-prefixed array
  of 8-byte server records {server_id, status, load, open_time}; (2) the channel-endpoint query on
  port (10000 + selected server_id) returns a 30-byte ASCII "host port" text naming the actual
  GAME server. Both responses are LZ4-compressed and carry NO byte cipher. There is NO
  (major:minor) dispatch on this socket. The localized server NAME is client-local (a name table),
  not on the wire -- only the numeric server_id travels.

# This file documents THREE record shapes plus a host-resolution order. None are codegen structs in
# the opcode sense; the engineer implements the two lobby queries from the tables below.
fields:
  - { name: SeeNotes, type: u8 }   # placeholder; the real records are the three tables in notes

notes: |
  Static inference only; no capture available. The lobby is a SYNCHRONOUS, BLOCKING TCP surface,
  distinct from the overlapped game connection. Two short-lived fetch threads each open a blocking
  socket, read one response, and close.

  ============================================================================================
  LOGIN-SERVER vs GAME-SERVER SPLIT (the architecture an implementer must build):
  ============================================================================================
    1. LOBBY / LOGIN SERVER: a host:port discovered locally (see HOST RESOLUTION below), queried
       on PORT 10000 for the server list, and on PORT (10000 + server_id) for a chosen server's
       game endpoint. Synchronous, blocking, throwaway sockets -- one per query, closed after.
    2. GAME SERVER: the host:port returned by the channel-endpoint query (record shape B). The
       client then opens its single persistent overlapped game connection to that host:port and
       runs the (major:minor) opcode protocol (0/0 key exchange, 1/4 auth, 3/1 character list,
       1/9 enter game, ...). The lobby and the game connection NEVER share a socket.

  ============================================================================================
  COMMON LOBBY FRAME WRAPPER (both queries):
  ============================================================================================
    Each lobby response begins with an 8-byte wrapper read as:
      +0 (u16) size_lo : total frame size, low 16 bits (same framing convention as the game header)
      +4 (u16) major   : on the SERVER-LIST query this is the RECORD COUNT (not an opcode family)
      +6 (u16) minor   : appears unused on the lobby socket (believed always 0 / ignorable)
    The client then reads (size - 8) payload bytes and LZ4-decompresses them. There is NO
    (major:minor) handler dispatch and NO byte cipher on this socket. The reuse of the word
    "major" for the record count is a quirk of the shared wrapper -- treat it as a count here.

  ============================================================================================
  RECORD SHAPE A -- SERVER-LIST record (server-list query, port 10000):
  ============================================================================================
    The decompressed payload is `count` packed 8-byte little-endian records (count = the
    wrapper's "major"/count field). Each record:

      +0 (u16) server_id  : index 1..40 into the CLIENT-LOCAL localized server-name table.
                            Out-of-range ids are treated as invalid. This numeric id is the ONLY
                            server identity on the wire; the display name is client-local.
      +2 (i16) status     : server availability / status code. Special-cased values observed:
                              0          -> normal / open (falls through to the load-color path),
                              2 / 3 / 4  -> fixed status labels (used when open_time == 0),
                              3 (open_time != 0) -> "scheduled open" (renders the open clock),
                              100        -> "this is the connected / current selection" sentinel.
                            The full enum is capture-only.
      +4 (i16) load       : population gauge. Drives the load-color thresholds (>1200 / >800 / >500
                            / else). For the scheduled-open render it ALSO supplies the HOUR of the
                            open clock (see open_time). A value of 24 is a "preparing/check"
                            sentinel rather than a population.
      +6 (i16) open_time  : used only for status == 3 (scheduled open). Supplies the MINUTE of the
                            open clock. The displayed clock is HH:MM where HH comes from `load` and
                            MM comes from `open_time`, each split into two decimal digits.

      Per-record total = 8 bytes. The displayed array is presented in a RANDOMIZED order
      (load-spreading), with a remembered "last server" re-anchored -- a presentation detail, not
      a wire field.

  ============================================================================================
  RECORD SHAPE B -- CHANNEL-ENDPOINT text (channel query, port 10000 + server_id):
  ============================================================================================
    After a server is selected, a second lobby query is made on PORT (10000 + selected server_id).
    The decompressed payload's FIRST 30 (0x1E) bytes are copied as a NUL-padded ASCII string of the
    form "host port" (e.g. an IPv4 dotted host, a space, then a decimal port). It is NOT guaranteed
    NUL-terminated -- read a fixed 30-byte field and split on whitespace.

      +0 (30B) endpoint_text : ASCII "host port" naming the GAME server. The client parses host +
                               atoi(port) out of this and opens its persistent game connection to
                               it. Whether the payload carries MORE than 30 bytes (a backup
                               endpoint, MOTD) is unknown without a capture.

    COUPLING: the selected server_id (1..40) is added DIRECTLY to 10000 to form the channel query
    port. So server_id IS the channel port offset, implying the lobby provisions ports
    10001..10040. Confirm against server-side knowledge / a capture.

  ============================================================================================
  HOST RESOLUTION ORDER (where the LOBBY host comes from, before any query):
  ============================================================================================
    The lobby connect helper resolves the lobby host IP in this strict priority order:
      1. `ip.txt` in the working directory, if present: a single whitespace-free token, truncated
         to 19 characters.
      2. else a `list.dat` connection-IP-list record selected by a registry server-name key
         (record shape C below).
      3. else the hardcoded fallback host 211.196.150.4.
    This resolves the LOBBY host only. The GAME server host comes from record shape B.

  ============================================================================================
  RECORD SHAPE C -- list.dat connection-IP-list (loose client-root file, NOT in the VFS):
  ============================================================================================
    `list.dat` is a loose file in the client root opened in binary mode. On-disk layout:
      +0 (u32) count   : number of records.
      +4 ...           : `count` x 768-byte records.
    File-size invariant: filesize == 768 * count + 4.

    Per-record (768 bytes):
      +0   (string)    : CP949 server NAME -- the match key. Compared against the registry value
                         servername (a Windows registry key under the vendor's product hive). If the
                         registry read fails, a default CP949 server name baked into the client is
                         used as the key.
      +256 (0x100)     : the lobby host string (an IPv4 dotted host the client connects to). The
                         selected record's host at +256 becomes the lobby host.
      The 256-byte gap between the end of the name and +256, and whether +256 also holds a port or
      only a dotted IPv4 string, are unverified (no on-disk sample) -- see unknowns.

  ============================================================================================
  CLIENT-LOCAL SERVER-NAME TABLE (NOT on the wire):
  ============================================================================================
    The wire carries only the numeric server_id (1..40). The display name comes from a client-local
    41-entry localized string table (indices 0..40), selected by the active locale. A fresh
    implementation MUST supply its own server-id -> display-name map; the server never sends names.

  UNKNOWNS to resolve with a LOBBY capture (and an on-disk list.dat sample):
    - the 8-byte record decode (id/status/load/open_time) is two-renderer-agreed but
      wire-unverified; confirm against a real lobby response;
    - the HH-from-load / MM-from-open_time packing for scheduled-open, and whether load==24 is
      always the "preparing" sentinel;
    - the full status enum beyond {0,2,3,4,24,100};
    - whether the lobby wrapper's minor (@+6) is always 0;
    - whether the 30-byte channel payload carries more than the leading "host port";
    - the list.dat 768-byte record gap (padding / flags / port) and whether +256 holds a port;
    - the server_id == channel-port-offset coupling (ports 10001..10040).

  UNBLOCKS: Network.Protocol lobby client (server-list + channel-endpoint queries), the
  login-server/game-server split, and the local host-resolution order (ip.txt -> list.dat ->
  fallback).
