# Clean-room field spec -- SUPERSEDED / TOMBSTONE. Promoted, rewritten, not copied.
#
# *** THE "1/6 LOGIN-OR-CREATE COLLISION" IS RESOLVED -- DO NOT IMPLEMENT FROM THIS FILE ***
#
# This file previously recorded an UNRESOLVED attribution conflict: it was unclear whether opcode
# 1/6 carried the account LOGIN credential blob OR the character-CREATE body. The deep
# workflow-spine analysis plus a live IDA-debugger login resolved it:
#
#   * 1/6 is CHARACTER-CREATE ONLY (52-byte appearance/creation record, single emitter).
#       -> see packets/cmsg_char_create.yaml
#   * The login credential is NOT a 1/6 message. It is a payload sub-opcode 0x2B carried on the
#     secure 1/4 frame (plaintext account/PIN pre-image + RSA ciphertext of the password).
#       -> see packets/login.yaml  and  specs/crypto.md section 6
#
# The "two 52-byte send-sites" premise was false: the create body is 52 bytes (1/6); the login
# credential is a variable-length 1/4 secure payload, not a 52-byte 1/6 body.

name: CmsgLoginOrCreateCharacter
opcode: 0x10006
direction: C2S
size: 52
spec: packets/1-6_login_or_create.yaml
status: superseded
capture_verified: false

summary: >
  SUPERSEDED. The 1/6 collision is resolved -- 1/6 is character-create only
  (packets/cmsg_char_create.yaml); the login credential rides the secure 1/4 frame as sub-opcode
  0x2B (packets/login.yaml). This file is retained only as a resolution breadcrumb. Do not
  implement from it.

fields:
  - { name: Body, type: "bytes[52]" }   # 0x00  SUPERSEDED -- use cmsg_char_create.yaml

notes: |
  See cmsg_char_create.yaml (1/6 char-create) and login.yaml (the 0x2B credential on the secure
  1/4 frame). The catalog row 1/6 now points at cmsg_char_create.yaml; the credential carrier 1/4
  points at login.yaml. This tombstone exists so the historical collision and its resolution stay
  auditable.
