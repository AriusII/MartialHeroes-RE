# Clean-room field spec. Promoted from a neutral analyst note; rewritten, not copied.
# CYCLE 14 deep-verify (f61f66a9, 2026-06-27): body layout re-traced against Cmsg_ProductBuy_Send; 1 field re-confirmed SAME, 0 corrected. ida_anchor f61f66a9 (prior 263bd994); dispatch intact (specs/network_dispatch.md).
# CONTROL-FLOW CONFIRMED: the ProductPanel's SOLE net send is 2/151 with a 1-byte selector body.
# capture_verified: false (the selector VALUES beyond {0 open, 200 confirm} are capture-pending).
#
# HUD-II Wave 2 (ProductPanel recovery) -- this replaces the earlier "paged buy / 2-u32 / shares with
# 2/152 and 2/153" framing, which was a mis-attribution. See the RESOLUTION note below.

name: CmsgProductBuy
opcode: 0x20097           # major 2 (GameAction), minor 151 (0x97) -> (2 << 16) | 151
direction: C2S
size: 1                   # FIXED 1-byte selector body (the builder appends a single byte)
spec: packets/2-151_product_buy.yaml
status: hypothesis
capture_verified: false

summary: >
  The product / crafting panel's ONLY network send. A 1-byte selector body: the panel sends this once
  on open/refresh (selector 0) to ask the server for the current production list/money, and again on the
  tip-panel confirm action (selector 200 / 0xC8). All tab and page navigation inside the panel are LOCAL
  repaints over a server-pushed recipe list -- they are not network sends. The list/money refresh arrives
  inbound on S2C 3/8.

# Wire order, offset 0 = first payload byte. Pack=1; the field width sums to size: 1.
# CONTROL-FLOW CONFIRMED: the send builder writes the header (major 2 / minor 151) and appends a
# single selector byte. Two values are control-flow-confirmed: 0 on the open/refresh path, 200 (0xC8)
# on the confirm path.
fields:
  - { name: Selector, type: u8 }   # 0x00  request selector: 0 = open/refresh, 200 (0xC8) = tip-panel confirm

notes: |
  CONTROL-FLOW CONFIRMED: the product / crafting panel's sole net send is 2/151 with a 1-byte body.

    0x00 (1B) Selector : the request selector.
                         - 0   = open / refresh (sent when the panel opens, to fetch the current
                                 production list and money);
                         - 200 = (0xC8) the tip-panel confirm path.
                         Any additional selector values are capture/debugger-pending.

  CONFLICT RESOLUTION (load-bearing -- binary wins). The earlier provisional model treated this as a
  "paged buy" with a two-u32 body shared across minors 2/151, 2/152 and 2/153. That framing is
  WITHDRAWN: the ProductPanel recovery proved the panel emits ONLY 2/151, and only with a 1-byte
  selector. Specifically:
    - the panel does NOT emit 2/152 at all -- its tab/page navigation is a local repaint over a
      server-pushed recipe list. The "2/152 = ProductPanel paging" attribution was a mis-attribution.
      2/152 is now resolved as the QuestPanel-only per-row request (see
      packets/2-152_quest_row_request.yaml, CmsgQuestRowRequest).
    - 2/153 is de-linked from this product spec: the panel's confirm path uses 2/151 (selector 200),
      so 2/153's exclusive ownership by the product family is no longer asserted. If 2/153 retains
      independent evidence as a separate confirm/finalize send, it gets its own spec when captured.

  INBOUND PAIR (binary-won, control-flow): the reply is selector-dependent --
    - selector 0 (open/refresh) <- S2C 3/8 SmsgShopPageUpdate (packets/3-8_shop_page_update.yaml): a
      money/gold push that triggers a panel repaint over the client-cached recipe vector; 3/8 carries no
      grid/page array. The open-path caller and the 3/8 handler invoke the SAME product-list repaint
      routine, which is what pins this pairing.
    - selector 200 (0xC8, confirm) <- the major-4 product-result family 4/113 SmsgItemShopPurchaseResult
      / 4/114 SmsgCashShopActionResult / 4/115 SmsgItemShopBalanceUpdate (the purchase result + balance
      update). The census "2/151 -> 1/20" tie is REFUTED: 1/20 is the letter/mail received notice and
      touches no product-panel state.

  WHAT IS NOT HERE: the recipe-list source vector fill path (where the cached recipe records come
  from -- area/NPC load vs a separate S2C) is not pinned this lane.

  UNKNOWNS (capture-pending): selector values beyond {0, 200}; the recipe-list source channel.

  UNBLOCKS: the Client.Application product / crafting-panel use-case -- the open/refresh and confirm
  sends are a 1-byte selector each; pair with the S2C 3/8 money refresh.
