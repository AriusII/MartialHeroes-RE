# Clean-room field spec. Promoted from a neutral analyst note; rewritten, not copied.
#
# VERIFICATION BANNER
#   verification: confirmed  (opcode->handler routing, the fixed 20-byte body, and the selector@+0x08 /
#                 reason@+0x09 reads are control-flow-confirmed; the rest of the 20 bytes is forwarded
#                 verbatim to the window opener and is NOT field-read by THIS handler; every VALUE
#                 meaning is capture/debugger-pending)
#   ida_reverified: 2026-06-20
#   ida_anchor: 263bd994
#   ida_reverified: 2026-06-27 (CYCLE 14 deep-verify)   ida_anchor: f61f66a9   evidence: [static-ida]
#     -- CYCLE 14 deep-verify (f61f66a9): body layout re-traced against handler, 2 fields re-confirmed SAME
#        (Selector@8, Reason@9), 0 corrected.
#   conflicts: CORRECTED. The prior reading modelled a 3-value phase machine (Phase@+0x0A {0,2,3}) and an
#              actor-id triplet at +0x04/+0x0C/+0x10. The binary refutes that: 4/23 reads ONLY a
#              selector byte @+0x08 (0 = decline, 1 = accept) and a reason byte @+0x09 (decline path
#              only, reasons 1..5). Any actor-id fields live INSIDE the forwarded 20-byte block and are
#              consumed DOWNSTREAM by the window-open routine -- they are NOT 4/23 wire fields. BINARY WINS.

name: SmsgUserTradeRequestResult
opcode: 0x40017             # major 4 (Response), minor 23 -> (4 << 16) | 23
direction: S2C
size: 20                   # fixed 20-byte body (0x14)
spec: packets/4-23_trade_request_result.yaml
status: hypothesis
capture_verified: false

summary: Server result for a player-trade request. A selector byte chooses accept (open the trade window) vs decline; on decline a reason byte picks one of five decline-notice strings. On accept the whole 20-byte block is forwarded to the window-open routine, which consumes the request's actor-id fields downstream. Reply to C2S 2/23 CmsgTradeRequest.

# Wire order, offset 0 = first payload byte. Pack=1; widths sum to size: 20. Only the two bytes THIS
# handler reads are named; the rest is a region forwarded verbatim to the window opener (its interior
# fields are consumed downstream, NOT pinned from this handler).
fields:
  - { name: Head,     type: "bytes[8]" }    # 0x00  leading region not consumed by the trade path on either branch
  - { name: Selector, type: u8 }            # 0x08  0 = decline / failure path; 1 = accept -> open trade window; other values do nothing
  - { name: Reason,   type: u8 }            # 0x09  decline-reason (consulted ONLY when Selector == 0; selects one of 5 decline strings, reasons 1..5)
  - { name: Body,     type: "bytes[10]" }   # 0x0a  remaining bytes forwarded verbatim to the window opener (actor-id fields consumed downstream; NOT pinned here)

notes: |
  CONTROL-FLOW CONFIRMED: the fixed 20-byte body and the Selector@+0x08 / Reason@+0x09 reads.
  CAPTURE-UNVERIFIED for VALUE meanings. This handler reads ONLY +0x08 and +0x09 directly.

    0x08 (1B) Selector : 1 = accept -> copy the whole 20-byte block into the trade-window controller and
                         call the window-open/populate routine (this is the handler that OPENS the trade
                         window and seeds it from the block). 0 = decline / cancel -> reset a UI panel,
                         switch on Reason (1..5) to a decline-notice string, then clear the
                         trade-request state singleton. Selector >= 2: no-op (no else arm).
    0x09 (1B) Reason   : a decline-reason code (1..5), consulted only on the decline path.

  ACTOR-ID FIELDS ARE DOWNSTREAM (NOT 4/23 wire fields): on accept, the 20-byte block is forwarded
  verbatim to the window-open routine, which is where any requester/target/responder ids inside the
  block are read. They cannot be asserted at fixed offsets from this handler alone -- they are
  capture/downstream-pending. Do NOT publish guessed id offsets here.

  LATCH / STATE: does NOT clear a network response latch -- it mutates trade UI state only. On decline it
  zeroes one field of the trade-request state singleton (a trade-state reset).

  UNKNOWNS to resolve with a request->accept and a request->decline capture:
    - the full Reason enum beyond "1..5 selects a decline string";
    - the in-block actor-id field offsets (confirmed only in the downstream window-open routine).

  RELATIONSHIP: reply to C2S 2/23 CmsgTradeRequest (packets/2-23_trade_request.yaml). After accept the
  in-window flow uses 2/24 / 2/25 and the server's 4/24 / 4/25.
