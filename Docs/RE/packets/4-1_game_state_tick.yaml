# Clean-room field spec. Promoted from a neutral analyst note; rewritten, not copied.
# ROUTING: Response table-driven (major-4 / minor-1).
# size: 9100 bytes (0x238C) fixed-size block read via PacketBuffer_ReadField.

name: SmsgGameStateTick
opcode: 0x40001           # major 4 (Response), minor 1 -> (4 << 16) | 1
direction: S2C
size: 9100                # fixed 9100-byte payload (0x238C)
spec: packets/4-1_game_state_tick.yaml
status: confirmed
capture_verified: false

summary: >
  Periodic game-state tick and world-entry seed. The entire packet is read into a single
  9100-byte buffer. It branches on a leading FormSelector byte: Form 0 is a periodic
  tick/drain that manages client-side keepalive timers, and Form 1 is the full world-entry
  snapshot containing actor/world tables, hotbar slots, spawn positions, and scene gates.

fields:
  - { name: FormSelector, type: u8, offset: 0 }      # 0 = tick/drain, 1 = world-entry seed, other = ignore
  - { name: HeaderOpaque, type: "u8[11]", offset: 1 } # leading header bytes (carried in block 1 copy)
  - { name: AreaId, type: u32, offset: 12 }          # target area / map ID (validated < 13)
  - { name: Month, type: u32, offset: 16 }           # month value for map selection
  - { name: Day, type: u8, offset: 20 }              # day value for map selection
  - { name: Hour, type: u8, offset: 21 }             # hour value for map selection
  - { name: Minute, type: u8, offset: 22 }           # minute value for map selection
  - { name: Second, type: u8, offset: 23 }           # second value for map selection
  - { name: WorldEntryTableA, type: "u8[3088]", offset: 24 } # Sub-block 1 (0xC10 bytes) -> copied to world/actor table A global
  - { name: WorldEntryTableB, type: "u8[4044]", offset: 3112 } # Sub-block 2 (0xFCC bytes) -> copied to world/actor table B global
  - { name: HotbarSlots, type: "u8[1920]", offset: 7156 } # Sub-block 3 (0x780 bytes) -> copied to g_HotbarSlots
  - { name: SpawnX, type: f32, offset: 9076 }        # local player spawn X coordinate
  - { name: SpawnZ, type: f32, offset: 9080 }        # local player spawn Z coordinate (Y is forced to 0 client-side)
  - { name: TrailingScalar1, type: u32, offset: 9084 } # passed to the post-tick update helper
  - { name: TrailingScalar2, type: u32, offset: 9088 } # stored to local-player +1856
  - { name: ActionResultCode, type: u32, offset: 9092 } # gate at end (0 = normal, 300/301 = alternate UI branch)
  - { name: TrailingScalar3, type: u8, offset: 9096 }  # passed (with TrailingScalar4) to the scene-gate update helper
  - { name: TrailingScalar4, type: u8, offset: 9097 }  # passed to the scene-gate update helper
  - { name: Padding, type: "u8[2]", offset: 9098 }    # tail padding / reserved to align to 9100 bytes

notes: |
  Static analysis only; no capture available. The client reads the entire 9100-byte block
  congruently.

  FORM 0 (Periodic Tick):
    - Branches when FormSelector == 0.
    - Updates client timers, clears or triggers keepalive loops, and shuts down the main loop if
      network state is lost.

  FORM 1 (World Entry Seed):
    - Branches when FormSelector == 1.
    - Extracts WorldEntryTableA (3088 bytes) and WorldEntryTableB (4044 bytes) to populate the
      initial actor list and world objects.
    - Overwrites HotbarSlots (1920 bytes) to restore the player's quick-slot configurations.
    - Sets local player position to (SpawnX, 0, SpawnZ), cold-starts terrain generation, and
      loads BGM cues based on the AreaId and date/time parameters.
    - Triggers the runtime keepalive loop by enabling the CmsgKeepaliveToggle (2/112) sender.
