# Clean-room field spec. Promoted from a neutral analyst note; rewritten, not copied.
# ROUTING: Response table-driven (major-4 / minor-1).
# size: 9100 bytes (0x238C) fixed-size block read via PacketBuffer_ReadField.

name: SmsgGameStateTick
opcode: 0x40001           # major 4 (Response), minor 1 -> (4 << 16) | 1
direction: S2C
size: 9100                # fixed 9100-byte payload (0x238C)
spec: packets/4-1_game_state_tick.yaml
status: confirmed
capture_verified: false

summary: >
  Periodic game-state tick and world-entry seed. The entire packet is read into a single
  9100-byte buffer. It branches on a leading FormSelector byte: Form 0 is a periodic
  tick/keepalive-drain path (no world load), Form 1 is the full world-entry snapshot
  containing actor/world tables, hotbar slots, spawn positions, and the world-clock seed.
  Any other FormSelector value early-returns / is ignored. The structural layout below is
  confirmed by contiguity (24 + 3088 + 4044 + 1920 = 9076, then the two spawn floats);
  value-only items are flagged live-pending (6-D).

fields:
  - { name: FormSelector, type: u8, offset: 0 }      # 0 = tick/keepalive-drain (no world load), 1 = world-entry seed, any other value = early-return / ignore
  - { name: HeaderOpaque, type: "u8[11]", offset: 1 } # leading header bytes (carried into the table-A block copy)
  - { name: AreaId, type: u32, offset: 12 }          # absolute area index; checked only != 0. Its 3-digit decimal directory form (<id>.lst, e.g. id 6 -> "006", id 12 -> "012") selects the on-disk area. Date/time fields never participate in this directory selection.
  - { name: Year, type: u32, offset: 16 }            # world-clock seed: calendar/year component. Feeds the calendar seed only; never the map directory.
  - { name: Month, type: u8, offset: 20 }            # world-clock seed: month. Carries the 1..12 calendar guard. Feeds the calendar seed only; never the map directory.
  - { name: Day, type: u8, offset: 21 }              # world-clock seed: day. Calendar-seed input only.
  - { name: Hour, type: u8, offset: 22 }             # world-clock seed: hour. Time-seed input only.
  - { name: Minute, type: u8, offset: 23 }           # world-clock seed: minute. Time-seed input only.
  - { name: WorldEntryTableA, type: "u8[3088]", offset: 24 }   # 3088-byte interior block -> copied to world/actor table A global, then a stale-slot sweep runs.
  - { name: WorldEntryTableB, type: "u8[4044]", offset: 3112 } # 4044-byte interior block -> copied to world/actor table B global, then a stale-slot sweep runs.
  - { name: HotbarSlots, type: "u8[1920]", offset: 7156 }      # 1920-byte interior block -> copied verbatim to the hotbar global.
  - { name: SpawnX, type: f32, offset: 9076 }        # local-player spawn X; feeds the local-player position set and terrain cold-start (world Y forced 0).
  - { name: SpawnZ, type: f32, offset: 9080 }        # local-player spawn Z; feeds the local-player position set and terrain cold-start (world Y forced 0).
  # --- The game-state-tick handler does NOT read past offset 9080. The fields below
  # --- exist only because the body is a fixed 9100 bytes; their layout/roles are unverified
  # --- by this code path. Listed for completeness, marked live-pending (6-D).
  - { name: TrailingScalar1, type: u32, offset: 9084 }  # live-pending (6-D): not read by the game-state-tick handler; layout/role unverified by this code path.
  - { name: TrailingScalar2, type: u32, offset: 9088 }  # live-pending (6-D): not read by the game-state-tick handler; layout/role unverified by this code path.
  - { name: TrailingScalar3, type: u32, offset: 9092 }  # live-pending (6-D): not read by the game-state-tick handler; layout/role unverified by this code path.
  - { name: TrailingScalar4, type: u8, offset: 9096 }   # live-pending (6-D): not read by the game-state-tick handler; layout/role unverified by this code path.
  - { name: TrailingScalar5, type: u8, offset: 9097 }   # live-pending (6-D): not read by the game-state-tick handler; layout/role unverified by this code path.
  - { name: Padding, type: "u8[2]", offset: 9098 }      # live-pending (6-D): tail bytes to align to 9100; not read by this code path; role unverified.

notes: |
  Static analysis only; no capture available. The client reads the entire 9100-byte block
  into one buffer and branches on FormSelector.

  FORM 0 (Periodic Tick / Keepalive Drain):
    - Branches when FormSelector == 0.
    - Pure tick/keepalive-drain path: no world load. Updates client timers and the keepalive
      drain bookkeeping, and shuts down the main loop if network state is lost.

  FORM 1 (World Entry Seed):
    - Branches when FormSelector == 1.
    - Copies WorldEntryTableA (3088 bytes @ 24) to the world/actor table A global, then runs a
      stale-slot sweep over that table.
    - Copies WorldEntryTableB (4044 bytes @ 3112) to the world/actor table B global, then runs a
      stale-slot sweep over that table.
    - Copies HotbarSlots (1920 bytes @ 7156) verbatim into the hotbar global, restoring the
      player's quick-slot configuration.
    - Sets the local player position from (SpawnX, 0, SpawnZ) and cold-starts terrain generation
      (world Y forced to 0).
    - Seeds the world clock from the date/time fields: the Year field feeds the calendar seed and
      Hour/Minute feed the time seed (Month carries the 1..12 calendar guard, Day the calendar
      seed). The AreaId selects the map directory; the date/time fields never do.
    - CLEARS the periodic-heartbeat suppress flag, un-suppressing the independent idle heartbeat
      sender (2/10000). It does NOT enable the 2/112 keepalive: the 2/112 keepalive ENABLE is
      fired separately by the scene state machine just before the in-world loop, not by this packet.

  AreaId vs date/time (corrected):
    - The "< 13" bound is NOT on AreaId. It is a 1..12 calendar guard on the Month field
      (offset 20). AreaId is checked only for != 0; its full u32 value is the absolute area index.

  Interior-block layout (confirmed by contiguity):
    - 24 + 3088 + 4044 + 1920 = 9076, then SpawnX @ 9076 and SpawnZ @ 9080.
    - Ordering is table A (3088) @ 24, then table B (4044) @ 3112, then hotbar (1920) @ 7156.
      The earlier inverted note (table A ~0xFCC / table B ~0xC10) is REFUTED.

  Interior record strides (CYCLE 12 / Phase 3, control-flow-confirmed + counter-confirmed on 263bd994):
    The three interior blocks are NOT opaque -- their internal record layouts are now recovered from
    the Form-1 consumers (the two stale-slot sweeps and the verbatim hotbar copy):
    - WorldEntryTableA (3088 bytes @ 24): a flat array of 16-byte records (capacity 193; the sweep
      walks 120 records). Per record: lead group bytes +0..3; an actor-id u32 @+4; a keep-guard u32
      @+8 (the sweep evicts a slot only when this is 0; the same dword doubles as the displayed
      member number); an aux value u32 @+12. Role: the roster-panel slot source (a label grid).
    - WorldEntryTableB (4044 bytes @ 3112): a HETEROGENEOUS block, not one flat array --
      240 x 16-byte scene tracked-entity / actor-slot records (first 3840 bytes; same
      {lead / id@+4 / keep-guard@+8 / aux@+12} record shape and the same evict predicate as table A)
      + a 20-byte unswept gap + a 21 x 8-byte category-entry tail list (each entry = a u32 category +
      an i32 value) + a 16-byte world-target selection record. 3840 + 20 + 168 + 16 = 4044 exactly.
      Role: the scene's tracked-entity / actor-slot table (party / spawn-group queries also key off
      it). See specs/world_systems.md and specs/world_entry.md for the table roles.
    - HotbarSlots (1920 bytes @ 7156): 240 slots of 8 bytes, copied verbatim into the hotbar global.
      Per slot: an entry key u32 @+0 (0 = empty slot); a count u16 @+4 (quantity / charge); 2 trailing
      bytes unused. There is NO inline type byte -- skill-vs-item is decided by looking the entry key
      up in the skill/action catalogue and reading the catalogue record's category field (value 5 =
      skill; other small values = non-skill families, whose human meaning is capture-pending). See
      specs/world_entry.md (hotbar init).
    The eviction predicate for both 16-byte tables: a slot is evicted only when its id is non-zero AND
    the referenced actor resolves AND that actor's stale flag is set AND the keep-guard is 0.

  live-pending (6-D) — value-only items not settled by static analysis:
    - The concrete AreaId value the replica sends, and confirmation that its 3-digit directory
      form resolves to a real <id>.lst on the VFS.
    - Whether the Year field is a real calendar year or an epoch index.
    - The trailing-scalar region (offsets 9084..9099): layout and roles. The game-state-tick
      handler does not read past offset 9080, so these are unverified by this code path.
