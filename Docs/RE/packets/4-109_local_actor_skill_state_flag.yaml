#                 id u32@0x04 (gated == local player), and a flag byte@0x08 -- are control-flow-confirmed;
#                 the handler's write destination is a live-actor runtime offset, NOT a wire field; the
#                 flag's VALUE meaning is capture/debugger-pending)
