#
# VERIFICATION BANNER
#   verification: confirmed  (opcode->handler routing, the 28-byte header, the Phase byte @+0x08, the
#                 Coin i64 @+0x0C, the OwnerId @+0x14, the Count @+0x18, and the 16-byte record stride
#                 with a 40-entry apply cap are control-flow-confirmed; every VALUE meaning is
#                 capture/debugger-pending)
#   ida_reverified: 2026-06-20
#   ida_anchor: 263bd994
#   ida_reverified: 2026-06-27 (CYCLE 14 deep-verify)   ida_anchor: f61f66a9   evidence: [static-ida]
#     -- CYCLE 14 deep-verify (f61f66a9): body layout re-traced against handler, 4 fields re-confirmed SAME
#        (Phase@8, Coin@0xc, OwnerId@0x14, Count@0x18; eviction cap 40; 16B record stride), 0 corrected.
#   conflicts: CORRECTED. The prior reading placed Count @+0x09 and a single Subtype @+0x08 {4=apply},
#              with no coin/owner fields. The binary shows a richer header: a PHASE byte @+0x08
#              (0=cancel / 1=ready / 4=commit), a Coin i64 @+0x0C, an OwnerId @+0x14, and the record
#              Count @+0x18 (NOT +0x09). BINARY WINS.

name: SmsgUserTradeFullResponse
opcode: 0x40019             # major 4 (Response), minor 25 -> (4 << 16) | 25
direction: S2C
size: var                  # 28-byte (0x1C) fixed header + Count x 16-byte slot records (Count <= 40)
spec: packets/4-25_trade_full_response.yaml
status: hypothesis
capture_verified: false

summary: Server ready / cancel / commit driver and bulk-refresh of the player-to-player trade window. A 28-byte header carrying a phase byte, a 64-bit coin amount, an owner-id side discriminator, and a record count, followed (on the commit phase) by a count-prefixed array of 16-byte slot records (capped at 40). The bulk / phase counterpart to the incremental 4/24 single-slot update. Pairs with C2S 2/25 CmsgTradeConfirm and the 2/24 add flow.

# Variable-length: a FIXED 28-byte (0x1C) header, then -- on the commit phase -- a loop of Count x
# 16-byte (0x10) slot records (the free-slot fold caps at 40). Per packet-codegen rules a `size: var`
# message generates the FIXED head only; the trailing record array is left to the serializer and is NOT
# modelled as a fixed buffer.
fields:
  - { name: Head0,   type: "bytes[8]" }   # 0x00  leading ack-header region (the phase byte is the next field)
  - { name: Phase,   type: u8 }           # 0x08  phase: 0 = cancel/close, 1 = ready (own vs partner via OwnerId), 4 = commit (fold records + finalize)
  - { name: Pad0,    type: "bytes[3]" }   # 0x09  filler to the coin qword
  - { name: Coin,    type: i64 }          # 0x0c  trade coin / money amount (64-bit; credited on commit)
  - { name: OwnerId, type: u32 }          # 0x14  owner actor id -- side discriminator (== local player -> my side, else partner)
  - { name: Count,   type: u32 }          # 0x18  number of trailing 16-byte slot records (apply loop caps at 40)
  # -- variable tail (NOT a fixed buffer; left to the serializer) --
  # Count x 16-byte slot record, each folded into the local trade-slot table:
  #   +0x00 u32   slot field 1 (item id / key -- the icon driver, by analogy with the 4/24 ItemId)
  #   +0x04 u32   slot field 2 (count / quantity -- unlabelled)
  #   +0x08 u32   slot field 3 (unlabelled)
  #   +0x0c u32   slot field 4 (unlabelled)

notes: |
  CONTROL-FLOW CONFIRMED: the 28-byte header, the Phase byte @+0x08, the Coin i64 @+0x0C, the OwnerId
  @+0x14, the Count @+0x18, and the 16-byte record stride with a 40-entry apply cap. CAPTURE-UNVERIFIED
  for VALUE meanings.

    0x08 (1B) Phase   : the in-window state-machine driver. 0 = cancel / close (notice path, no records);
                        1 = ready (sets the ready state for one side, own vs partner picked by OwnerId);
                        4 = commit -> fold the Count x 16-byte records into the slot table, credit Coin,
                        release sold slots, and finalize / clear the tables.
    0x0c (8B) Coin    : the trade coin / money amount (signed 64-bit), credited on the commit phase. Sign
                        / scale capture-pending.
    0x14 (4B) OwnerId : the owner actor id side discriminator: when it equals the local player id the
                        record/ready applies to MY side, otherwise the PARTNER side.
    0x18 (4B) Count   : the number of trailing 16-byte slot records (the commit fold caps at 40 entries).

  TRAILING RECORD ARRAY (variable region, NOT a fixed buffer): on the commit phase the body holds Count
  records of 16 bytes each, each folded into the local trade-slot table. By analogy with the 4/24
  single-slot record the first dword of each 16-byte record is the item id / key; the remaining three
  dwords (count / quantity / extra) are unlabelled and capture-pending. A `size: var` packet generates
  the fixed head only; the engineer's serializer walks the Count-prefixed tail.

  HOW THE CLIENT USES IT: 4/25 drives ready/cancel/commit and (on commit) repopulates the trade offer in
  one message; 4/24 SmsgUserTradeSlotUpdate (packets/4-24_trade_slot_update.yaml) applies a SINGLE slot
  incrementally. Both feed the same one-grid two-side trade window (10 rows x 6 columns, 60 cells per
  side, toggled). Money slots follow the 4/24 category convention (Category 0xFF).

  UNKNOWNS to resolve with a trade capture (the header offsets + record stride are settled; these are
  VALUE questions):
    - the Coin sign / scale on commit;
    - the four per-record fields (item id, quantity, and the two trailing dwords);
    - the full Phase enum beyond {0, 1, 4} (2/3 are notice arms).

  RELATIONSHIP: server side of the in-window trade flow. The client commits/cancels with C2S 2/25
  CmsgTradeConfirm (packets/2-25_trade_confirm.yaml) and adds slots with 2/24 CmsgTradeSlotAdd
  (packets/2-24_trade_slot_add.yaml); the request handshake is 2/23 -> 4/23.
