name: SmsgDungeonEventStateSyncB
opcode: 0x50056           # major 5 (Push), minor 86 -> (5 << 16) | 86
direction: S2C
size: 20                  # fixed 20-byte body (0x14)
spec: packets/5-86_dungeon_event_state_sync_b.yaml
status: hypothesis
capture_verified: false

summary: >
  Server syncs dungeon/event state (variant B). A fixed 20-byte body with the same 8-byte opaque header
  as 5/85, followed by a mode byte (0..4) selecting a sub-path, then two u32 payload values. The handler
  branches on the mode byte plus the RESIDENT scenario id, arms a timer, writes state/flag fields on a
  per-event service slot and the local player, then commits.

# Wire order, offset 0 = first payload byte. Pack=1; widths sum to size: 20.
# The geometry mirrors 5/85 SmsgDungeonEventStateSyncA (same 8-byte opaque header, then payload dwords).
# There is NO leading Mode byte at offset 0; Mode is at 0x08 (after the header).
fields:
  - { name: Header,  type: "bytes[8]" }   # 0x00  opaque 8-byte leading header (same convention as 5/85; not field-read for branching)
  - { name: Mode,    type: u8 }           # 0x08  mode byte: 0 = teardown; 1 / 2 / 3 / 4 = distinct sub-paths
  - { name: Pad1,    type: "bytes[3]" }   # 0x09  alignment padding within the dword at 0x08
  - { name: ValueA,  type: u32 }          # 0x0C  sub-index / selector value (drives the per-mode field writes)
  - { name: ValueB,  type: u32 }          # 0x10  payload value (written into event-state object slots)
  # widths: 8 + 1 + 3 + 4 + 4 = 20

notes: |
  CONTROL-FLOW CONFIRMED: the fixed 20-byte body, the opaque 8-byte header, Mode at 0x08, and the two
  payload dwords at 0x0C / 0x10. CAPTURE-UNVERIFIED for the VALUE meanings.

    0x00 (8B) Header : opaque leading header region, NOT field-read for branching (same geometry as 5/85
                       SmsgDungeonEventStateSyncA). There is NO Mode byte at offset 0.
    0x08 (1B) Mode   : the mode byte. 0 = teardown; 1 / 2 / 3 / 4 select distinct sub-paths.
    0x09 (3B) Pad1   : alignment padding.
    0x0C (4B) ValueA : a sub-index / selector value that drives the per-mode field writes (also acts as
                       a presence / scenario value in some branches; compared to localplayer+1856 in mode 3).
    0x10 (4B) ValueB : a payload value written into event-state object slots (slot 7/8/10/14/3/4 per branch).

  SCENARIO ID IS NOT ON THE WIRE: as with 5/85, the branch scenario id (300 / 301) is RESIDENT in the
  dungeon-event-state object, not carried by this packet.

  RUNTIME-OFFSET HYGIENE (DO-NOT-PROMOTE-AS-WIRE): ValueA/ValueB are scattered into event-state object
  slots, a per-event service slot, and local-player fields, and a timer is armed. Those runtime
  destinations are not wire fields.

  UNKNOWNS to resolve with a capture: the per-mode meaning of ValueA/ValueB and the full Mode enum.

  RELATED: 5/85 SmsgDungeonEventStateSyncA (packets/5-85_dungeon_event_state_sync_a.yaml).
