# Clean-room field spec. Promoted from a neutral analyst note; rewritten, not copied.
#
# VERIFICATION BANNER
#   verification: confirmed  (opcode->handler routing, the fixed 36-byte body, and the full offset
#                 table -- sort@0x00, id@0x04, stat@0x08, stat@0x0C, CurrentXp i64@0x10..0x17,
#                 stat@0x18, stat@0x1C, stat@0x20 -- are control-flow-confirmed via handler stack frame;
#                 the identity of each stat value (which of STR/INT/AGI/DEX/CON maps to which offset)
#                 is capture-pending)
#   ida_reverified: 2026-06-24
#   ida_anchor: 263bd994c927c20a38624cf0ca452eaef365057fa9db1543d8f668c14a6fd8ee
#   evidence: [static-ida]
#   conflicts: CORRECTED. The prior layout placed five contiguous u32 stats at 0x08..0x18 with CurrentXp
#              i64 at 0x1C (and total stat+XP region 0x08..0x23). The binary refutes this: the CurrentXp
#              qword sits at 0x10..0x17 (splitting the stat values), stat values occupy 0x08/0x0C/0x18/
#              0x1C/0x20, and the assumed STR/INT/AGI/DEX/CON ordering is also refuted. Four of the five
#              stats are pushed to actor stat channels {0, 2, 6, 5}; the value at 0x1C is written only to
#              the actor with no channel push. BINARY WINS.

name: SmsgStatsUpdate
opcode: 0x50043           # major 5 (Push), minor 67 -> (5 << 16) | 67
direction: S2C
size: 36                 # fixed 36-byte payload block
spec: packets/5-67_stats_update.yaml
status: hypothesis
capture_verified: false

summary: >
  Server pushes an authoritative resync of the local player's five primary stats and current XP.
  A fixed 36-byte body: an actor key header, five stat values interleaved around a 64-bit current-XP
  qword, pushed to actor stat channels and the XP accumulator. Local-player gated; primes the exp bar
  on world entry and overwrites cached stats wholesale.

# Wire order, offset 0 = first payload byte. Pack=1; widths sum to size: 36.
# The CurrentXp i64 sits at 0x10..0x17, splitting the stat values into two groups (0x08/0x0C before,
# 0x18/0x1C/0x20 after). Four stats are pushed to actor channels {0,2,6,5}; the stat at 0x1C is
# written only to the actor with no channel push. Stat identity (which named stat maps to which offset)
# is capture-pending.
fields:
  - { name: Sort,    type: u8 }           # 0x00  actor sort / class key (read into a dword for the lookup)
  - { name: Pad0,    type: "bytes[3]" }   # 0x01  alignment padding
  - { name: ActorId, type: u32 }          # 0x04  actor id (local-player gate: matches localplayer+92)
  - { name: StatA,   type: u32 }          # 0x08  stat value -> actor+880; pushed to stat channel 0
  - { name: StatB,   type: u32 }          # 0x0C  stat value -> actor+900; pushed to stat channel 2
  - { name: CurrentXp, type: i64 }        # 0x10  current-XP qword -> actor+152; primes the exp bar
  - { name: StatC,   type: u32 }          # 0x18  stat value -> actor+916; pushed to stat channel 6
  - { name: StatD,   type: u32 }          # 0x1C  stat value -> actor+892; NO channel push (actor-only write)
  - { name: StatE,   type: u32 }          # 0x20  stat value -> actor+885 (byte); pushed to stat channel 5
  # widths: 1 + 3 + 4 + 4 + 4 + 8 + 4 + 4 + 4 = 36

notes: |
  CONTROL-FLOW CONFIRMED: the fixed 36-byte body and the complete offset table. CAPTURE-UNVERIFIED for
  the mapping from wire offsets to named primary stats (STR / INT / AGI / DEX / CON).

  WIRE LAYOUT (36-byte body):
    0x00 (1B) Sort     : actor sort / class key; read into a dword for the actor lookup.
    0x01 (3B) Pad0     : alignment padding.
    0x04 (4B) ActorId  : actor id; the local-player gate compares this to localplayer+92.
    0x08 (4B) StatA    : stat value written to actor+880 and pushed to actor stat channel 0.
    0x0C (4B) StatB    : stat value written to actor+900 and pushed to actor stat channel 2.
    0x10 (8B) CurrentXp: current-XP qword written to actor+152 (same accumulator as 5/9 SmsgExpGain);
                         also copied to g_CurrentStanceTier and localplayer+152. Primes the exp bar.
    0x18 (4B) StatC    : stat value written to actor+916 and pushed to actor stat channel 6.
    0x1C (4B) StatD    : stat value written to actor+892. NO actor stat channel push -- actor-only write.
    0x20 (4B) StatE    : stat value written to actor+885 (byte field) and pushed to actor stat channel 5.

  STAT CHANNEL SUMMARY: four of the five stat values are pushed to channels {0, 2, 6, 5} (in wire order).
  The value at 0x1C (StatD -> actor+892) is written only to the actor struct; no channel notification.

  STAT IDENTITY (CAPTURE-PENDING): the exact mapping of StatA..StatE to named stats (STR / INT / AGI /
  DEX / CON) is unconfirmed. The earlier model of STR/INT/AGI/DEX/CON in wire order and five contiguous
  u32s is refuted by the binary. Resolve with a world-entry stat resync capture.

  RELATED: 4/29 SmsgStatUpdate (packets/4-29_stat_update.yaml) is the allocation ACK (echoes the five
  stats + remaining points); this 5/67 is the unsolicited authoritative resync. 5/9 SmsgExpGain
  (packets/5-9_exp_gain.yaml) increments the same XP accumulator this message seeds. UNBLOCKS the
  world-entry stat/XP sync in Client.Application.
