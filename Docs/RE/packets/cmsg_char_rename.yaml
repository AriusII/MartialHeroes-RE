# Clean-room field spec. Promoted from a neutral analyst note; rewritten, not copied.
# CAPTURE-UNVERIFIED field internals; size + slot+name split are static-HIGH. capture_verified: false.

name: CmsgRenameCharacter
opcode: 0x1000d           # major 1, minor 13 -> (1 << 16) | 13
direction: C2S
size: 18                  # fixed 18-byte (0x12) payload
spec: packets/cmsg_char_rename.yaml
status: hypothesis
capture_verified: false

summary: >
  Rename-character request from the character-select screen. An 18-byte body: a leading slot-index
  byte then a 17-byte fixed CP949 new-name buffer (NUL-terminated). The workflow-spine analysis
  refines the earlier "18-byte name-only" model: the body is a contiguous 1 + 17 run (slot + name),
  not a single 18-byte name buffer. Server replies S2C 3/6 RenameCharResult (and a 3/4 subtype-1
  refresh).

# Wire order, offset 0 = first payload byte. Pack=1; widths sum to size: 18.
fields:
  - { name: SlotIndex, type: u8 }            # 0x00  slot being renamed (the currently selected slot)
  - { name: NewName,   type: "bytes[17]" }   # 0x01  new character name, CP949, NUL-terminated within the buffer

notes: |
  Static analysis only; no capture. The select-screen rename action validates the new name, copies
  it into a fixed buffer adjacent to the slot byte, and emits exactly 18 bytes. Frame = 8-byte
  header + 18 = 26 bytes on the wire.

    0x00 (1B)  SlotIndex : the slot being renamed (the currently selected slot). STATIC HIGH.
    0x01 (17B) NewName   : the new character name as a fixed 17-byte buffer holding a CP949
                           (Korean code page 949) string, NUL-terminated. The select screen caps
                           display names so the name + terminator fit the 17 bytes. Decode as a
                           fixed [InlineArray] blob, trim at the first NUL, then decode CP949 --
                           never a managed string on the wire. STATIC HIGH.

  NAME VALIDATION (client-side, before send; useful for the server too): minimum length 2; allowed
  characters are ASCII lowercase a-z + digits 0-9 + CP949 double-byte Hangul; uppercase Latin and
  punctuation rejected; a profanity filter and a duplicate-name check run. So a valid name is Hangul
  and/or lowercase-alphanumeric only. Same rule as the 1/6 create name field.

  SEQUENCE: client sends 1/13 -> server replies S2C 3/6 RenameCharResult (nonzero result = success,
  carries the applied name). A rename outcome also routes through the 8-byte manage-result handler
  (3/4, subtype 1) to refresh the slot name -- see packets/3-4_char_manage_result.yaml.

  UNKNOWNS (capture-only): the exact CP949 length cap the server enforces within the 17-byte field.

  RELATED: 1/0 logout, 1/6 create, 1/7 select, 1/9 enter, 1/14 slot-move. All gated by the single
  select-window net-busy latch.

  UNBLOCKS: Client.Application RenameCharacter use-case (reply 3/6 / 3/4 subtype 1).
