  Static inference only; no capture available. CODE-CONFIRMED layout (76 bytes),
  CAPTURE-UNVERIFIED meaning.

    0x00 (56B) MaterialSlots : 14 little-endian u32 values, one per material slot in the
                               crafting grid. Each slot holds either a material item id or
                               zero if the slot is empty.
    0x38 (16B) ExtraParams   : 4 little-endian u32 values for extra crafting parameters.
