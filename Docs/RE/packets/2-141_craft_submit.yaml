    0x48 (1B)  NpcActorIndex : the NPC actor index the player is interacting with for
                               crafting (le u8).
    0x49 (3B)  Padding       : padding to bring total to 76 bytes.

  CONTEXT: sent when the player confirms a crafting recipe at a crafting NPC.
  The MaterialSlots array corresponds to the 14-slot crafting panel grid in the UI.

