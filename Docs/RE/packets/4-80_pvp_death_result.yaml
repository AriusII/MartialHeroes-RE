name: SmsgPvpDeathResult
opcode: 0x40050           # major 4 (Response), minor 80 -> (4 << 16) | 80
direction: S2C
size: 80                 # fixed 80-byte payload block (0x50)
spec: packets/4-80_pvp_death_result.yaml
status: hypothesis
capture_verified: false

summary: >
  Server pushes a PvP death result. A fixed 80-byte block decoded inline: an 8-byte echo head, a
  self-vs-remote branch gate byte, a reason/notice code byte (selects a localized PvP death/kill
  notice string), a subtype byte (a value of 6 runs a local death effect), a 1-byte gap, then a
  target actor id at +0x0C; the remaining 64-byte opaque tail follows at +0x10. On the self branch it
  runs a local death path; on the remote branch it updates the slain actor and posts the notice string.

# Wire order, offset 0 = first payload byte. Pack=1; widths sum to size: 80. Only the header through
# the target id is decoded by the handler; the 40-byte tail is reserved opaque.
fields:
  - { name: EchoHead,    type: "bytes[8]" }    # +0x00  echo / leading dwords (forwarded on the self branch) -- opaque
  - { name: SelfGate,    type: u8 }            # +0x08  branch gate: == 1 -> self-death local path; else remote path
  - { name: ReasonCode,  type: u8 }            # +0x09  reason / notice code; selects a localized PvP death/kill string (see map)
  - { name: Subtype,     type: u8 }            # +0x0A  subtype; == 6 -> run a local death effect on the local player
  - { name: GapA,        type: "bytes[1]" }    # +0x0B  gap (1 byte, not read) -- opaque
  - { name: TargetId,    type: u32 }           # +0x0C  target actor id (by-key actor lookup; also keys an effect deactivation)
  - { name: OpaqueTail,  type: "bytes[64]" }   # +0x10  opaque tail (0x10..0x4F, 64 bytes) not read by this handler -- opaque section boundary, inner shape PENDING
  # widths: 8 + 1 + 1 + 1 + 1 + 4 + 64 = 80 (decoded header +0x00..+0x0F = 16 bytes; opaque tail
  # +0x10..+0x4F = 64 bytes). CYCLE 14 deep-verify: corrected from prior GapA=9B/TargetId@+0x14/OpaqueTail=56B.

notes: |
  CONFIRMED routing + size (a fixed 0x50 = 80-byte read) + the decoded header region (the self gate,
  the reason code, the subtype, and the target id are confirmed reads). The remainder of the 80-byte
  block is OPAQUE (the handler does not sub-index it). Field VALUE meanings are LIKELY where named.
  [capture/debugger-pending] for value meanings. The field widths sum to exactly 80 (verified):
  a 16-byte decoded header (+0x00..+0x0F) + a 64-byte opaque tail (+0x10..+0x4F).
  CYCLE 14 deep-verify (f61f66a9): TargetId location corrected from +0x14 to +0x0C; GapA corrected
  from 9 bytes to 1 byte; OpaqueTail corrected from 56B@+0x18 to 64B@+0x10.

  REASON-CODE -> NOTICE-STRING MAP (the +0x09 reason byte selects a localized message-string id;
  ids are message-database keys, NOT addresses):
    0  -> 49059    1  -> 49060    2  -> 49061    3  -> 49062
    4  -> 49063    5  -> 49064    6  -> 49065   13  -> 49081
   14  -> 74307   15  -> 49080   default -> 49066
  The exact string wording is in the client message database; only the code->id mapping is
  static-confirmed this pass.

  BRANCHES:
    +0x08 SelfGate == 1 -> the self-death local path (forwards the echo head, runs the local death
                           handling, returns).
    +0x08 SelfGate != 1 -> the remote path: resolve the target actor and post the reason notice.
    +0x0A Subtype  == 6 -> additionally run a local death effect on the local player.

  TARGET ID (+0x0C): a u32 actor id resolved by the by-key actor lookup (with a fixed NPC sort);
  also used to deactivate a death/finisher visual effect keyed on that actor. (Corrected from +0x14
  by CYCLE 14 deep-verify on f61f66a9.)

  OPAQUE TAIL (+0x10..+0x4F): reserved as one OPAQUE SECTION BOUNDARY -- not read by this handler. Do
  NOT invent byte meanings inside it. Inner shape PENDING (capture/debugger). (Corrected from
  +0x18..+0x4F/56B to +0x10..+0x4F/64B by CYCLE 14 deep-verify on f61f66a9.)

  RELATED: 5/80 SmsgPvpDeathFx spawns the death/finisher visual effects (a separate push). This 4/80
  result drives the notice string and the slain-actor update.

  UNBLOCKS: the Client.Application PvP death-result handler (4/80) -- the header decode is solid; the
  64-byte opaque tail (+0x10..+0x4F) and the reason-string wording are capture-pending.
