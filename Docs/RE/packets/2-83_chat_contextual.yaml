name: CmsgChatContextual
opcode: 0x20053           # major 2 (GameAction), minor 83 -> (2 << 16) | 83
direction: C2S
size: var                 # 24-byte fixed-size context header + length-prefixed text body
spec: packets/2-83_chat_contextual.yaml
status: hypothesis
capture_verified: false

summary: Client chat with a 24-byte opaque context prefix (sender/target/channel metadata), followed by a length-prefixed CP949 text body whose u32 length INCLUDES the terminating NUL (len = strlen+1). Gated to 0 < strlen < 200 before send. A single large panel drives it. Distinct from the 2/7 whisper (19-byte prefix, length EXCLUDES NUL) and the 3/21 channel form.

# The 24-byte header is a context/metadata struct whose internal field breakdown was NOT decoded
# this pass. It is modelled as one opaque fixed buffer so the engineer can frame the packet and the
# variable text body correctly; do not assume sub-field meanings yet.
fields:
  - { name: ContextHeader, type: "bytes[24]" }  # 0x00  24-byte context/metadata struct (fields not yet decoded)

notes: |
  Static inference only; no capture available. VARIABLE-LENGTH packet.

  Header = 24 bytes (0x00..0x17): an opaque context struct carrying sender / target / channel metadata,
  appended verbatim (raw byte-run) from the caller. Its internal field breakdown was NOT decoded this
  pass and is modelled here as a single opaque 24-byte buffer (a single panel caller builds it).

  GATE (control-flow CONFIRMED): the builder reads strlen(text) first; it aborts (sends nothing) if
  strlen >= 200, and also aborts if strlen == 0 — so the effective gate is 0 < strlen < 200, and the
  appended length (incl-NUL) lands in 1 < len < 200.

  BODY (after the 24-byte prefix): a length-prefixed CP949 text block:
    [u32 textLength][text bytes]
  where textLength = strlen(text) + 1 (INCLUDES the terminating NUL). CONFIRMED. (Contrast 2/7 CmsgChat,
  whose u32 length EXCLUDES the NUL — 2/7 is the lone exclude-NUL outlier among the C2S chat sends.)

  UNKNOWNS to resolve with a follow-up send-site analysis and a capture:
    - the full field layout of the 24-byte context header (sender id / target id / channel selector
      are the likely contents by analogy with the 2/7 and 5/7 chat headers);
    - the text charset.

  UNBLOCKS: Client.Application chat-send (contextual) use-case.
