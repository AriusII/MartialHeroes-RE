  - { name: SlotRecord, type: "bytes[8]" }   # 0x00  slot-change descriptor applied to the NPC shop panel
  - { name: Result,     type: i32 }          # 0x08  nonzero (== 1) = apply the slot change; 0 = clear the shop panel

