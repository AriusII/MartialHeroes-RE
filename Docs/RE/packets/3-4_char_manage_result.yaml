# Clean-room field spec. Promoted from a neutral analyst note; rewritten, not copied.
# CAPTURE-UNVERIFIED: every offset below is a static inference. capture_verified: false.

name: SmsgCharManageResult
opcode: 0x30004           # major 3 (CharacterMgmt), minor 4 -> (3 << 16) | 4
direction: S2C
size: 8                   # fixed 8-byte block read by the char-manage result handler
spec: packets/3-4_char_manage_result.yaml
status: hypothesis
capture_verified: false

summary: >
  Character create / delete / rename / manage result. An 8-byte block: a result byte, a subtype
  byte that selects which character operation the result is for (delete / rename / generic
  refresh), and a 4-byte ready_time used to drive the same-day delete-cooldown timer. NOTE the
  handler is mislabelled "3/7" in raw decompiler output; behaviour-anchored it is the 3/4 manage
  result. 3/7 itself is the separate SmsgCharSpawnResult.

# Wire order, offset 0 = first payload byte. Pack=1; the widths sum to size: 8.
fields:
  - { name: Result,    type: u8 }    # 0x00  result code (1 = success path, 0 = blocked/cooldown)
  - { name: Reserved1, type: u8 }    # 0x01  unmapped byte between Result and Subtype
  - { name: Subtype,   type: u8 }    # 0x02  which character op this result is for (0/1/2 -- see notes)
  - { name: Reserved3, type: u8 }    # 0x03  unmapped byte; pads to the 4-byte boundary before ready_time
  - { name: ReadyTime, type: u32 }   # 0x04  delete-cooldown ready timestamp (used when Result == 0)

notes: |
  Static inference only; no capture available. The char-manage result handler reads three fixed
  fields out of an 8-byte block at the offsets below. Frame = 8-byte header + 8 = 16 bytes.

    0x00 (1B) Result    : result code. Observed branches: 1 = success path; 0 = blocked, where a
                          future ReadyTime drives a cooldown message. HIGH CONFIDENCE on the two
                          observed values; the full enum is not enumerated.
    0x01 (1B) Reserved1 : a byte between Result and Subtype not consumed by the traced handler.
                          Model as reserved/padding until a capture clarifies it.
    0x02 (1B) Subtype   : selects which character operation the result applies to. Observed:
                            0 -> generic slot refresh,
                            1 -> rename applied (refresh the slot's displayed name),
                            2 -> DELETE confirmed (decrement account char count, clear the slot).
                          HIGH CONFIDENCE on {0,1,2}.
    0x03 (1B) Reserved3 : a byte before the 4-byte ReadyTime; not consumed by the traced handler.
                          Model as reserved/padding.
    0x04 (4B) ReadyTime : a timestamp (le u32). Used on the Result == 0 path to compute a
                          same-day delete-cooldown: the client shows "deletion forbidden today,
                          HH hours MM minutes" from (ReadyTime - now), splitting the remaining
                          seconds into hours and minutes. MEDIUM CONFIDENCE on the field; its
                          exact epoch/units need a capture (see unknowns).

  NAMING CAUTION (flag for engineers): the inbound handler that decodes this 8-byte block carries
  a stale "3/7" label in raw decompiler output. Behaviour-anchored, it is the 3/4 manage result.
  The genuine 3/7 opcode is SmsgCharSpawnResult (the spawn-into-world response), a DIFFERENT
  message -- do not conflate them.

  RELATED: this is the inbound counterpart to the C2S char-management senders 1/13 rename and
  1/14 delete (and the create path 1/6 reading B). The create accept/refuse path also surfaces a
  distinct 12-byte create result (3/23 SmsgCharCreateResult) and a 19-byte rename result
  (3/6 SmsgRenameCharResult); those are separate messages owned elsewhere.

  UNKNOWNS to resolve with a capture of delete / rename results:
    - the meaning of the two reserved bytes at 0x01 and 0x03 (true padding vs small fields);
    - the epoch and units of ReadyTime (the client treats the delta as seconds and splits into
      HH:MM, but the absolute base is not confirmed);
    - the full Result enum beyond {0, 1}.

  UNBLOCKS: Client.Application delete / rename result handling + the delete-cooldown UX.
