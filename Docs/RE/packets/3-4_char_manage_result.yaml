name: SmsgSceneEntityUpdate
opcode: 0x30004           # major 3 (CharacterMgmt), minor 4 -> (3 << 16) | 4
direction: S2C
size: var                 # variable-length; no fixed field table (slot-scratch refill / scene refresh)
spec: packets/3-4_char_manage_result.yaml
status: hypothesis
capture_verified: false

summary: >
  Character-select / character-management scene refresh. Opcode (3:4). A variable-length message the
  inbound dispatcher routes through the major-3 inline minor ladder; its handler refills the
  per-slot scene scratch and refreshes the char-management scene's displayed entities. It carries NO
  fixed field block this pass -- the body is consumed by the slot-decode path, so there is no
  promotable offset table here. Routing (opcode -> handler) is control-flow-confirmed; the body field
  layout and any wire VALUE semantics are capture/debugger-pending.

# No fixed field table. SmsgSceneEntityUpdate is variable-length and its body is decoded by the
# scene/slot refill path rather than read as one fixed struct, so this spec intentionally has no
# `fields:` block. The engineer must NOT generate a packed struct from this file.
fields: []

notes: |
  Routing CONFIRMED (control-flow), body layout NOT decoded, wire VALUE semantics capture-pending.
  No live capture available this campaign.

  OPCODE / LADDER (RESOLVED, dispatch-confirmed): the major-3 inbound arm is an inline minor ladder.
  The Campaign-10 Block E re-confirmation (control-flow) settles the long-standing 3/4-vs-3/7 hedge:
    - 3/1  = SmsgCharacterList     (3-byte header + 5 x 981-byte slot records; see 3-1_character_list.yaml)
    - 3/4  = SmsgSceneEntityUpdate (THIS message -- variable-length slot-scratch refill / scene refresh)
    - 3/5  = SmsgEnterGameAck      (44-byte account/billing ack; see 3-5_enter_game_response.yaml)
    - 3/7  = SmsgCharManageResult  (8-byte delete/select/rename manage result -- RELOCATED; opcodes.md
                                    3/7 row owns it; the 8-byte block was previously misfiled in THIS file)
    - 3/14 = SmsgCharSpawnResponse (16-byte enter-into-world bridge; no field spec)
  Any doc/YAML that places SmsgSceneEntityUpdate at 3/14 or SmsgCharManageResult at 3/4 is WRONG.

  WHAT IT DOES (CONFIRMED behaviour, for engineer context -- not wire fields): on receipt the handler
  refills the character-management scene's per-slot scratch / refreshes the displayed scene entities.
  It is part of the char-select / char-management presentation flow, not the world spawn (the
  local-player WORLD spawn is driven by 4/1 SmsgGameStateTick).

  WHY NO FIELD TABLE: the body is variable-length and is consumed by the slot/scene decode path, not
  read as a single fixed struct at the dispatch site, so no fixed offset table is promotable from the
  routing handler alone. A capture of a char-management scene refresh is required to decode the body.

  RELATED:
    - SmsgCharManageResult (3:7) -- the 8-byte manage/delete result that USED to live in this file.
      Its model: Result@0x00 (u8), Subtype@0x02 (u8: 0 generic refresh / 1 rename applied /
      2 delete confirmed -> decrement account char count + clear slot), ReadyTime@0x04 (u32, drives the
      same-day delete-cooldown HH:MM message on the Result==0 path); reserved bytes @0x01/@0x03.
      That 8-byte block read is control-flow-confirmed; its field VALUE semantics (reserved-byte
      meaning, ReadyTime epoch/units, full Result enum) stay capture/debugger-pending.
    - C2S counterparts: 1/13 rename, 1/7 manage (delete overloads 1/7 with the mode byte).

  UNKNOWNS to resolve with a capture of a char-management scene refresh:
    - the full body layout of SmsgSceneEntityUpdate (no fixed offset table recovered statically);
    - which scene/slot fields the refill path consumes and their wire types.
