# Clean-room field spec. Promoted from a neutral analyst note; rewritten, not copied.
# CAPTURE-UNVERIFIED: every offset below is a static inference. capture_verified: false.

name: SmsgLevelUp
opcode: 0x50020           # major 5 (Push), minor 32 -> (5 << 16) | 32
direction: S2C
size: 48                 # fixed 48-byte payload block
spec: packets/5-32_level_up.yaml
status: hypothesis
capture_verified: false

summary: Server notifies that an actor levelled up. Carries the new level, refreshed vitals (HP/MP/stamina), and (for the local player) remaining stat points and rank-XP progress.

# Wire order, offset 0 = first payload byte. Pack=1; widths sum to size: 48.
# NOTE: the tail (rank-XP region) packing is uncertain -- see notes. The widths below are chosen so
# the modelled fields sum to exactly 48; treat the last two regions as provisional.
fields:
  - { name: Sort,            type: u8 }       # 0x00  actor sort
  - { name: Pad0,            type: "bytes[3]" } # 0x01  alignment padding
  - { name: ActorId,         type: u32 }      # 0x04  actor id
  - { name: NewLevel,        type: u16 }      # 0x08  new level
  - { name: Pad1,            type: "bytes[2]" } # 0x0a  alignment padding to the next dword
  - { name: RemainingStatPoints, type: i32 }  # 0x0c  remaining stat points (local player)
  - { name: Value,           type: i32 }      # 0x10  secondary value (local player)
  - { name: HpMpPacked,      type: i64 }      # 0x14  HP:MP packed (current HP i32 : current MP i32)
  - { name: Stamina,         type: i32 }      # 0x1c  current stamina
  - { name: Tail20,          type: "bytes[4]" } # 0x20  tail word (read into the struct; not decoded)
  - { name: RankXpWithin,    type: i64 }      # 0x24  rank-XP within current rank (local player)
  - { name: RankXpTailHi,    type: "bytes[4]" } # 0x2c  tail of the rank-XP region (see notes)

notes: |
  Static inference only; no capture available. Total = 48 bytes (matches the handler's single
  48-byte read). The handler looks the actor up by (Sort, ActorId) and writes the new vitals and
  level; on the local player it also updates remaining stat points and rank-XP globals and fires
  level-up FX (with a class-evolution UI at levels 12 and 24).

    0x00 (1B) Sort                 : actor sort.
    0x04 (4B) ActorId              : actor id (le u32).
    0x08 (2B) NewLevel             : the new level. HIGH CONFIDENCE.
    0x0c (4B) RemainingStatPoints  : remaining allocatable stat points (local player).
    0x10 (4B) Value                : a secondary value stored alongside (local player).
    0x14 (8B) HpMpPacked           : current HP and current MP packed as two i32 halves into one
                                     qword (the handler stores this as a single 8-byte value).
                                     HIGH CONFIDENCE for the HP/MP core.
    0x1c (4B) Stamina              : current stamina. HIGH CONFIDENCE.
    0x20..0x2f (16B)               : a rank-XP region. The handler reads two 64-bit rank-XP values
                                     here (a within-rank value and a total), but the exact packing
                                     against the 48-byte boundary is ambiguous (the reads overlap
                                     the tail of the block). It is modelled above as a 4-byte tail
                                     word + one i64 (within-rank) + a 4-byte high tail so the fields
                                     sum to 48. PROVISIONAL.

  UNKNOWNS to resolve with a capture of a level-up:
    - the precise layout of the 16-byte rank-XP tail (two i64 values vs the modelled split);
    - whether Tail20 is part of the rank-XP region or a separate field.
  The HP/MP/stamina/level core is high confidence; the rank-XP tail is the part to verify first.
