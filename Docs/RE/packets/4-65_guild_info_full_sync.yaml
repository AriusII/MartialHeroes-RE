# Clean-room field spec. Promoted from a neutral analyst note; rewritten, not copied.
# CAPTURE-UNVERIFIED VALUE semantics; the 1812-byte block size and the header + parallel-array
# layout are control-flow CONFIRMED from the full-sync apply routine's read order. capture_verified: false.

name: SmsgGuildInfoFullSync
opcode: 0x40041             # major 4 (Response), minor 65 -> (4 << 16) | 65
direction: S2C
size: 1812                 # fixed 1812-byte (0x714) block read by the guild full-sync handler
spec: packets/4-65_guild_info_full_sync.yaml
status: hypothesis
capture_verified: false

summary: Server full synchronisation of the guild window. A fixed 1812-byte block carrying the guild identity (name, id, rank byte, two header quantities, fame/points) followed by FIVE parallel 50-entry per-member arrays (member ids, status bytes, 17-byte CP949 names, class bytes, and three dword arrays). The layout REFUTES any "50 x 36-byte contiguous member record" model -- the per-member data is striped across parallel arrays, not packed per member.

# Wire order, offset 0 = first payload byte. Pack=1; padding bytes modelled explicitly so the summed
# widths equal size: 1812. The 50-element per-member arrays are modelled as fixed bytes[N] blobs (the
# only fixed-buffer wire type); each array's per-member stride is given in the notes. The engineer
# slices each blob into 50 entries of the stated stride.
fields:
  - { name: HeaderPad0,    type: "bytes[8]" }     # 0x000  leading ack-header region (subtype gate is the next byte)
  - { name: Subtype,       type: u8 }           # 0x008  apply gate: 1 = full-sync apply; other = guild-leave path
  - { name: ReservedA,     type: "bytes[1]" }     # 0x009  filler to the guild-name field
  - { name: GuildName,     type: "bytes[18]" }    # 0x00a  guild name / title, CP949 (char[18])
  - { name: GuildId,       type: i16 }          # 0x01c  guild id
  - { name: RankByte,      type: u8 }           # 0x01e  guild rank / level byte (mirrored to each member)
  - { name: ReservedB,     type: "bytes[1]" }     # 0x01f  filler to the first header quantity
  - { name: HeaderQtyA,    type: i32 }          # 0x020  header quantity A (capacity vs current -- UNVERIFIED)
  - { name: HeaderQtyB,    type: i64 }          # 0x024  header quantity B (feeds a rank/tier table -- UNVERIFIED)
  - { name: GuildFame,     type: i64 }          # 0x02c  guild fame / points (feeds the tier table; shown grouped)
  - { name: WarStateFlag,  type: u8 }           # 0x034  guild war / state flag
  - { name: ReservedC,     type: "bytes[7]" }     # 0x035  filler to the member-id array
  - { name: MemberIds,     type: "bytes[200]" }   # 0x03c  50 x i32 member ids (4-byte stride)
  - { name: MemberStatus,  type: "bytes[50]" }    # 0x104  50 x u8 per-member status byte (online / state)
  - { name: MemberNames,   type: "bytes[850]" }   # 0x136  50 x 17-byte CP949 member-name records (17-byte stride)
  - { name: MemberClass,   type: "bytes[50]" }    # 0x47c  50 x u8 per-member class / level byte
  - { name: ReservedD,     type: "bytes[2]" }     # 0x4ae  filler to the first member dword array
  - { name: MemberDwordC,  type: "bytes[200]" }   # 0x4bc  50 x i32 per-member dword C (4-byte stride; semantic UNVERIFIED)
  - { name: MemberDwordA,  type: "bytes[200]" }   # 0x584  50 x i32 per-member dword A (4-byte stride; nonzero => active member)
  - { name: MemberDwordB,  type: "bytes[200]" }   # 0x64c  50 x i32 per-member dword B (4-byte stride; semantic UNVERIFIED)

notes: |
  CODE-CONFIRMED block size (a fixed 1812-byte / 0x714 read) and the header + parallel-array layout
  (control-flow-confirmed from the full-sync apply routine's read order); CAPTURE-UNVERIFIED in the
  VALUE meaning of several header quantities and the per-member dword arrays. The field WIDTHS sum to
  exactly 1812 (verified). The five 50-entry arrays end precisely at the 1812 boundary.

  THE "50 x 36-byte RECORD" MODEL IS REFUTED. 1812 is NOT 50 x 36. The per-member data is striped
  across FIVE parallel 50-entry arrays (one value per member in each array), not packed into one
  contiguous record per member. The guild supports a 50-member cap (the apply loops run 50 iterations).

  HEADER (offsets 0x000..0x03b):
    0x008 (1B)  Subtype      : apply gate. 1 = apply the full guild sync; any other value selects the
                               guild-LEAVE path (the handler clears the local guild fields, applies the
                               carried leave-cost gold delta with a notice, and shows the 'left guild'
                               message). Implementers MUST branch on this byte before applying.
    0x00a (18B) GuildName    : the guild name / title, CP949-encoded -> the guild window's header label.
    0x01c (2B)  GuildId      : the guild id (i16).
    0x01e (1B)  RankByte     : a guild rank / level byte, mirrored onto each member's actor field.
    0x020 (4B)  HeaderQtyA   : a header quantity shown as a count label. WHICH quantity (capacity vs
                               current member count vs an accumulator) is UNVERIFIED -- capture-pending.
    0x024 (8B)  HeaderQtyB   : a 64-bit header quantity feeding a rank / tier table and a label. Its
                               exact role (points vs contribution vs another accumulator) is UNVERIFIED.
    0x02c (8B)  GuildFame    : the guild fame / points value (i64), feeds the tier table and is shown
                               thousands-grouped.
    0x034 (1B)  WarStateFlag : a guild war / state flag mirrored onto the local player.

  PARALLEL PER-MEMBER ARRAYS (50 entries each; offsets below). Each array is one value per member; the
  member at row r is assembled by reading index r from every array:
    0x03c  MemberIds    : 50 x i32 member (composite-key) actor ids, 4-byte stride.
    0x104  MemberStatus : 50 x u8 per-member status byte (online / state).
    0x136  MemberNames  : 50 x 17-byte CP949 name record (17-byte stride; the first record also doubles
                          as the guild master / notice string for the header label).
    0x47c  MemberClass  : 50 x u8 per-member class / level byte -> the class column.
    0x4bc  MemberDwordC : 50 x i32, 4-byte stride. Per-member dword; semantic UNVERIFIED (candidate:
                          contribution / last-login epoch / map id -- capture-pending).
    0x584  MemberDwordA : 50 x i32, 4-byte stride. A nonzero entry marks the row as an ACTIVE member
                          (the apply loop counts it and colours it online); the rest of its meaning
                          (contribution flag) is UNVERIFIED.
    0x64c  MemberDwordB : 50 x i32, 4-byte stride. Per-member dword; semantic UNVERIFIED.

  WHY bytes[N] FOR THE ARRAYS: the supported wire types have no "array of N" form, so each 50-entry
  array is modelled as a fixed byte blob of (50 x stride) bytes. The engineer slices each blob into 50
  entries of the stated stride (4 for the dword/id arrays, 1 for the status/class arrays, 17 for the
  name records). The byte totals are chosen so the whole block sums to 1812.

  RESERVED REGIONS: ReservedA (0x009), ReservedB (0x01f), ReservedC (0x035..0x03b), ReservedD
  (0x4ae..0x4bb), and HeaderPad0 (0x000..0x007) are bytes the apply routine does not consume; they are
  modelled only to make the widths sum to 1812. Whether any reserved byte carries meaning is
  capture-pending.

  RELATIONSHIP: this is the GUILD full sync. The guild window also receives narrower S2C updates
  (guild rank slot 4/54, info update 4/55, state change 4/61, invite/join 4/62, member-remove 4/63,
  position change 4/64, panel text 4/67, name display 5/55, member roster 5/65). The outbound guild
  action primitive is C2S 2/30 CmsgGuildOp (packets/2-30_guild_op.yaml) -- an 8-byte {op, id}; the
  binding of a window action (invite / kick / promote / demote / leave / disband) to a specific 2/30
  op-code value is UNVERIFIED and capture/debugger-pending.

  UNKNOWNS to resolve with a guild full-sync capture (the block size + array layout are settled; these
  are VALUE questions):
    - which header quantity is capacity vs current count vs points (HeaderQtyA @0x020 / HeaderQtyB @0x024);
    - the per-member dword semantics (MemberDwordC @0x4bc, MemberDwordB @0x64c -- contribution /
      last-login / map id);
    - the action -> 2/30 op-byte binding for guild operations.

  UNBLOCKS: the Client.Application guild-window full-sync handler (4/65) -- the roster, identity, and
  fame fields are layout-solid; the flagged header / dword semantics should be confirmed against a
  capture before relying on them.
