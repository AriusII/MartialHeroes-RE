# Clean-room field spec. Promoted from neutral analyst notes + a LIVE IDA-debugger
# confirmation; rewritten, not copied. DEBUGGER-VERIFIED where marked; capture-unverified
# otherwise. capture_verified: false.
#
# verification:
#   ida_reverified: re-verified against doida.exe IDB SHA 263bd994, CYCLE 7 (2026-06-20)
#   ida_anchor: 263bd994
#   evidence: [static-ida]   # the CYCLE 7 re-walk was STATIC control-flow over the login
#                            #   join-builder; the prior debugger run (graded DEBUGGER-VERIFIED
#                            #   below) is a separate, earlier observation, not re-run this pass.
#   capture_verified: false  # no .pcapng present; on-wire byte VALUES remain capture-pending.
#   reconfirmed: the 1/4 credential payload shape (plaintext pre-image -> RSA half -> per-dword
#     XOR 0x29 whitening BEFORE the byte-cipher + LZ4 send chain) and the field caps were
#     re-walked from the login join-builder on CYCLE 7 (2026-06-20) and found CONSISTENT.
#     CORRECTION this pass (binary-won): the RSA plaintext M pad width / password cap 17 (0x11) is
#     REGRADED static-confirmed = 17 -- it is a hard-coded literal on the join path (the cap pushed
#     into the secure-context builder and consumed as the staging-buffer size), no longer
#     "runtime-observed". The on-wire byte VALUES stay capture-pending.
#
# This file replaces the contested packets/1-4_auth_reply.yaml as the authoritative login
# credential carrier. The "1/6 login-or-create collision" is RESOLVED: 1/6 is char-create
# only; the login credential rides the secure 1/4 frame documented here.

name: CmsgLoginCredential
opcode: 0x10004           # major 1, minor 4 -> (1 << 16) | 4. The secure auth-reply / credential carrier.
direction: C2S
size: var                 # variable: header + plaintext pre-image + [u32 len][RSA ciphertext]; framed size is crypto-dependent
spec: packets/login.yaml
status: confirmed
capture_verified: false

summary: >
  The client login-credential message. Emitted from the inbound major-0 branch immediately
  after the server's 0/0 RSA key exchange is parsed, over the secure-send path, on the secure
  1/4 frame. ONE 1/4 payload carries two regions back to back: (1) a plaintext login pre-image
  led by sub-opcode 0x2B (account length-prefixed + optional PIN length-prefixed), then (2) the
  RSA ciphertext of the password (PKCS#1 v1.5 type-2), framed as [u32 LE length][big-endian
  digit bytes]. The whole 1/4 payload is then per-dword whitened (XOR 0x29, selector 0x40) and
  sent through the normal byte-cipher + LZ4 outbound pipeline. The password itself is NEVER in
  the plaintext region -- it is the staged RSA plaintext M (a zero-padded buffer of the
  static-confirmed 17-byte password-cap width).

# This is a VARIABLE-LENGTH, CRYPTO-DEPENDENT carrier, NOT a fixed Pack=1 struct. The fields
# below document the pre-cipher payload shape for the engineer; do NOT codegen a Pack=1 struct.
# The fixed crypto constants (modulus parse, PKCS#1 padding, the 0x29 whitening) live in
# specs/crypto.md section 6; the secure-context lifecycle lives in specs/crypto.md section 6a.
fields:
  - { name: SubOpcode, type: u8 }   # 0x00  constant 0x2B (43) -- the login sub-opcode (DEBUGGER-VERIFIED)
  # followed by: u32 LE account-length (= strlen(account)+1, NUL incl.), then account bytes + NUL
  # followed by: OPTIONAL u32 LE pin-length (= strlen(pin)+1, NUL incl.), then PIN bytes + NUL  [PIN-gated]
  # then: [u32 LE ciphertext-length][big-endian RSA digit bytes]  -- the password, RSA-encrypted

notes: |
  STRUCTURAL FACTS. The on-wire 1/4 payload shape (below) was re-walked STATICALLY on 2026-06-18
  (anchor 263bd994) and found CONSISTENT with the earlier DEBUGGER-VERIFIED observation. The
  DEBUGGER-VERIFIED grade comes from a prior live IDA-debugger session that drove a real login
  against the live login server and read the assembled secure-context packet buffer through the
  anti-tamper page guard; credential byte VALUES were NOT recorded -- only structure/lengths.
  capture_verified: false -- there is no .pcapng, so the on-wire byte VALUES are capture-pending.

  FRAME: secure 1/4. At encrypt-entry the frame header reads major = 1, minor = 4, carried as TWO
  SEPARATE little-endian u16 words ([u32 size][u16 major][u16 minor]) -- not a packed dword. The
  credential is carried on the secure 1/4 frame (DEBUGGER-VERIFIED + re-confirmed static).

  CREDENTIAL FIELD ORDER (binary-won, from the login join-builder argument order): the client first
  assembles a tab-delimited login-key string in the order ACCOUNT, PASSWORD, PIN, HOST:PORT, then a
  builder splits it on the tab. ACCOUNT/PASSWORD/PIN are the credentials; HOST:PORT is NOT a
  credential -- it is split off and saved to a side store (game endpoint), NOT placed in the 1/4
  payload. Within the 1/4 payload, ACCOUNT and (optional) PIN ride the plaintext pre-image below
  while PASSWORD is staged as the RSA plaintext M (see STAGED RSA PLAINTEXT M).

  PLAINTEXT PRE-IMAGE (written first into the secure-context packet buffer payload, payload
  offset 0; all length prefixes are u32 little-endian and INCLUDE the trailing NUL):

    Off   | Size | Type   | Field              | Notes
    ------|------|--------|--------------------|------------------------------------------------
    0x00  | 1    | u8     | SubOpcode          | constant 0x2B (43). DEBUGGER-VERIFIED.
    0x01  | 4    | u32 LE | AccountLength      | = strlen(account)+1 (NUL counted). >= 2, < 0x14 (20).
    0x05  | N_a  | bytes  | Account            | NUL-terminated; N_a = AccountLength. CP949.
    +...  | 4    | u32 LE | PinLength          | OPTIONAL (PIN-gated). = strlen(PIN)+1.
    +...  | N_p  | bytes  | PIN                | OPTIONAL (PIN-gated). NUL-terminated; N_p = PinLength.

  Debugger run example (lengths only, values withheld): AccountLength = 8 (7-char account + NUL),
  PinLength = 5 (4-char PIN + NUL); total plaintext pre-image written = 1 + 4 + 8 + 4 + 5 = 22 bytes,
  matching the observed packet-buffer size cursor of 30 = 8-byte header + 22-byte payload.

  PIN GATE: the PIN length-prefixed pair is present only when the second-password / PIN gate is
  active (the login form passes a max-PIN-length of 5; the pair is written only when the PIN
  argument is nonzero). When no PIN was entered, both the PIN length prefix and the PIN bytes are
  omitted -- treat the PIN region as OPTIONAL. The PIN value originates from the anti-keylogger
  scrambled keypad (see specs/login_flow.md).

  FIELD-LENGTH GATE (build returns no packet unless all hold):
    - strlen(account) >= 2 and strlen(password) >= 2;
    - strlen(account) < 0x14 (20) and strlen(password) < 0x11 (17);
    - if a PIN is present: strlen(PIN) < 5.

  RSA CIPHERTEXT (appended after the plaintext pre-image at the same size cursor):

    Off (relative) | Size | Type   | Field            | Notes
    ---------------|------|--------|------------------|---------------------------------------------
    +0             | 4    | u32 LE | CiphertextLength | byte count of the big-endian RSA digit array.
    +4             | L    | bytes  | Ciphertext       | big-endian RSA digit bytes; L = CiphertextLength.

  Debugger run example: CiphertextLength = 27 (0x1B); the size cursor advanced 30 -> 61 (4-byte len
  + 27-byte ciphertext = 31 appended). The small ~27-byte ciphertext implies a small RSA modulus
  (~224-bit / ~28 bytes), consistent with a 2004-era key. PKCS#1 v1.5 type-2 padding confirmed by
  the framing/size. DEBUGGER-VERIFIED.

  STAGED RSA PLAINTEXT M (the password): the password is NOT in the plaintext pre-image. At
  login-form time the client allocates a zero-filled buffer of the password-field cap width, then
  copies the password bytes in (no NUL), leaving the remainder as zero padding. So M = password
  bytes followed by zero padding out to the cap width, and the encrypt step consumes the FULL
  cap-width buffer as M -- the trailing zeros ARE part of M (the server expects a fixed-width
  password field).
    - PAD WIDTH = 17 bytes (0x11), STATIC-CONFIRMED. This is a hard-coded literal on the login join
      path (the password cap pushed into the secure-context builder, then consumed as the staging
      buffer's allocation size). The earlier revision graded 17 as "runtime-observed, not a static
      literal"; this is REGRADED static-confirmed = 17. The on-wire byte VALUES of M stay
      capture-pending (only the width is settled).
    - Password capacity: length >= 2 and < 0x11 (17).
    - UI MAXLEN vs WIRE CAP: the login form's password textbox allows up to 129 (0x81) typed
      characters, but the ENFORCED WIRE cap is 17 (0x11). These are distinct -- do NOT misread a
      129-wide password field; the wire/staging width is 17.

  WHITENING + SEND: after the ciphertext is appended, the whole 1/4 payload is per-dword XOR
  whitened with key 0x29 (41 decimal), selector 0x40, over the dword-aligned payload (size>>2
  dwords) -- see crypto.md section 6.4. The complement test for the selector is FALSE, so the key
  is used as-is (0x29). The whitening covers the WHOLE 1/4 payload (pre-image + ciphertext) and is
  applied FIRST -- BEFORE the packet enters the universal send convergence. That send chain is:
  tick-timestamp -> byte cipher -> LZ4 compress -> queue. So the full outbound order for 1/4 is:

    build pre-image + RSA  ->  per-dword XOR 0x29 whitening  ->  byte cipher  ->  LZ4  ->  send

  The on-wire bytes are the whitened + ciphered + compressed form of:
  [header 1/4][0x2B plaintext pre-image][u32 LE len][BE ciphertext].

  INBOUND DIRECTION (asymmetry): inbound (S2C) frames are LZ4-DECOMPRESS ONLY -- there is NO
  inverse byte cipher and NO inverse whitening on receive. The byte cipher appears only on the
  send chain (single caller). See crypto.md section 5 / opcodes.md frame-header note.

  CRYPTO HAND-OFF: the modulus/exponent parse from the 0/0 blob, the PKCS#1 v1.5 type-2 padding,
  the m^e mod n exponentiation, and the 0x29 whitening are all owned by specs/crypto.md section 6;
  the secure-context page-guard lifecycle is specs/crypto.md section 6a. Network.Crypto implements
  the RSA + whitening; this packet spec owns only the plaintext pre-image + ciphertext FRAMING.

  WHY THIS IS NOT A Pack=1 STRUCT: the payload is variable-length (account/PIN lengths vary; the
  PIN region is optional; the ciphertext length tracks the server modulus). Build it with a writer,
  not a blittable struct.

  UNKNOWNS (capture-only): the concrete RSA modulus/exponent values and exact L1/L2 split (server
  wire data, read live from 0/0); the server-side handling of the zero-padded M and the PIN field;
  the on-wire confirmation of the pad width (17 is runtime-observed, not capture-confirmed).

  RELATED: 0/0 SmsgKeyExchange (packets/0-0_key_exchange.yaml) precedes this. The DISTINCT 1/6
  char-create message is packets/cmsg_char_create.yaml (NOT a login message). The lobby /
  server-address resolution that yields the game endpoint is packets/lobby.yaml + specs/login_flow.md.

  UNBLOCKS (once crypto lands): Client.Application Login use-case; the Network.Crypto handshake.
