name: CmsgActorInteraction
opcode: 0x20005           # major 2 (GameAction), minor 5 -> (2 << 16) | 5
direction: C2S
size: 28                  # fixed 28-byte payload (4 + 4 + 20 = 28)
spec: packets/2-5_actor_interaction.yaml
status: confirmed
capture_verified: false

summary: NPC / actor service-menu interaction request (the generic "I selected this menu option on this actor/NPC"). Carries a 4-byte small-byte header, the target actor id u32 at 0x04, and a 20-byte context block at 0x08 whose first 17 bytes hold a CP949 NUL-padded name when a name-keyed option is active. Used across the service-NPC menu and a context-menu dispatcher.

# Wire order, offset 0 = first payload byte. Pack=1; the widths sum to size: 28.
fields:
  - { name: SelectMode,    type: u8 }          # 0x00  selection mode (1=picked actor, 2=current target) [capture/debugger-pending]
  - { name: SubIndex,      type: u8 }          # 0x01  sub-selection / row index [capture/debugger-pending]
  - { name: ClassOrFlag,   type: u8 }          # 0x02  local-player class/job byte (or battle-id flag for some actor kinds) [capture/debugger-pending]
  - { name: Reserved0,     type: u8 }          # 0x03  pad / flag (often 0/1) [capture/debugger-pending]
  - { name: TargetActorId, type: u32 }         # 0x04  resolved target/NPC actor id [capture/debugger-pending]
  - { name: Context,       type: "u8[20]" }    # 0x08..0x1B  20-byte type-specific context block; name occupies @0x08..0x18 (17 bytes, CP949 NUL-padded) when present [capture/debugger-pending]

notes: |
  CODE-CONFIRMED layout (28 bytes), CAPTURE-UNVERIFIED meaning. AUDIT-CORRECTED: the context
  block at @0x08 is 20 bytes total (not split as Flags u8[3] + Name char[17]). The binary
  strncpy writes the 17-byte CP949 name starting at body offset 0x08 (not 0x0b); the Flags/Name
  split at 0x0b was off by 3. Total: 4 + 4 + 20 = 28 bytes.

    0x00 (1B)  SelectMode    : selection mode (1 = picked actor, 2 = current target).
    0x01 (1B)  SubIndex      : sub-selection / row index.
    0x02 (1B)  ClassOrFlag   : the local-player class/job byte (or a battle-id flag for some actor kinds).
    0x03 (1B)  Reserved0     : a pad/flag byte (often 0/1).
    0x04 (4B)  TargetActorId : the resolved target/NPC actor id.
    0x08 (20B) Context       : type-specific context block. When a name-keyed option is active,
                               the 17-byte CP949 NUL-padded name occupies @0x08..0x18; the
                               remaining 3 bytes @0x19..0x1B are reserved/zero. When no name
                               is needed the full 20 bytes are zeroed.

  ACTOR-KEY ORDER NOTE: where this family carries an actor composite key, the dominant C2S wire order
  is sort-byte @+0 then id u32 @+4. (Here the key is carried as a flat resolved actor id at 0x04.)

  TRIGGER: a "click a menu entry on an NPC/actor in the service window" action — the big NPC/actor
  context-menu dispatcher and the service-NPC menu dispatcher (info / name-lookup / escort cases).

