# Clean-room field spec. Promoted from a neutral analyst note; rewritten, not copied.
# CAPTURE-UNVERIFIED VALUE semantics; the 19-byte prefix shape + length-prefix-excludes-NUL are
# control-flow CONFIRMED from the client's chat send path. capture_verified: false.
#
# VERIFICATION (campaign10/E re-verify):
#   prefix shape:        confirmed   (control-flow: the builder ALWAYS writes a fixed 0x13 = 19-byte prefix --
#                        channel byte @0x00, a selector byte @0x01, then a 17-byte zeroed name area @0x02 via
#                        memset 0x11 + strncpy(name,16); then the length-prefixed text)
#   text framing:        confirmed   (text appended as [u32 textLength][text]; textLength EXCLUDES the NUL --
#                        resolves the prior "prefix counts the NUL?" open item: NO, for 2/7; text strncpy-capped at 0x77=119)
#   wire VALUE semantics: capture/debugger-pending (the integer channel->meaning table; the @0x01 selector's meaning)
#   ida_reverified: 2026-06-16   ida_anchor: 263bd994   evidence: [static-ida]
#   conflicts: RESOLVED -- the old "broadcast (no name) vs whisper (+16B name)" variable split is REPLACED by a
#              UNIFORM 19-byte prefix (the 17-byte name area is present in every chat send, zeroed for non-whisper).

name: CmsgChat
opcode: 0x20007           # major 2 (GameAction), minor 7 -> (2 << 16) | 7
direction: C2S
size: var                 # fixed 19-byte (0x13) prefix + [u32 textLength-excl-NUL][CP949 text]
spec: packets/2-7_whisper.yaml
status: confirmed
capture_verified: false

summary: >
  Client chat send. A SINGLE opcode carries every everyday chat channel. The builder writes a
  UNIFORM 19-byte (0x13) prefix for ALL chat -- a channel byte, a 1-byte selector, and a 17-byte
  name area (zeroed when the channel has no named target, e.g. say/party/guild/shout/alliance;
  populated with the recipient name for whisper) -- followed by a length-prefixed CP949 text block
  whose u32 length EXCLUDES the terminating NUL. There is NO broadcast-vs-whisper LENGTH split at
  the send site: the 17-byte name area is always present. Server echoes back as S2C 5/7 ChatBroadcast.

# ONE wire form: a fixed 19-byte prefix then a length-prefixed text block. The fields[] below model
# the fixed prefix; the trailing variable text is described in notes (the engineer hand-codes the
# [u32 len][text] append). CONTROL-FLOW CONFIRMED prefix shape; CAPTURE-UNVERIFIED VALUE semantics.
fields:
  - { name: Channel,    type: u8 }           # 0x00  channel code (see Channel codes table in notes; VALUE capture-pending)
  - { name: Selector,   type: u8 }           # 0x01  a sub-selector byte the builder writes after the channel (meaning capture-pending)
  - { name: TargetName, type: "bytes[17]" }  # 0x02  17-byte name area; recipient name for whisper, all-zero otherwise (CP949, NUL-padded)
  # then a length-prefixed CP949 text body: [u32 textLength-EXCLUDING-NUL][text bytes]  (see notes)

notes: |
  Static analysis only; no capture available. VARIABLE-LENGTH packet (a fixed 19-byte prefix then a
  variable text block). CAPTURE-UNVERIFIED VALUE semantics. This file keeps its historical name
  (2-7_whisper.yaml) because opcodes.md and the social spec cross-reference it, but the concept is
  the GENERAL chat send (CmsgChat), of which whisper is just one channel -- it is NOT a whisper-only
  opcode.

  WIRE LAYOUT (CONTROL-FLOW CONFIRMED prefix shape):
    0x00 (1B)  Channel    : channel code selecting say/party/guild/shout/alliance/whisper.
    0x01 (1B)  Selector   : a 1-byte sub-selector the builder writes immediately after the channel.
                            Its exact meaning is not pinned (capture-pending).
    0x02 (17B) TargetName : a 17-byte name area. The builder memsets it to zero (0x11 bytes) then
                            strncpy's up to 16 recipient-name bytes into it. For non-whisper channels
                            the name area stays all-zero; for whisper it holds the recipient character
                            name (CP949, NUL-padded). It is ALWAYS present (no variable split).
    0x13 ...   text body  : a length-prefixed CP949 text block (see TEXT BODY below).

  The "whisper adds 16 bytes" framing from the earlier note is REPLACED: every 2/7 send carries the
  17-byte name area; it is zero for non-whisper channels. The prefix is a uniform 19 bytes.

  CHANNEL CODE (first payload byte, 0x00). CONFIRMED that the first byte selects the channel and that
  the everyday say/party/guild/shout/alliance/whisper traffic all ride this one opcode (the chat
  editbox parser emits 2/7 for ordinary text, with the channel byte taken from the active chat tab or
  a slash prefix). The numeric channel-code -> meaning mapping below follows the values requested for
  this catalog; the exact integer-to-channel binding is a WIRE VALUE and is NOT pinned without a
  capture (capture/debugger-pending).

    code | channel
    -----|---------------------------------
     0   | say (local/normal)
     1   | party
     2   | guild
     3   | shout
     6   | alliance
     7   | whisper (private, named target)
     9   | whisper (private, named target)
    15   | whisper (private, named target)

  The whisper channels are the named-target private channels; the others are area/group broadcasts.
  (Note: the source note's own table bound some of these integers differently. Because the 17-byte
  name area is always physically present in the prefix, wire LAYOUT no longer depends on "is this a
  whisper channel"; only the name-area contents do. Resolve the exact integer<->channel table from a
  capture of each /command.)

  TEXT BODY: a length-prefixed CP949 text block appended after the 19-byte prefix:
    [u32 textLength][text bytes]
  CONFIRMED: textLength EXCLUDES the terminating NUL (it is built from strlen(text), not strlen+1) --
  this resolves the prior open "does the prefix count the NUL?" -> NO for 2/7. (Contrast 3/21
  CmsgChatChannel, whose length prefix INCLUDES the NUL -- see packets/3-21_chat_channel.yaml.) The
  text is strncpy-capped at 0x77 = 119 bytes at the send site. All chat text is CP949 (Korean
  codepage); never a managed UTF-16 string on the wire.

  LENGTH LIMITS (CONFIRMED from the editbox / send path):
    - broadcast channels: the chat input box caps typed input at 100 characters.
    - whisper channel: the whisper text is capped at 119 characters before send (the 0x77 strncpy cap).
    - a general gate rejects chat text >= 200 characters.
  These are character caps in the editor, not byte caps; CP949 wide glyphs are 2 bytes each, so the
  on-wire byte length can exceed the character count.

  STATUS: hypothesis. The single-opcode model, the uniform 19-byte prefix, the always-present 17-byte
  name area, and the text-length-EXCLUDES-NUL framing are CONTROL-FLOW CONFIRMED; the exact integer
  channel table and the meaning of the @0x01 selector byte are CAPTURE-UNVERIFIED (wire VALUE).

  UNKNOWNS to resolve with a capture (one line per channel: /say, /party, /guild, /shout, /alliance,
  /whisper <name>):
    - the exact integer -> channel binding (the dirty note and this catalog disagree on a few codes);
    - the meaning of the @0x01 selector byte.

  RELATED: server echo is S2C 5/7 SmsgChatBroadcast (packets/5-7_chat_broadcast.yaml), whose header
  also carries a channel byte and a sender-name field. Sibling C2S 3/21 CmsgChatChannel
  (packets/3-21_chat_channel.yaml) is a separate context-chat send whose length prefix INCLUDES the NUL.

  UNBLOCKS: Client.Application chat-send use-case (all channels + whisper).
