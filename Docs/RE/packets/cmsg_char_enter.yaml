# Clean-room field spec. Promoted from a neutral analyst note; rewritten, not copied.
# Intra-buffer offsets are now statically PINNED: slot@0x00 + 33B token@0x01 + 2B pad@0x22 +
# 4B version-token@0x24, total 40 -- all code-confirmed off the stack frame. capture_verified: false.
#
# VERIFICATION (campaign10/E re-verify):
#   routing+size:        confirmed   (control-flow: builder writes header 1/9, memsets a 40-byte buffer, appends 0x28=40)
#   intra-buffer offsets: confirmed   (slot@0x00, 33B token@0x01, 2B pad@0x22, version dword@0x24 -- all read off the
#                        enter builder's stack frame; sum 1+33+2+4 = 40)
#   VersionToken formula: confirmed   (= 10*(data/cursor/game.ver field index 5)+9; on-disk source + arithmetic in code)
#   SessionToken source: confirmed   (33B = lowercase-hex MD5 digest of the client's OWN exe file: argv[0] path fed
#                        through an MD5-of-file hasher; 32 hex chars + NUL. A build-integrity self-checksum, NOT a
#                        launcher/login session token. CORRECTED CYCLE 12 Phase 2 — supersedes the prior 'launcher token' reading.)
#   wire VALUE semantics: capture/debugger-pending (the 33-byte token's exact format/content; whether Pad ever carries a field)
#   ida_reverified: 2026-06-22   ida_anchor: 263bd994   evidence: [static-ida]   # CYCLE 12 Phase 2
#   ida_reverified: 2026-06-27 (CYCLE 14 deep-verify)   ida_anchor: f61f66a9   evidence: [static-ida]
#     -- CYCLE 14 deep-verify (f61f66a9): body layout re-traced against the builder; 4 fields
#        (SlotIndex u8@0x00, SessionToken bytes[33]@0x01, Pad bytes[2]@0x22, VersionToken u32@0x24)
#        re-confirmed SAME, 0 corrected. VersionToken formula (10*(game.ver field 5)+9) re-confirmed.
#   conflicts: SUPERSEDES the prior 'launcher command-line session token' reading of SessionToken — it is the
#              lowercase-hex MD5 digest of the client executable itself (a self-checksum). The enter SEQUENCE is
#              also corrected to a server round-trip (1/7 mode-1 -> 3/14 flag!=0 -> 1/9 from the 3/14 handler -> 3/5).

name: CmsgEnterGameRequest
opcode: 0x10009           # major 1, minor 9 -> (1 << 16) | 9
direction: C2S
size: 40                  # fixed 40-byte (0x28) payload
spec: packets/cmsg_char_enter.yaml
status: confirmed
capture_verified: false

summary: >
  Enter-world request. Built by the enter-selected-character helper into a zero-initialised 40-byte
  buffer: the chosen slot index, a 33-byte launcher-supplied session/identity token string, and a
  4-byte derived version token. The session token is the lowercase-hex MD5 digest of the
  client's own executable file (argv[0] path run through an MD5-of-file hasher; 32 hex chars + NUL) — a
  build-integrity self-checksum, NOT a launcher/login token and not the account text field. The
  version token is NOT a hardcoded constant: it is 10 x (field 5 of the on-disk data/cursor/game.ver)
  + 9, derived on-disk. The enter path sends ONLY this 1/9 (it does not re-send a select first; the
  slot was already managed via 1/7 at slot click). The server first replies with S2C 3/5
  SmsgEnterGameAck (account/billing confirm; flips the scene to the loading state), and the world
  self-snapshot arrives separately on 4/1.

# Wire order, offset 0 = first payload byte. Pack=1; widths sum to size: 40.
# CODE-CONFIRMED: byte0 = slot, a 33-byte token string, a 4-byte version token, total 40, the rest
# zero-filled. The intra-buffer OFFSETS are now statically PINNED off the enter builder's stack
# frame: the 33-byte token string sits at +0x01 (memcpy from the launcher token), the 2-byte pad
# at +0x22, and the version dword at +0x24. The layout below reflects those pinned offsets and
# the widths sum to 40 (1 + 33 + 2 + 4). No remaining offset is debugger-pending.
#
fields:
  - { name: SlotIndex,    type: u8 }            # 0x00  selected character slot (0..4)  -- CODE-CONFIRMED
  - { name: SessionToken, type: "bytes[33]" }   # 0x01  33B self-checksum: lowercase-hex MD5 of the client EXE (32 hex + NUL) -- offset PINNED @0x01 (code-confirmed)
  - { name: Pad,          type: "bytes[2]" }    # 0x22  alignment gap before the version dword (observed zero) -- offset PINNED @0x22 (code-confirmed)
  - { name: VersionToken, type: u32 }           # 0x24  derived version token = 10*(game.ver field 5)+9 -- offset PINNED @0x24 (code-confirmed)

notes: |
  Static analysis only; no capture or debugger read. The enter-selected-character helper zero-fills
  a 40-byte buffer, then partially fills it. Frame = 8-byte header + 40 = 48 bytes. Width sum check:
  1 + 33 + 2 + 4 = 40.

    0x00 (1B)  SlotIndex     : the chosen character slot, range 0..4. CODE-CONFIRMED. The slot must
                               hold a real (non-blank) character before this fires; the entering
                               latch is set so the request cannot re-fire.
    0x01 (33B) SessionToken  : a 33-byte build-integrity self-checksum. CORRECTED (CYCLE 12 Phase 2):
                               it is the lowercase-hex MD5 digest of the CLIENT'S OWN EXECUTABLE FILE.
                               The first program argument (argv[0] = the running exe's path) is fed
                               into an MD5-of-file hasher; the resulting 32 hex characters plus a NUL
                               terminator fill the 33-byte field. It is NOT a launcher/login session
                               token and NOT the account text. It is always present in any normal
                               launch (no launcher argument required). CODE-CONFIRMED source + format
                               + 33-byte width; OFFSET PINNED at +0x01. The exact digest BYTES on the
                               wire are runtime (depend on the shipped binary) -> capture-pending.
                               NOTE for the re-implementation: a fresh clean-room client cannot
                               reproduce MD5(original-exe) byte-identically; if the server validates
                               this field's SHAPE (a present 32-char lowercase-hex string), send a
                               valid-shaped 32-hex token + NUL rather than 33 zero bytes.
    0x22 (2B)  Pad           : a 2-byte alignment gap before the version dword; observed zero (from the memset). Offset PINNED at +0x22.
    0x24 (4B)  VersionToken  : a 4-byte version/build token. DERIVED, not constant: the client opens
                               data/cursor/game.ver from the VFS, reads field index 5, and computes
                               10 * (game.ver field 5) + 9. CODE-CONFIRMED for both the value formula
                               and its on-disk source; the OFFSET inside the 40-byte buffer is
                               now PINNED at +0x24 (a fixed stack-frame offset, code-confirmed;
                               no longer debugger-pending).
                               Cross-ref specs/login.md (enter-world handshake) and
                               login_flow.md version handling.

  ENTER SEQUENCE (load-bearing -- CORRECTED CYCLE 12 Phase 2): world entry is a SERVER ROUND-TRIP,
  not two independent local presses. The occupied-slot "play / select this character" confirm emits
  1/7 CmsgSelectCharacterSlot with mode = 1 (select-and-play); the server replies 3/14
  SmsgCharSpawnResponse (16-byte body, leading flag byte); when that flag is non-zero the client
  emits THIS 1/9 FROM INSIDE its 3/14 handler (server-triggered) carrying the slot + spawn coords;
  the server then replies 3/5 SmsgEnterGameAck. Ladder: 1/7(mode 1) -> 3/14(flag!=0) -> 1/9 -> 3/5.
  A client that fires 1/9 unilaterally off the Enter button -- without the mode-1 1/7 and without the
  positive-flag 3/14 -- sends 1/9 out of sequence; this is the leading static hypothesis for a genuine
  3/100 select-mode result code 23 reject. (A secondary, purely client-gated direct Enter->enter route
  exists, but the 3/14-gated path is the normal play flow.) See specs/frontend_scenes.md §7.

  POST-SEND LOCAL HANDOFF: before any ack, the client caches the chosen slot's per-slot spawn
  descriptor and stat block into globals, tears down the select scene, then awaits the reply pair:
  S2C 3/5 SmsgEnterGameAck (packets/3-5_enter_game_response.yaml) which flips the scene state to the
  loading screen, and S2C 4/1 SmsgGameStateTick which carries the world self-snapshot and builds the
  local player. The 3/5-vs-4/1 arrival ORDER is the one load-bearing runtime-ordering fact static
  cannot pin -- see specs/login.md "needs-capture". The chosen slot is committed locally before any
  ack.

  UNKNOWNS (capture/debugger required): the intra-buffer OFFSETS are now PINNED (slot@0x00,
  token@0x01, pad@0x22, version@0x24) -- no longer unknown. Remaining open items: whether the
  2-byte Pad ever carries a small trailing field rather than staying zero, and the 33-byte token
  string's exact format/content. A live 1/9 read would confirm the token bytes.

  RELATED: 1/0 logout, 1/6 create, 1/7 manage/select (+delete-overload), 1/13 rename, 1/14 slot-move.
  All gated by the single select-window net-busy latch.

  UNBLOCKS: Client.Application SelectCharacter / EnterGame use-case (ack 3/5, then world build on 4/1).
