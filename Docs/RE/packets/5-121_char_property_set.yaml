name: SmsgCharPropertySet
opcode: 0x50079           # major 5 (Push), minor 121 -> (5 << 16) | 121
direction: S2C
size: 8                   # fixed 8-byte body (two single-u32 reads)
spec: packets/5-121_char_property_set.yaml
status: hypothesis
capture_verified: false

summary: Server sets a single integer property/field on the resolved actor. An 8-byte body carrying an actor id and one property value; the handler resolves the actor (assuming player sort 1) and writes the value into a runtime actor property field.

# Wire order, offset 0 = first payload byte. Pack=1; widths sum to size: 8.
fields:
  - { name: ActorId,       type: u32 }   # 0x00  target actor id (resolved with a fixed sort of 1)
  - { name: PropertyValue, type: u32 }   # 0x04  property value to assign to the resolved actor

notes: |
  CONTROL-FLOW CONFIRMED: the 8-byte body (two single-u32 cursor reads, not a bulk read) and the field
  offsets. CAPTURE-UNVERIFIED for the property's VALUE meaning.

    0x00 (4B) ActorId       : target actor id; resolved with a hardcoded sort of 1 (local player / a
                              player-sort actor).
    0x04 (4B) PropertyValue : the integer value written onto the resolved actor.

  RUNTIME-OFFSET HYGIENE (DO-NOT-PROMOTE-AS-WIRE): PropertyValue is stored into a pure runtime field on
  the live actor object (well outside the embedded-descriptor window, so it is unambiguously a runtime
  field, never on the wire and never in the spawn descriptor). That destination offset is NOT a wire
  field and is intentionally omitted. Only the two wire dwords above are promotable.

  UNKNOWN to resolve with a capture: which character property this value sets.
