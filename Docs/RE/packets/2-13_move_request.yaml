# Clean-room field spec. Promoted from a neutral analyst note; rewritten, not copied.
# CAPTURE-UNVERIFIED: every offset below is a static inference. capture_verified: false.

name: CmsgMoveRequest
opcode: 0x2000d           # major 2 (GameAction), minor 13 -> (2 << 16) | 13
direction: C2S
size: 16                 # fixed 16-byte payload built by the client move sender
spec: packets/2-13_move_request.yaml
status: hypothesis
capture_verified: false

summary: Client click-to-move / position-sync request. Sends a computed facing angle, a target XZ point, and a movement-mode/run region. The server re-broadcasts the result via S2C 5/13 ActorMovementUpdate.

# Wire order, offset 0 = first payload byte. Pack=1; the 16 widths sum to size: 16.
fields:
  - { name: Heading,  type: f32 }        # 0x00  facing angle, computed by the client from (target - current) delta
  - { name: TargetX,  type: f32 }        # 0x04  requested target X in world coordinates
  - { name: TargetZ,  type: f32 }        # 0x08  requested target Z in world coordinates (world Y not sent)
  - { name: ModeFlags, type: u32 }       # 0x0c  move-mode + run-flag region (see notes for the byte split)

notes: |
  Static inference only; no capture available. The client move sender builds a fixed 16-byte
  payload, so total payload = 16 bytes. Frame = 8-byte header + 16 = 24 bytes on the wire.

    0x00 (4B) Heading  : the client derives a facing/heading angle (atan2-style) from the vector
                         between the local player's current position and the requested target.
    0x04 (4B) TargetX  : requested destination X (world, le f32).
    0x08 (4B) TargetZ  : requested destination Z (world, le f32). Only X and Z travel on the wire;
                         the vertical axis is not sent (consistent with the S2C 5/13 ack, which is
                         also XZ-only).
    0x0c (4B) ModeFlags: a packed mode/run region. The low byte is a move-mode selector (the
                         click-to-move caller passes 1). A run/walk state bit (derived from the
                         local player's run state) is also packed into this region.

  RELATIONSHIP: the periodic position heartbeat the client emits while moving reuses this same
  sender with mode = 1, so a moving client emits a stream of 2/13 frames. The server echoes each
  with S2C 5/13 SmsgActorMovementUpdate (packets/5-13_actor_movement_update.yaml).

  UNKNOWNS to resolve with a capture of a click-to-move sequence:
    - the exact byte split inside ModeFlags (mode byte vs run flag vs padding). It is modelled here
      as a single u32 so the engineer can mask the bytes once a capture pins them down; do not
      assume a particular sub-layout yet.
    - whether Heading is radians or another angular unit.

  UNBLOCKS: Client.Application RequestMove use-case.
