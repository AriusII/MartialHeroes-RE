  - { name: Mode, type: u8 }        # 0x01  action mode (0/1/other) [capture/debugger-pending]
  - { name: Pad0, type: "u8[2]" }   # 0x02  alignment gap to the u32
  - { name: Arg,  type: u32 }       # 0x04  actor id / numeric argument [capture/debugger-pending]

