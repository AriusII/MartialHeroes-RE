name: SmsgActorMovementUpdate
opcode: 0x5000d              # major 5 (Push), minor 13 -> (5 << 16) | 13
direction: S2C
size: 40                    # fixed 40-byte payload block
spec: packets/5-13_actor_movement_update.yaml
status: hypothesis
capture_verified: false

summary: Server pushes an actor's movement state (current XZ, destination XZ, facing) for interpolation.

# Wire order, offset 0 = first payload byte. Pack=1; padding bytes are modelled explicitly
# as bytes[N] so the summed widths equal size:.
fields:
  - { name: Sort,        type: u8 }        # 0x00  actor category (1=PC, 2=Mob, 3=NPC); also selects the interp branch
  - { name: Pad0,        type: "bytes[3]" }  # 0x01  alignment padding to the next dword (may or may not carry data)
  - { name: ActorId,     type: u32 }       # 0x04  actor id
  - { name: Yaw,         type: f32 }        # 0x08  facing angle (radians-ish), fed to a yaw-quaternion builder
  - { name: PosX,        type: f32 }        # 0x0c  current world X (float)
  - { name: PosZ,        type: f32 }        # 0x10  current world Z (float); world Y is never sent (forced 0)
  - { name: DestX,       type: f32 }        # 0x14  destination/move-to X (float)
  - { name: DestZ,       type: f32 }        # 0x18  destination/move-to Z (float)
  - { name: RunFlag,     type: u8 }        # 0x1c  1 = running (affects speed/anim)
  - { name: Pad1,        type: "bytes[3]" }  # 0x1d  alignment padding
  - { name: Reserved0x20, type: u32 }      # 0x20  RESERVED -- inside the 40B read but NOT consumed as a speed by the handler (was mislabelled SpeedScale)
  - { name: MotionCode,  type: u8 }        # 0x24  motion/action code; 5 => instant snap branch
  - { name: Pad2,        type: "bytes[1]" }  # 0x25  alignment padding
  - { name: StanceByte,  type: u8 }        # 0x26  stance / secondary-state byte
  - { name: Pad3,        type: "bytes[1]" }  # 0x27  trailing padding to 40

notes: |
  Static inference only; no capture available. Total = 40 bytes (matches the handler's single
  40-byte read).
    0x00 (1B) actor sort / interp-branch selector (1 = path A; 1<sort<=3 = path B).
    0x04 (4B) actor id (le u32), used for the (sort,id) actor lookup.
    0x08 (4B) yaw float -> yaw quaternion.
    0x0c (4B) / 0x10 (4B) current position X / Z as le f32. Y is not on the wire.
    0x14 (4B) / 0x18 (4B) destination X / Z as le f32.
    0x1c (1B) RunFlag (CONFIRMED at body offset 0x1C, u8). Tested as a binary RunFlag == 1; selects
              the run vs walk interpolation-speed constant.
    0x20 (4B) Reserved0x20: this dword is WITHIN the 40-byte read but is NOT visibly consumed as a
              speed by the handler -- interpolation speeds are internal constants selected by
              distance and the run flag, not by this field. The prior "SpeedScale ~1.0" reading is a
              static guess that the read site does not support; modelled as reserved (role unconfirmed)
              until a capture proves it carries a value. CORRECTED.
    0x24 (1B) MotionCode (CONFIRMED at body offset 0x24, u8). Statically tested ONLY as a binary
              MotionCode == 5 (the instant-snap branch); no other per-value semantic is read here.
    0x26 (1B) stance byte.

  CONSUMER BRANCH SHAPE (this layer is an IF-LADDER, not a jump table):
    The movement handler dispatches via a cascade of binary tests, not a single compiler-generated
    switch. The branch structure, in order:
      1. Primary discriminator: Sort byte @ 0x00 (actor category) selects the interpolation path.
      2. MotionCode @ 0x24 tested as == 5 -> instant-snap branch (teleport, no interpolation).
      3. RunFlag @ 0x1C tested as == 1 -> selects the run-speed constant over the walk-speed constant.
      4. Three squared-distance thresholds compare (dest - pos) squared magnitude against the
         compiled constants 0.5, 40000, and 90000, driving the walk / run / idle / face-only choice.
    There are roughly 7 terminal roles the ladder resolves to:
      - snap (instant position set, MotionCode == 5),
      - set-position (place at the given position outright),
      - snap-then-idle (snap into place, then settle to idle),
      - run-interpolate (move toward destination at the run-speed constant),
      - walk-interpolate (move toward destination at the walk-speed constant),
      - face-only (rotate to face the destination without translating),
      - drop (no actionable change; the update is discarded).

  INTERPOLATION SPEEDS ARE COMPILED-IN, NOT ON THE WIRE:
    The two interpolation speeds (1.5 and 3.0) are compiled-in constants, selected by the
    squared-distance thresholds together with RunFlag -- there is NO wire speed scalar. This
    corroborates the Reserved0x20 correction above: @0x20 is not a speed.

  TRUE JUMP TABLE IS DOWNSTREAM (and not wire-keyed):
    The only genuine compiler jump table in this flow lives DOWNSTREAM, in the idle-motion applier.
    It is keyed on a CLIENT-SIDE actor visual-state byte (6 cases) -- a derived runtime state, NOT a
    field carried by this packet. Do not model it as part of the wire layout.

  live-pending (6-D):
    - MotionCode VALUE -> animation mapping: statically MotionCode is used ONLY as == 5 (snap); any
      other per-value animation/action semantic is unconfirmed and awaits a capture/debugger pass.
    - whether the three Pad* regions carry real data or are true filler.
    - whether Reserved0x20 carries any value at all (it is not read as a speed by the handler).
