name: CmsgRepairCommit
opcode: 0x20071           # major 2 (GameAction), minor 113 -> (2 << 16) | 113
direction: C2S
size: 8                   # FIXED 8-byte body: two adjacent u32 words (TargetId @0x00, SelIndex @0x04)
spec: packets/2-113_repair_commit.yaml
status: confirmed
capture_verified: false

summary: Item repair/refine commit sent at a repair NPC (descriptor KIND 0xE) after the player confirms a repair entry. The client runs a gold / eligibility / capacity pre-check before sending. The send arguments observed are the active target field and the selected list index.

# Wire order, offset 0 = first payload byte. Pack=1. size is 'var' until the body is field-decoded.
fields:
  - { name: TargetId, type: u32 }        # 0x00  active-target field: the repair NPC's actor/entity id
  - { name: SelIndex, type: u32 }        # 0x04  selected repair-entry index within the list

notes: |
  CONTROL-FLOW CONFIRMED body size: the repair confirm handler calls the 2/113 sender with two
  arguments (the client's active-target field = the repair NPC id, and the selected entry index in the
  repair list); the builder packs them as two adjacent 4-byte words into a local buffer and blits a
  FIXED 8-byte body. There is nothing after the two words. (This resolves the prior 'var' — the two
  u32 words the file modelled as its "minimum plausible" body ARE the whole body.)

    0x00 (4B) TargetId : the client's active-target field (the repair NPC the player is talking to).
                         CODE-CONFIRMED as a send argument; u32 id.
    0x04 (4B) SelIndex : the index of the chosen repair entry. The repair list itself is read from
                         the NPC's npc.scr template (catalog region at template offset +128, as
                         16-byte records paged 6 per page), so SelIndex selects within that
                         template-baked list, not a server-pushed one. CODE-CONFIRMED as a send argument.

  CONTRACT CLASS: Request -> Response; the paired reply is the 4/113-family item-shop purchase/repair
  result (handler installed). field VALUES remain capture/debugger-pending.

  CLIENT PRE-CHECK (does not change the wire body): before sending, the client compares the entry
  cost against the player's gold (or cash, when a "use cash" mode is active; the divisor between the
  stored amount and the displayed price is 1,000,000) and scans the bag for a capacity/duplicate
  conflict. On failure it shows a local notice and does NOT send.

  RELATIONSHIP: the repair list is the same npc.scr template+128 catalog region the sundry shop
  reads (different stride). A separate asset spec for npc.scr should pin those record widths.

  UNBLOCKS: Client.Application RepairCommit use-case (after body length is captured).
