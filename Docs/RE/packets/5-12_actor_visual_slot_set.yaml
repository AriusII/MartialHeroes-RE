summary: >
  Actor equipment/visual slot set. Updates the model visual representation of an actor's
  equipped item, including upgrading flags and shield/weapon visibility toggles.

fields:
  - { name: ActorSort, type: u32, offset: 0 }       # actor sort key (typically 1 for players)
  - { name: ActorId, type: u32, offset: 4 }         # actor ID to update
  - { name: ItemId, type: u32, offset: 8 }          # item database/visual ID (0 to clear)
  - { name: ItemUpgrade, type: u32, offset: 12 }    # item upgrade level / visual glow index
  - { name: SlotIndex, type: u8, offset: 16 }       # visual equipment slot (0..19)
  - { name: Padding, type: "u8[3]", offset: 17 }    # alignment padding to 20 bytes

notes: |
  Static analysis only; no capture available.

  BEHAVIOUR:
    - Resolves the player actor via (ActorSort, ActorId).
    - Writes the ItemId and ItemUpgrade into the actor's visual slots table (offset 204 + 16 * SlotIndex).
    - Toggles visual shield or weapon flags when special slots (e.g. 12 or 15) are updated.
    - Forces a re-draw and motion reset of the actor's 3D mesh model if not in world transitions.
