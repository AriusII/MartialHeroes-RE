name: SmsgCharSpawn
opcode: 0x50003            # major 5 (Push), minor 3 -> (5 << 16) | 3
direction: S2C
size: 908                 # fixed 908-byte payload block (0x38C) = 8B prefix + 880B descriptor + 20B trailer
spec: packets/5-3_char_spawn.yaml
status: hypothesis
capture_verified: false

summary: Server spawns an actor into the world; the payload carries an 8-byte prefix, an embedded 880-byte SpawnDescriptor record (at frame +0x08), and a 20-byte trailer.

# Top-level layout. The 880-byte SpawnDescriptor is modelled as one fixed buffer here; its internal
# member map is documented in structs/spawn_descriptor.md / structs/actor.md. Widths sum to size: 908.
fields:
  - { name: Sort,            type: u32 }          # 0x000  actor category (1=PC, 2=Mob/NPC); low byte is the real sort
  - { name: ActorId,         type: u32 }          # 0x004  actor id
  - { name: SpawnDescriptor, type: "bytes[880]" } # 0x008  embedded 880-byte (0x370) SpawnDescriptor; see structs/spawn_descriptor.md
  - { name: Trailer,         type: "bytes[20]" }  # 0x37c  trailer; visual/combat flag bytes (copied, partly consumed)

notes: |
  CONTROL-FLOW CONFIRMED: the fixed 908-byte body (single 0x38C read), the 8 + 880 + 20 split, and the
  world-coordinate wire offsets. CAPTURE-UNVERIFIED for VALUE semantics. The handler removes any
  existing actor with the same (Sort, ActorId) key, builds a new actor from the descriptor, inserts it,
  and seeds its world position.

  PREFIX (8 bytes, 0x000..0x007): Sort u32 @0x000 (low byte is the real sort), ActorId u32 @0x004.

  SPAWNDESCRIPTOR (880 bytes, frame 0x008..0x387): the same descriptor record shared with 5/1
  SmsgActorSpawnExtended and the 4/4 area-entity snapshot records, and the 3/x character-list slot. Its
  full member map is a struct-cartographer task (structs/spawn_descriptor.md). The promotable
  spawn-relevant landmark this packet relies on:
    - WORLD POSITION: world_x is at descriptor +0x4C and world_z at descriptor +0x50. With the
      descriptor at frame +0x08, world_x lands at WIRE +0x54 and world_z at WIRE +0x58 (CONFIRMED). The
      handler reads these floats to seed the live world position (world Y forced to 0 on spawn). This
      resolves the prior "+0x44/+0x48 vs +0x4c/+0x50" ambiguity in favour of descriptor +0x4C/+0x50.
    Other descriptor landmarks (name region, model id, vitals, class/race) belong to
    structs/spawn_descriptor.md -- do not duplicate their interior offsets here.

  TRAILER (20 bytes, frame 0x37c..0x38f): visual / combat flag bytes consumed individually toward the
  trailer tail. Not all bytes decoded.

  NOTE (per-opcode wire offset): the world-coordinate WIRE offset is +0x54/+0x58 for THIS opcode (8-byte
  prefix) and for the 4/4 tag-1/2/3 records (also 8-byte prefix); it is +0x58/+0x5C for 5/1
  SmsgActorSpawnExtended, whose 12-byte prefix shifts the descriptor. Do not apply a single rule across
  all three.

  UNKNOWNS to resolve with a capture / struct pass: the descriptor's full member map and the 20-byte
  trailer's per-byte meaning.

  RELATED: 5/1 SmsgActorSpawnExtended (packets/5-1_actor_spawn_extended.yaml) carries the same descriptor
  with a 12-byte prefix; 4/4 carries it inside its tag-1/2/3 records.
