name: SmsgActorMobIdChange
opcode: 0x5005d           # major 5 (Push), minor 93 -> (5 << 16) | 93
direction: S2C
size: 16                  # fixed 16-byte body (0x10)
spec: packets/5-93_actor_mob_id_change.yaml
status: hypothesis
capture_verified: false

summary: >
  Server changes an actor's mob template (a polymorph / transform broadcast). A fixed 16-byte 4-field
  record holding the actor key (sort + id), the old mob template id, and the new mob template id.

# Wire order, offset 0 = first payload byte. Pack=1; widths sum to size: 16.
fields:
  - { name: Sort,      type: u8 }              # 0x00  actor sort (u8; low byte -- actor-key family convention)
  - { name: GapA,      type: "bytes[3]" }      # 0x01  gap (actor-key family convention; not field-read)
  - { name: ActorId,   type: u32 }             # 0x04  actor id
  - { name: OldMobId,  type: u32 }             # 0x08  previous mob template id
  - { name: NewMobId,  type: u32 }             # 0x0c  new mob template id (selects the new mesh)
  # widths: 1 + 3 + 4 + 4 + 4 = 16

