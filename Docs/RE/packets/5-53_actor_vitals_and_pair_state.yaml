# Clean-room field spec. Promoted from a neutral analyst note; rewritten, not copied.
#
# VERIFICATION BANNER
#   verification: confirmed  (opcode->handler routing, the fixed 32-byte body read, and the vitals
#                 field offsets HP@0x10..0x17 (one 64-bit qword) / VitalB@0x18 / VitalC@0x1C are
#                 control-flow-confirmed; every wire-byte VALUE meaning is capture/debugger-pending)
#   ida_reverified: 2026-06-20
#   ida_anchor: 263bd994
#   evidence: [static-ida]
#   conflicts: CORRECTED a real layout conflict. The prior reading labelled +0x14 "CurrentMp" and
#              treated +0x10/+0x14/+0x18 as three independent u32 vitals (HP / MP / stamina). The
#              binary refutes that: the cap path clamps a 64-bit QWORD spanning body +0x10..+0x17 --
#              i.e. +0x10 (HP low) and +0x14 (HP high) form ONE 64-bit HP value, not HP + MP. The
#              separate vital channel (MP / stamina class) is the dword at body +0x18, and +0x1C is a
#              fourth vital written to a client global (not an actor field). BINARY WINS.

name: SmsgActorVitalsAndPairState
opcode: 0x50035           # major 5 (Push), minor 53 -> (5 << 16) | 53
direction: S2C
size: 32                 # fixed 32-byte payload block (0x20)
spec: packets/5-53_actor_vitals_and_pair_state.yaml
status: hypothesis
capture_verified: false

summary: Server pushes an actor's current vitals (a 64-bit HP plus a second and a third vital channel) and a level/state byte, written onto the looked-up actor; the local player is additionally clamped against its client-computed stat caps. A pair/couple sub-mode (when the actor sort marks a paired entity) forms or breaks a partner link and posts a paired/unpaired notice. The current-HP qword is the canonical HP-bar source.

# Wire order, offset 0 = first payload byte. Pack=1; widths sum to size: 32.
fields:
  - { name: Sort,         type: u8 }          # 0x00  actor sort (a wire value of 8 is remapped to 1 on read)
  - { name: Pad0,         type: "bytes[3]" }    # 0x01  alignment padding to the next dword
  - { name: ActorId,      type: u32 }         # 0x04  target actor id
  - { name: Filler0,      type: u8 }          # 0x08  read but never consumed (unused filler)
  - { name: Filler1,      type: u8 }          # 0x09  read but never consumed (unused filler)
  - { name: LevelOrState, type: u8 }          # 0x0a  level / state byte
  - { name: StateByte,    type: u8 }          # 0x0b  secondary state byte
  - { name: PartnerId,    type: u32 }         # 0x0c  partner / pair (couple) actor id (used when Sort == 2)
  - { name: CurrentHp,    type: i64 }         # 0x10  current HP -- ONE 64-bit value spanning 0x10..0x17 (low dword @0x10, high dword @0x14); the HP-bar source
  - { name: VitalB,       type: u32 }         # 0x18  second vital channel (MP / stamina class) -- VALUE meaning capture/debugger-pending
  - { name: VitalC,       type: u32 }         # 0x1c  third vital; mirrored to a client global (NOT an actor field) when this is the local actor

notes: |
  CONTROL-FLOW CONFIRMED: the fixed 32-byte body read and the vitals offsets. CAPTURE-UNVERIFIED for
  every wire-byte VALUE meaning. Total = 32 bytes (0x20).

  The handler looks the actor up by the (Sort, ActorId) key, writes the vitals/level/state onto that
  actor record, clamps the local player against its stat caps, and (in the pair sub-mode) forms or
  breaks a partner link and posts a paired/unpaired notice.

    0x00 (1B) Sort         : actor sort; the wire value 8 is normalised to 1 on read.
    0x04 (4B) ActorId      : actor id (le u32) for the lookup.
    0x08 (1B) / 0x09 (1B)  : Filler0 / Filler1 -- read off the wire but never consumed by the handler.
    0x0a (1B) LevelOrState : a level/state byte (written to the actor's level/state slot).
    0x0b (1B) StateByte    : a secondary state byte.
    0x0c (4B) PartnerId    : partner / pair (couple) actor id. When Sort == 2 the handler treats this
                             as a couple-relationship partner: it FORMS or BREAKS the partner link on
                             the actor and posts a paired/unpaired notice. (The couple status-UI string
                             ids are UI strings, NOT wire data.) See RELATED below.
    0x10 (8B) CurrentHp    : the current-HP value, ONE 64-bit quantity spanning body 0x10..0x17 (low
                             dword @0x10, high dword @0x14). HIGH CONFIDENCE that it is a single qword:
                             the local-player cap path compares a 64-bit maximum against the HP qword
                             and, on overflow, sign-clamps the whole qword to 0 together. The overhead
                             HP bar reads this value -- this message is where a hit visibly "lands".
                             (Correction: the prior reading split this into CurrentHp@0x10 + CurrentMp
                             @0x14; the binary treats both dwords as one HP qword.)
    0x18 (4B) VitalB       : a SECOND vital channel (the MP / stamina-class vital), clamped on its own.
                             Whether it is MP vs stamina is capture/debugger-pending.
    0x1c (4B) VitalC       : a THIRD vital; for the local player it is mirrored to a client GLOBAL (not
                             an actor field) and clamped to live values.

  RUNTIME-OFFSET HYGIENE (DO-NOT-PROMOTE-AS-WIRE): the handler stores HP / VitalB into the live-actor
  vital slots and VitalC into a client global. Those runtime destinations are NOT wire fields and are
  deliberately omitted from the field table; an engineer maps the four wire vitals above onto the
  live-actor / global model. Only the wire offsets (0x10 qword / 0x18 / 0x1C) are promotable.

  LOCAL-PLAYER CLAMP (handler behaviour, for engineer context -- NOT extra wire fields): when the
  updated actor is the local player, the handler mirrors the values into the local-player vital state
  and CLAMPS each to the CLIENT-COMPUTED maximum (the HP qword to a client-side MaxHP, the two other
  vitals to their own client maxima) and floors negatives to 0. The maximum is computed locally; the
  current value is server-authoritative -- the server sends only the current vitals, never the maxima,
  and HP reaching 0 (after the floor) is the death condition.

  UNKNOWNS to resolve with a capture of an HP/vital-changing event:
    - the on-wire byte order of the (Sort, ActorId) key (call-argument order is (sort, id) but the
      wire order is unconfirmed);
    - whether VitalB is MP vs stamina, and what VitalC numerically represents;
    - whether Filler0/Filler1 (0x08/0x09) ever carry meaningful data on some server build.

  RELATED: this is one of the inbound vitals/state messages alongside 5/32 SmsgLevelUp
  (packets/5-32_level_up.yaml, which likewise packs HP/MP into an i64); per-hit damage arrives in the
  36-byte records of 5/52 SmsgActorSkillAction (packets/5-52_actor_skill_action.yaml). The couple/pair
  link is companioned by the player-pair notice family (5/42 / 5/64).
