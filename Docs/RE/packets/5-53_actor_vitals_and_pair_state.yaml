# Clean-room field spec. Promoted from a neutral analyst note; rewritten, not copied.
# CAPTURE-UNVERIFIED: every offset below is a static inference. capture_verified: false.

name: SmsgActorVitalsAndPairState
opcode: 0x50035           # major 5 (Push), minor 53 -> (5 << 16) | 53
direction: S2C
size: 32                 # fixed 32-byte payload block
spec: packets/5-53_actor_vitals_and_pair_state.yaml
status: hypothesis
capture_verified: false

summary: Server pushes an actor's current vitals (HP / stamina / a third vital) plus level/state, and a pairing (couple) relationship when the actor sort marks a paired entity.

# Wire order, offset 0 = first payload byte. Pack=1; widths sum to size: 32.
fields:
  - { name: Sort,        type: u8 }          # 0x00  actor sort (a value of 8 is remapped to 1 on read)
  - { name: Pad0,        type: "bytes[3]" }    # 0x01  alignment padding to the next dword
  - { name: ActorId,     type: u32 }         # 0x04  target actor id
  - { name: Byte08,      type: u8 }          # 0x08  read into the record; meaning not decoded
  - { name: Byte09,      type: u8 }          # 0x09  read into the record; meaning not decoded
  - { name: LevelOrState, type: u8 }         # 0x0a  level / state byte
  - { name: StateByte,   type: u8 }          # 0x0b  secondary state byte
  - { name: PartnerId,   type: u32 }         # 0x0c  partner / pair actor id (used when Sort == 2)
  - { name: CurrentHp,   type: u32 }         # 0x10  current HP
  - { name: VitalB,      type: u32 }         # 0x14  secondary vital
  - { name: Stamina,     type: u32 }         # 0x18  current stamina
  - { name: VitalC,      type: u32 }         # 0x1c  third vital (e.g. MP / special); mirrored to the local-player global when this is the local actor

notes: |
  Static inference only; no capture available. Total = 32 bytes (matches the handler's single
  32-byte read). The handler looks the actor up by (Sort, ActorId) and writes the vitals into the
  actor record.

    0x00 (1B) Sort         : actor sort; the value 8 is normalised to 1 on read.
    0x04 (4B) ActorId      : actor id (le u32) for the lookup.
    0x08 (1B) / 0x09 (1B)  : read into the struct but not decoded this pass.
    0x0a (1B) LevelOrState : a level/state byte.
    0x0b (1B) StateByte    : a secondary state byte.
    0x0c (4B) PartnerId    : partner/pair actor id. When Sort == 2 the handler treats this as a
                             couple-relationship partner and emits couple-status UI text (the
                             10025..10032 string ids are UI strings, NOT wire data).
    0x10 (4B) CurrentHp    : current HP. HIGH CONFIDENCE (direct store into the HP slot).
    0x14 (4B) VitalB       : a secondary vital. Order unconfirmed -- see unknowns.
    0x18 (4B) Stamina      : current stamina. HIGH CONFIDENCE.
    0x1c (4B) VitalC       : a third vital (MP / special); for the local player it is mirrored to a
                             client global and clamped to live values.

  UNKNOWNS to resolve with a capture of an HP/MP/stamina-changing event:
    - the semantics of bytes 0x08/0x09;
    - the precise ordering of the vital fields (HP / VitalB / Stamina / VitalC).

  RELATED: this is one of the inbound vitals/state messages alongside 5/32 SmsgLevelUp
  (packets/5-32_level_up.yaml).
