name: CmsgSubmitId
opcode: 0x20030           # major 2 (GameAction), minor 48 -> (2 << 16) | 48
direction: C2S
size: 4                   # fixed 4-byte body
spec: packets/2-48_submit_id.yaml
status: hypothesis
capture_verified: false

summary: Confirm / submit a single u32 id selected from a HUD list. The simplest member of the HUD record-submit family.

# Wire order, offset 0 = first payload byte. Pack=1; the width sums to size: 4.
fields:
  - { name: Id, type: u32 }   # 0x00  the selected target / list id [capture/debugger-pending]

notes: |
  CONTROL-FLOW CONFIRMED body size (a single fixed 4-byte blit of the caller's argument); the field
  VALUE meaning is a static inference (capture-pending).

    0x00 (4B) Id : the target/list id selected from a HUD list. [capture/debugger-pending]

  TRIGGER / GATE (client-side, informational): a HUD list action — a selection resolver must equal
  the "OK" sentinel before sending; the failure branch plays a UI sound and shows list-click
  feedback. So 2/48 is the "confirm this single selected id" action.

  UNKNOWNS to resolve with a capture:
    - the id space (which list this confirms);
    - the inbound reply opcode — pending.

  UNBLOCKS: Client.Application HUD single-id submit use-case.
