# Clean-room field spec. Promoted from a neutral analyst note; rewritten, not copied.
#
# VERIFICATION BANNER
#   verification: confirmed  (opcode->handler routing, the fixed 184-byte (0xB8) body, the 8-byte
#                 head@+0x00, and the success@+0x08 / fail_sub@+0x09 gate bytes are
#                 control-flow-confirmed; the product-result record interior from +0x0a is forwarded
#                 to a product-apply sub-handler; every VALUE meaning is capture/debugger-pending)
#   ida_reverified: 2026-06-20
#   ida_anchor: 263bd994
#   ida_reverified: 2026-06-27 (CYCLE 14 deep-verify)   ida_anchor: f61f66a9   evidence: [static-ida]
#     -- CYCLE 14 deep-verify (f61f66a9): body layout re-traced against handler, 2 fields re-confirmed SAME
#        (Success@8, FailSub@9 with 102->decrement-char-count), 0 corrected.
#   conflicts: REFINED from "opaque" to a gated 184-byte product-result panel. The fail_sub == 102 arm
#              decrements the local player's character count (a cash product that consumes a character
#              slot).

name: SmsgProductPurchaseResultPanel
opcode: 0x4004b           # major 4 (Response), minor 75 -> (4 << 16) | 75
direction: S2C
size: 184                 # fixed 184-byte body (0xB8)
spec: packets/4-75_product_purchase_result_panel.yaml
status: hypothesis
capture_verified: false

summary: Server pushes a product / cash-item purchase result with an on-screen result panel. A fixed 184-byte body gated by a success byte and a failure sub-code; on success the whole block is forwarded to a product-apply sub-handler, and one failure sub-code decrements the local player's character count (a cash product that consumes a character slot).

# Wire order, offset 0 = first payload byte. Pack=1; only the two gate bytes are interpreted by THIS
# handler; the rest of the 184-byte record is forwarded to the product-apply sub-handler. Widths sum
# to size: 184. (A small pre-init helper scrubs the first 8 bytes of the destination before the read;
# the success/fail bytes are read at payload +0x08 / +0x09; an 8-byte head precedes.)
# verification: ida_anchor 263bd994 — Success@+0x08 and FailSub@+0x09 confirmed; 8-byte head precedes.
fields:
  - { name: Head,    type: "bytes[8]" }    # 0x00  8-byte head scrubbed by the pre-init helper before the gate bytes are read
  - { name: Success, type: u8 }            # 0x08  != 0 => success path (forward block); == 0 => failure path
  - { name: FailSub, type: u8 }            # 0x09  failure path only: 101 = show an error string; 102 = decrement the local-player character count by 1
  - { name: Body,    type: "bytes[174]" }  # 0x0a  remainder of the 184-byte product-result record, forwarded to the product-apply sub-handler
  # widths: 8 + 1 + 1 + 174 = 184

notes: |
  CONTROL-FLOW CONFIRMED: the fixed 184-byte (0xB8) body, the 8-byte head, and the two gate bytes
  (Success @+0x08, FailSub @+0x09). CAPTURE-UNVERIFIED for VALUE meanings; the record interior is
  forwarded opaquely. The pre-init helper scrubs the first 8 payload bytes (Head) before the gate
  bytes are read (payload-cursor convention).

    0x00 (8B) Head    : scrubbed by the pre-init helper; not field-read by this handler.
    0x08 (1B) Success : nonzero => the success path, which forwards the whole 184-byte block to a
                        product-apply sub-handler; 0 => the failure path.
    0x09 (1B) FailSub : consulted only on the failure path. 101 = surface an error string; 102 =
                        decrement the local player's character count by 1 (a cash product that consumes
                        a character slot).

  RECORD INTERIOR (DOWNSTREAM): the bytes past the two gate bytes are consumed by the product-apply
  sub-handler, not field-read here. Do NOT publish guessed interior offsets -- capture/downstream-pending.

  CONTRACT ROLE: a product / cash-item purchase result. Candidate paired C2S: the product family
  (2/151 / 2/153).

  UNKNOWNS to resolve with a capture: the product-result record layout and the full FailSub enum.
