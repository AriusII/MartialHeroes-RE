# Clean-room field spec. Promoted from a neutral analyst note; rewritten, not copied.
# CAPTURE-UNVERIFIED: every offset below is a static inference. capture_verified: false.
# verification: idb-sha256-263bd994c927c20a38624cf0ca452eaef365057fa9db1543d8f668c14a6fd8ee
# AUDIT-NOTE: this file was previously mis-labelled CmsgStanceSwap. Opcode 2/6 is CmsgEmote.
#             The real posture/stance toggle is opcode 2/137 (CmsgStanceSwap / CmsgPostureToggle).

name: CmsgEmote
opcode: 0x20006           # major 2 (GameAction), minor 6 -> (2 << 16) | 6
direction: C2S
size: 8                   # fixed 8-byte payload
spec: packets/2-6_stance_swap.yaml
status: confirmed
capture_verified: false

summary: Motion/emote send. Client sends the desired motion id and a sub-selector; the server applies the local motion change and swaps the actor's weapon FX accordingly. Client-side throttled at 2000ms. Also invoked internally by the duel-result handler (opcode 4/43).

# Wire order, offset 0 = first payload byte. Pack=1; the widths sum to size: 8.
fields:
  - { name: MotionId, type: u8 }       # 0x00  motion/emote id to play [capture/debugger-pending]
  - { name: Sub,      type: u8 }       # 0x01  sub-selector (variant or channel) [capture/debugger-pending]
  - { name: Pad,      type: u16 }      # 0x02  padding, expected zero
  - { name: Arg,      type: u32 }      # 0x04  motion argument / parameter [capture/debugger-pending]

notes: |
  AUDIT-CORRECTED. This opcode was previously catalogued as CmsgStanceSwap; that attribution was
  wrong. The builder is Cmsg_Emote_Send (opcode 2/6). The byte layout coincidentally matches the
  prior (erroneous) stance-swap model but all field names, meanings, and the opcode identity are
  different. The real combat-stance / posture toggle is opcode 2/137 (Cmsg_PostureToggle_Send).

    0x00 (1B) MotionId : the motion/emote id to play on the local actor.
    0x01 (1B) Sub      : sub-selector (motion variant or animation channel).
    0x02 (2B) Pad      : padding, expected zero.
    0x04 (4B) Arg      : motion argument / parameter (meaning varies by MotionId).

  CLIENT-SIDE GATE: the sender enforces a 2000ms cooldown between consecutive emote sends.
  This throttle is purely client-side and is not a wire field.

  SIDE EFFECTS: receiving this opcode changes the actor's local motion state and swaps weapon FX
  to match the new motion (e.g. weapon-drawn vs. weapon-sheathed visuals).

  DUEL INTEGRATION: the duel-result handler (opcode 4/43) calls this same sender to force a
  motion change at the end of a duel.

  UNKNOWNS to resolve with a capture:
    - the full enumeration of MotionId values and per-id Arg semantics;
    - whether Sub carries additional bits beyond a variant selector.

  UNBLOCKS: Client.Application emote / motion-send use-case.
