# Clean-room field spec. Promoted from a neutral analyst note; rewritten, not copied.
# CYCLE 14 deep-verify (2026-06-27, build f61f66a9): ida_anchor f61f66a9; body layout re-traced against handler, 4 fields re-confirmed SAME (ActorSort@0, ActorId@4, Op@8, SubOp@0xa), 0 corrected.
# ROUTING: Response table-driven (major-4 / minor-44).
# size: 16 bytes (0x10) fixed-size block read via PacketBuffer_ReadField.

name: SmsgActorTickTableOpA
opcode: 0x4002c           # major 4 (Response), minor 44 -> (4 << 16) | 44
direction: S2C
size: 16                  # fixed 16-byte payload (0x10)
spec: packets/4-44_actor_tick_table_op_a.yaml
status: confirmed
capture_verified: false

summary: >
  Actor tick-table operation A. Interacts with the client-side actor tick-table singleton.
  If the operation code is 1, it copies equipment visual records from g_LocalPlayer to
  the active equipment display mirror table.

fields:
  - { name: ActorSort, type: u32, offset: 0 }       # composite key: actor sort
  - { name: ActorId, type: u32, offset: 4 }         # composite key: actor ID
  - { name: Op, type: u8, offset: 8 }               # operation code (0 = close panel/reset, 1 = load table)
  - { name: Padding, type: u8, offset: 9 }          # alignment padding
  - { name: SubOp, type: u8, offset: 10 }           # sub-operation code (tested against 0, 1, 2)
  - { name: Padding2, type: "u8[5]", offset: 11 }   # alignment padding to 16 bytes

notes: |
  Static analysis only; no capture available.

  BEHAVIOUR:
    - If Op == 0: retrieves the Diamond MainHandler singleton and invokes its panel-close/reset method.
    - If Op == 1:
      - Invokes the tick-table subsystem's actor-lookup method with the payload's actor key.
      - If SubOp == 0: loops exactly 20 times to copy equipment structures (each 16 bytes, total 320 bytes)
        starting at g_LocalPlayer + 200 into the global equipment mirror g_EquipTable.
