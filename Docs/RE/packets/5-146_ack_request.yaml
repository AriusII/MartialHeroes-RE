name: SmsgAckRequest
opcode: 0x50092           # major 5 (ServerPush), minor 146 -> (5 << 16) | 146
direction: S2C
size: 8                   # fixed 8-byte payload (two dwords)
spec: packets/5-146_ack_request.yaml
status: confirmed
capture_verified: false

summary: Server ack-request push for PvP zone presence detection. Client echoes back via 2/146 (CmsgServerAckEcho).

# Wire order, offset 0 = first payload byte. Pack=1; the widths sum to size: 8.
fields:
  - { name: Token,           type: u32 }   # 0x00  request token to be echoed back
  - { name: ValidationValue, type: u32 }   # 0x04  validated against local state

notes: |
  Static inference only; no capture available. CODE-CONFIRMED layout (8 bytes = two
  little-endian dwords), CAPTURE-UNVERIFIED meaning.

    0x00 (4B) Token           : a request token generated by the server. The client must
                                echo this value back in CmsgServerAckEcho (2/146) (le u32).
    0x04 (4B) ValidationValue : a value the client validates against its local state
                                before responding (le u32). The exact validation logic is
                                not yet fully characterized.

  CONTEXT: this is the server-side push half of the PvP zone presence detection
  handshake. The server periodically sends this to clients in PvP zones to verify
  they are still actively connected and responsive. The client must reply with
  CmsgServerAckEcho (2/146, opcode 0x20092) echoing the Token.

  RELATED: CmsgServerAckEcho (2/146, opcode 0x20092) -- the client-side echo reply.

  UNKNOWNS to resolve with a capture:
    - how frequently the server sends this push;
    - the exact validation the client performs on ValidationValue;
    - whether Token is monotonically increasing, random, or derived from a sequence.

  UNBLOCKS: Client.Application PvP zone ack-request handling and echo-reply dispatch.
