name: SmsgQuestList
opcode: 0x50044           # major 5 (Push), minor 68 -> (5 << 16) | 68
direction: S2C
size: 452                # fixed 452-byte payload block (0x1C4)
spec: packets/5-68_quest_list.yaml
status: hypothesis
capture_verified: false

summary: >
  Server pushes the player's quest-log snapshot. A fixed 452-byte block laid out COLUMNAR
  (struct-of-arrays): a leading region with three flag bytes, then four PARALLEL per-quest columns.
  Byte-A and byte-B columns are count 10; value-word and name columns are count 20 (asymmetric).
  The client copies it into its quest mirror and rebuilds the quest-log tabs. This is how a quest
  action (2/28) result reaches the client.

# Wire order, offset 0 = first payload byte. Pack=1; all offsets are payload-relative (no leading
# frame header in front of this buffer -- the copier receives the 452-byte block directly).
# Byte-A/byte-B columns: count 10 each. Value-word/name columns: count 20 each (asymmetric).
# Widths sum to size: 452.
fields:
  - { name: LeadRegion,    type: "bytes[8]" }    # +0x00  leading region; first 8 bytes, opaque to the copier
  - { name: MirrorFlagC,   type: u8 }            # +0x08  mirror flag (-> mirror+435)
  - { name: PanelOpenGate, type: u8 }            # +0x09  quest-panel open/close gate (-> mirror+432; a transition opens/closes the panel)
  - { name: MirrorFlagB,   type: u8 }            # +0x0A  mirror flag (-> mirror+434)
  - { name: ByteAColumn,   type: "bytes[10]" }   # +0x0B  per-quest byte-A column: u8 x 10 (stride 1, count 10) -- quest id / icon class
  - { name: ByteBColumn,   type: "bytes[10]" }   # +0x15  per-quest byte-B column: u8 x 10 (stride 1, count 10) -- progress / state
  - { name: Gap0,          type: "bytes[1]" }    # +0x1F  alignment filler before the value-word column -- opaque
  - { name: ValueColumn,   type: "bytes[80]" }   # +0x20  per-quest value-word column: u32 x 20 (stride 4, count 20)
  - { name: NameColumn,    type: "bytes[340]" }  # +0x70  per-quest CP949 name column: char[17] x 20 (wire stride 17, count 20; cell[16] forced NUL)
  # widths: 8 + 1 + 1 + 1 + 10 + 10 + 1 + 80 + 340 = 452 (exact; no tail)
  # ValueColumn: +0x20..+0x6F (80 bytes). NameColumn: +0x70..+0x1C3 (340 bytes). Block exhausted at +0x1C4.
  # (Byte-A/B count 10; value/name count 20 -- asymmetric by design.)

notes: |
  CONTROL-FLOW CONFIRMED: routing + fixed 452-byte size + the columnar section layout (every bound is
  an explicit copier loop compare-against-constant). CAPTURE-UNVERIFIED for every byte's VALUE meaning.

  COLUMN COUNTS (ASYMMETRIC):
    Byte-A column  : stride 1, count 10 (dest loop limit 320, dest stride 32 => 10 iterations).
    Byte-B column  : stride 1, count 10 (same loop structure).
    Value-word col : stride 4, count 20 (dest loop limit 640, dest stride 32 => 20 iterations).
    Name column    : wire stride 17, count 20 (same loop as value-word => 20 iterations).
  The byte-A and byte-B columns are count 10; the value-word and name columns are count 20. This
  asymmetry is binary-confirmed.

  WIRE LAYOUT (payload-relative; no frame header prepended to this buffer):
    +0x00 (8B)  LeadRegion   : leading 8-byte region, opaque to the columnar copier.
    +0x08 (1B)  MirrorFlagC  : copied to mirror+435. Meaning capture-pending.
    +0x09 (1B)  PanelOpenGate: the panel open/close gate snapshotted by the handler (-> mirror+432);
                               a transition between the pre-copy and post-copy values opens/closes the
                               quest-log panel.
    +0x0A (1B)  MirrorFlagB  : copied to mirror+434. Meaning capture-pending.
    +0x0B (10B) ByteAColumn  : one byte per quest record (stride 1), count 10 -- quest id / icon class.
    +0x15 (10B) ByteBColumn  : one byte per quest record (stride 1), count 10 -- progress / state.
    +0x1F (1B)  Gap0         : alignment filler (opaque).
    +0x20 (80B) ValueColumn  : one u32 per quest record (stride 4), count 20 -- a per-quest value word.
                               Ends at +0x70.
    +0x70 (340B) NameColumn  : one CP949 name per quest record at a 17-byte WIRE stride, count 20
                               (16 usable + forced NUL at cell+16). 20 x 17 = 340 bytes. Ends at +0x1C4
                               (= byte 452), filling the block exactly. No trailing pad region.

  RUNTIME-MIRROR vs WIRE (DO-NOT-PROMOTE-AS-WIRE): the client stores each quest as a 32-byte mirror slot
  (the per-quest value word at slot+8, the CP949 name at slot+12). The 32-byte slot stride is a RUNTIME
  host-struct stride, NOT the wire stride. On the WIRE the name stride is 17 bytes. Do not conflate the
  two -- only the 17-byte wire stride and the columnar offsets above are promotable.

  HOW THE CLIENT USES IT: the quest-log window presents tabs (active / completable / available) and
  resolves quest CAPTION text from the message-string database by numeric id, and dialog BODY lines from
  the npc.scr dialog records. Neither text source is carried here -- this packet carries quest STATE
  (which quests, their flags), and the client renders text from local data.

  UNKNOWNS to resolve with a quest-log capture:
    - the per-byte meaning of MirrorFlagC / PanelOpenGate / MirrorFlagB;
    - the per-entry meaning of ByteAColumn and ByteBColumn (quest id, icon class, progress, state);
    - whether a ByteAColumn entry of 0 marks an empty slot;
    - the tab/status encoding (which column byte selects active vs completable vs available);
    - the exact role of the value-word column entries.

  RELATED: 2/28 CmsgQuestAction (packets/2-28_quest_action.yaml) is the C2S that causes this push. The
  quest turn-in verdict (the result panel + completion cue) rides 5/73 SmsgQuestComplete
  (packets/5-73_quest_complete.yaml); this 5/68 list is the full quest-state snapshot. UNBLOCKS the
  quest-log rebuild in Client.Application.
