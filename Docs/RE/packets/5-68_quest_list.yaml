# Clean-room field spec. Promoted from a neutral analyst note; rewritten, not copied.
# CONTROL-FLOW CONFIRMED: routing + fixed 452-byte (0x1C4) size + the parser's section layout (three
# header bytes, two 10-byte state vectors, a 20-entry u32 quest-id array, a 20-entry 17-byte CP949
# name array). VALUE semantics of individual bytes PENDING. capture_verified: false.
# spec: Docs/RE/packets/5-68_quest_list.yaml

name: SmsgQuestList
opcode: 0x50044           # major 5 (Push), minor 68 -> (5 << 16) | 68
direction: S2C
size: 452                # fixed 452-byte payload block (0x1C4)
spec: packets/5-68_quest_list.yaml
status: hypothesis
capture_verified: false

summary: >
  Server pushes the player's quest-log snapshot. A fixed 452-byte block the client parses field by
  field into its quest mirror and uses to rebuild the quest-log tabs. The body is three header bytes,
  then two 10-byte state/flag vectors, then a 20-entry u32 quest-id array, then a 20-entry CP949
  name array (17-byte cells). ids and names are PARALLEL arrays (ids fully precede names), NOT
  interleaved records. This is how a quest action (2/28) result reaches the client.

# Wire order, offset 0 = first payload byte. Pack=1; widths sum to size: 452. The arrays are modelled
# as fixed bytes[N] blobs (the only fixed-buffer wire type); the engineer slices each into its entries
# of the stated stride.
fields:
  - { name: LeadRegion,    type: "bytes[8]" }    # +0    leading framed-header region the parser skips past (body +0..+7) -- opaque
  - { name: HeaderFlagA,   type: u8 }            # +8    header flag A
  - { name: HeaderFlagB,   type: u8 }            # +9    header flag B
  - { name: HeaderFlagC,   type: u8 }            # +10   header flag C
  - { name: StateVectorA,  type: "bytes[10]" }   # +11   state/flag vector A: 10 x u8 (1-byte stride) -> quest mirror array A
  - { name: StateVectorB,  type: "bytes[10]" }   # +21   state/flag vector B: 10 x u8 (1-byte stride) -> quest mirror array B
  - { name: GapA,          type: "bytes[1]" }    # +31   alignment filler before the quest-id array -- opaque
  - { name: QuestIds,      type: "bytes[80]" }   # +32   quest-id array: 20 x u32 (4-byte stride)
  - { name: QuestNames,    type: "bytes[340]" }  # +112  CP949 name array: 20 x 17-byte cell (17-byte stride) -- ends exactly at +452
  # widths: 8 + 1 + 1 + 1 + 10 + 10 + 1 + 80 + 340 = 452 (the on-wire body). The three header bytes
  # sit at body +8..+10; vectors at +11/+21; a 1-byte filler at +31; ids +32..+111; names +112..+451.
  # NOTE on offsets: this packet's parser indexes the body with the 8-byte frame header included in
  # its addressing, so the three header bytes sit at body +8..+10 and the arrays follow.

notes: |
  CONTROL-FLOW CONFIRMED routing + size + section layout (every bound below is an explicit
  compare-against-constant loop in the quest-mirror parser). VALUE semantics of individual bytes
  PENDING (which flag is "active", what each state byte means). The block parses cleanly to the 452
  boundary.

  OFFSET CONVENTION: the parser addresses the body with the 8-byte frame header region in front, so
  the three header flag bytes land at body +8/+9/+10, the two state vectors at +11 and +21, the
  quest-id array at +32..+111 (80 bytes), and the CP949 name array at +112..+451 (340 bytes), ending
  exactly at 452. The leading 8 bytes (+0..+7) are the framed header region the parser skips.

  SECTIONS:
    +8  (1B)  HeaderFlagA / +9 (1B) HeaderFlagB / +10 (1B) HeaderFlagC : three header bytes stored
              into distinct quest-mirror scalar slots. Roles PENDING.
    +11 (10B) StateVectorA : 10 x u8, written one byte per entry into quest-mirror array A (the
              mirror's per-entry destination stride is 32 -- a HOST struct stride, NOT the wire
              stride; the wire stride is 1). Likely a small summary/category set. Roles PENDING.
    +21 (10B) StateVectorB : 10 x u8, same shape into quest-mirror array B.
    +32 (80B) QuestIds   : 20 x u32, the quest-id array (4-byte stride). 20 quest slots.
    +112 (340B) QuestNames : 20 x 17-byte CP949 name cell (16 usable + forced NUL at cell+16). The
              17-byte stride is the standard short-name field width across this quest/rank panel
              family (NOT the ~32 destination-struct stride a prior note mentioned).

  ids and names are PARALLEL arrays (the id block fully precedes the name block), NOT interleaved
  per-quest records. The two 10-byte state vectors are 10 elements each (a smaller summary set than
  the 20 quest slots).

  HOW THE CLIENT USES IT: the quest-log window presents tabs (active / completable / available) and
  resolves quest CAPTION text from the message-string database by numeric id and dialog BODY lines
  from the npc.scr dialog records. Neither text source is carried here -- this packet carries quest
  STATE (which quests, their flags), and the client renders text from local data.

  UNKNOWNS to resolve with a quest-log capture:
    - the per-byte meaning of HeaderFlagA/B/C and the two 10-byte state vectors;
    - whether a quest-id of 0 marks an empty slot;
    - the tab/status encoding (which vector byte selects active vs completable vs available).

  RELATED: 2/28 CmsgQuestAction (packets/2-28_quest_action.yaml) is the C2S that causes this push.
  There is NO separate "quest complete" opcode -- quest turn-in results ride this 5/68 list (5/73 is
  the unrelated guild-war info window). UNBLOCKS the quest-log rebuild in Client.Application.
