# names.yaml - project glossary for the legacy Martial Heroes client.
#
# Maps original IDA symbols / addresses to canonical project names. This is a GLOSSARY
# (clean, committed), not decompiler output. The `ida-naming-sync` skill applies this map
# to the live IDA database and pulls renamed symbols back.
#
# Address keys are strings ("0x<addr>") so YAML never coerces them to ints/floats.

binary:
  # The analysis is pinned to this exact build of the legacy client.
  name: "doida.exe"
  sha256: "63fcaf8e81a61097c68d22ae82514dded54e59c41c480850a568a0f0d79eb9df"
  notes: "Legacy D.O. Online / Martial Heroes client; x86 32-bit; imagebase 0x400000."

functions: {}
  # "0x<addr>": { name: "RecvPacketDispatch", note: "main opcode switch" }

globals: {}
  # "0x<addr>": { name: "g_RollingKey", note: "packet cipher rolling key state" }

crypto:
  # Keyed by canonical ROLE name (not address); see Docs/RE/specs/crypto.md.
  WireCipher:      { note: "keyless/stateless message-tier payload byte cipher (outbound)", spec: "Docs/RE/specs/crypto.md" }
  WireCompression: { note: "LZ4 payload compression applied after the wire cipher (outbound)", spec: "Docs/RE/specs/crypto.md" }
  SecureHandshake: { note: "opcode 0/0 bignum public-key session handshake; reply as Auth 1/4; NOT Windows CryptoAPI", spec: "Docs/RE/specs/crypto.md" }
  ConfigCryptoApi: { note: "ADVAPI32 anti-cheat + signed/encrypted config-file loader; OUT OF SCOPE for Network.Crypto", spec: "Docs/RE/specs/crypto.md" }

# Opcodes are the (major:minor) wire tuple. The key is the catalog encoding major<<16|minor
