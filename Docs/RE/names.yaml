# names.yaml - project glossary for the legacy Martial Heroes client.
#
# Maps original IDA symbols / addresses to canonical project names. This is a GLOSSARY
# (clean, committed), not decompiler output. The `ida-naming-sync` skill applies this map
# to the live IDA database and pulls renamed symbols back.
#
# Address keys are strings ("0x<addr>") so YAML never coerces them to ints/floats.

binary:
  # The analysis is pinned to this exact build of the legacy client.
