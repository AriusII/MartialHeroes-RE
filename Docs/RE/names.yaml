file_extensions:
  ".map": { note: "terrain cell text descriptor (sections + DATAFILE/TEXTURES directives)", spec: "Docs/RE/formats/terrain.md" }
  ".ted": { note: "terrain cell binary blob (heightmap/normals/lookup/direction/diffuse)", spec: "Docs/RE/formats/terrain.md" }
  ".mud": { note: "terrain cell 32768-byte blob: 64x64 grid of 8-byte per-tile ambient-sound records", spec: "Docs/RE/formats/terrain.md" }
  ".sod": { note: "terrain cell collision: u32 solidCount + variable-length solid/triangle records", spec: "Docs/RE/formats/terrain.md" }
  ".lst": { note: "binary cell-key manifest (u32 count + u32[] keys, key=mapZ+100000*mapX)", spec: "Docs/RE/formats/terrain.md" }
  ".mot": { note: "skeletal animation clip (binary LE; 28-byte keyframes, 10 fps)", spec: "Docs/RE/formats/animation.md" }
  ".scr": { note: "client catalogue/stat-curve table (binary fixed-stride records)", spec: "Docs/RE/formats/config_tables.md" }
  ".bud": { note: "terrain cell building/scene geometry blob (the .map BUILDING DATAFILE; objectCount + per-object verts/indices)", spec: "Docs/RE/formats/terrain_scene.md" }
  ".up":  { note: "terrain UP_TERRAIN geometry (u32 count + 40-byte triangle records)", spec: "Docs/RE/formats/terrain_layers.md" }
  ".exd": { note: "terrain EXTRA_TERRAIN geometry (u32 count + 40-byte triangle records)", spec: "Docs/RE/formats/terrain_layers.md" }
  ".fx1": { note: "terrain FX layer (per-index vertex strides 32/36/44 B); .fx1-.fx7", spec: "Docs/RE/formats/terrain_layers.md" }
  ".pre": { note: "precomputed collision sidecar (<cell>.sod.pre)", spec: "Docs/RE/formats/terrain_layers.md" }
  ".post": { note: "terrain editor full-snapshot sidecar (<cell>.ted.post, same 46987-byte layout as .ted)", spec: "Docs/RE/formats/terrain_layers.md" }
  ".bin": { note: "per-area environment binary family (map_option/fog/light/material/stardome/clouddome/cloud_cycle/weather %d.bin); light%d.bin = sky/light keyframe tables, NOT lightmaps (corrected)", spec: "Docs/RE/formats/environment_bins.md" }
  ".xeff": { note: "visual-effects definition (particle emitters/primitives; magic XEFF as invalid-sentinel)", spec: "Docs/RE/formats/effects.md" }
  ".eff": { note: "AMBIGUOUS by directory: per-map sound-trigger table OR effect-object (data/effect/obj)", spec: "Docs/RE/formats/effects.md" }
  ".wlk": { note: "per-map footstep(walk) sound table (256x48B)", spec: "Docs/RE/formats/sound_tables.md" }
  ".run": { note: "per-map footstep(run) sound table (256x48B)", spec: "Docs/RE/formats/sound_tables.md" }
  ".bgm": { note: "per-map background-music schedule table (256x48B)", spec: "Docs/RE/formats/sound_tables.md" }
  ".bge": { note: "per-map ambient sound table (256x48B)", spec: "Docs/RE/formats/sound_tables.md" }
  ".ogg": { note: "standard Ogg Vorbis audio (2d/3d directories)", spec: "Docs/RE/formats/sound_tables.md" }
  ".skn": { note: "skinned mesh (binary)", spec: "Docs/RE/formats/mesh.md" }
  ".bnd": { note: "skeleton (36-byte bone records)", spec: "Docs/RE/formats/mesh.md" }
  ".xobj": { note: "ASCII static mesh (effect geometry)", spec: "Docs/RE/formats/mesh.md" }
  ".dds": { note: "DXT texture (D3DX9-delegated)", spec: "Docs/RE/formats/texture.md" }
  ".tga": { note: "TGA texture (D3DX9-delegated)", spec: "Docs/RE/formats/texture.md" }
  ".bmp": { note: "standard BMP texture (directly usable; toonramp.bmp = shader LUT)", spec: "Docs/RE/formats/texture.md" }
  ".png": { note: "standard PNG texture (directly usable; char texture buckets)", spec: "Docs/RE/formats/texture.md" }
  ".csv": { note: "items.csv — plaintext item catalogue (~100 cols, CP949 names)", spec: "Docs/RE/formats/config_tables.md" }
  ".do":  { note: "client data table (emoticon/msginfo/items_extra)", spec: "Docs/RE/formats/config_tables.md" }
  ".psh": { note: "Direct3D 9 pixel shader assembly", spec: "Docs/RE/formats/shaders.md" }
  ".vsh": { note: "Direct3D 9 vertex shader assembly", spec: "Docs/RE/formats/shaders.md" }
  ".arr": { note: "NPC/monster spawn array (npcNNN.arr; links to mobs.scr ids)", spec: "Docs/RE/formats/npc_spawns.md" }
  ".xdb": { note: "misc data table (actor_size/effectscale)", spec: "Docs/RE/formats/misc_data.md" }
  ".mi":  { note: "mob-info data (mobinfo.mi)", spec: "Docs/RE/formats/misc_data.md" }

# Asset/format constants (data magic numbers; NOT decompiler output).
asset_constants:
  DDS_MAGIC:               { value: "0x20534444", note: "'DDS ' little-endian", spec: "Docs/RE/formats/texture.md" }
  DDS_HEADER_SIZE:         { value: 124, spec: "Docs/RE/formats/texture.md" }
  DXT1_BLOCK_BYTES:        { value: 8, spec: "Docs/RE/formats/texture.md" }
  DXT3_BLOCK_BYTES:        { value: 16, spec: "Docs/RE/formats/texture.md" }
  DXT5_BLOCK_BYTES:        { value: 16, spec: "Docs/RE/formats/texture.md" }
  XEFF_INVALID_MAGIC:      { value: "0x46464558", note: "'XEFF' LE; header equal to this = invalid-file sentinel", spec: "Docs/RE/formats/effects.md" }
  TED_CELL_BYTES:          { value: 46987, note: "5 sequential blocks, no header", spec: "Docs/RE/formats/terrain.md" }
  MUD_CELL_BYTES:          { value: 32768, note: "64x64 grid of 8-byte records", spec: "Docs/RE/formats/terrain.md" }
  TERRAIN_VERTEX_SPACING:  { value: 16, note: "world units per vertex (1024/64)", spec: "Docs/RE/formats/terrain.md" }
  VFS_ENTRY_COUNT_SAMPLE:  { value: 43347, note: "entries in the supplied real data.inf (validation datum)", spec: "Docs/RE/formats/pak.md" }
  BANI_MAGIC:              { value: "0x494E4142", note: "'BANI' LE; header magic of the 11-of-3891 .mot variant", spec: "Docs/RE/formats/animation.md" }
  BGTEXTURE_RECORD_BYTES:  { value: 48, note: "u8 kind + char[47] path_stem; supersedes the earlier 76B claim", spec: "Docs/RE/formats/texture.md" }
  BUD_VERTEX_FVF:          { value: "0x112", note: "XYZ|NORMAL|TEX1 — proves no lightmap UV / no vertex color in .bud", spec: "Docs/RE/formats/terrain_scene.md" }
  SKY_KEYFRAME_COUNT:      { value: 48, note: "day/night keyframes per area", spec: "Docs/RE/formats/environment_bins.md" }
  SKY_KEYFRAME_MS:         { value: 1800, note: "ms per keyframe; 48 x 1800 ms = 86.4 s simulated day", spec: "Docs/RE/formats/environment_bins.md" }
  UI_REFERENCE_CANVAS:     { value: "1024x768", note: "pixel canvas all hardcoded UI layouts assume", spec: "Docs/RE/specs/ui_system.md" }
  GAMEPLAY_CAMERA:         { value: "fov65/near5/far15000", note: "vertical FOV deg; fixed-radius orbit (zoom moves elevation)", spec: "Docs/RE/specs/camera_movement.md" }
  MSGXDB_RECORD_BYTES:     { value: 516, note: "u32 id + u8[512] CP949 text; fill byte 0xEE; 2,644 records in the reference VFS", spec: "Docs/RE/formats/misc_data.md" }
  SKILL_ICON_CELL_PX:      { value: 23, note: "fixed square skill-icon cell on the 512x512 (job,kind) sheets; per-skill (srcX,srcY) is STORED data, not a grid formula", spec: "Docs/RE/formats/ui_manifests.md" }
  DO_STANCE_RECORD_BYTES:  { value: 116, note: "per-class stance .do record (12 files, data/script/<class><stance>.do); icon srcX/srcY at +0x18/+0x1C; corrects the earlier 166B estimate", spec: "Docs/RE/formats/ui_manifests.md" }
  ITEM_TEXTURELIST_MODEL:  { value: "flat-list", note: "data/item/texturelist.txt: one filename per line, leading numeric prefix = tex_id; ONE whole DDS per item icon (no atlas sub-rects)", spec: "Docs/RE/formats/ui_manifests.md" }
  SOUNDTABLE_RECORD_BYTES: { value: 48, note: "256 records per per-area sound table (.bgm/.bge/.eff/.wlk/.run)", spec: "Docs/RE/formats/sound_tables.md" }
  VFS_TOC_ENTRY_BYTES:     { value: 144, note: "data.inf directory entry: name[100] + u64 offset + u64 size + aux", spec: "Docs/RE/formats/pak.md" }
  # --- World-Scene formats promoted in Cycle 3 W2 ---
  BUFF_ICON_POS_RECORD_BYTES: { value: 12, note: "data/script/buff_icon_position.xdb record {u32 buffId (key), i32 iconSrcX, i32 iconSrcY}; CODE-CONFIRMED", spec: "Docs/RE/formats/misc_data.md" }
  BUFF_BAR_SLOTS:          { value: 30, note: "HUD buff-bar slot count; cleared+rebuilt each 4/102 refresh", spec: "Docs/RE/formats/misc_data.md" }
  BUFF_STATE_ID_BOUNDARY:  { value: 80, note: "buff id <=80 = 23x23 cell (left-to-right); id >80 = 25x25 state/debuff (fixed slot)", spec: "Docs/RE/formats/misc_data.md" }
  STATE_ICON_ATLAS:        { value: "data/ui/skillicon/stateicon.dds", note: "512x512 DXT2 shared buff/state icon atlas; per-buff (srcX,srcY) from buff_icon_position.xdb", spec: "Docs/RE/formats/misc_data.md" }
  MAPSETTING_RECORD_BYTES: { value: 84, note: "mapsetting.scr zone record {i32 zone_id, char[36] CP949 name, i32[4] bbox, f32 fog_density, 4x i32}; 52 zones; SAMPLE-VERIFIED", spec: "Docs/RE/formats/misc_data.md" }
  REGIONTABLE_RECORD_BYTES: { value: 32, note: "regiontableNNN.bin sub-region record {f32 centreX@0, f32 centreZ@4, char[16] CP949 label@0x10}; 52 records; SAMPLE-VERIFIED", spec: "Docs/RE/formats/misc_data.md" }
  MINIMAP_DOT_SCALE:       { value: "0.125", note: "world->radar: px = relX*0.125 + 66.5, py = relZ*0.125 + 66.5 (1:8, player centred in a 133x133 body); BYTE-VERIFIED", spec: "Docs/RE/specs/minimap.md" }
  QUESTS_SCR_RECORD_BYTES: { value: 3720, note: "quests.scr stride; 488 slots / 122 occupied (sparse u16 id@0, CP949 name@2); SAMPLE-VERIFIED", spec: "Docs/RE/formats/config_tables.md" }
  NPC_SCR_RECORD_BYTES:    { value: 404, note: "npc.scr stride; 2510 records (u32 id@0 mirrored@4, three CP949 paragraphs @0x14/0x50/0x90); SAMPLE-VERIFIED", spec: "Docs/RE/formats/config_tables.md" }
  AUTOQUESTION_RECORD_BYTES: { value: 92, note: "autoquestion_cl.scr stride; 1300 anti-bot quiz records (CP949 question@4); SAMPLE-VERIFIED", spec: "Docs/RE/formats/config_tables.md" }
  DISCRIPT_RECORD_BYTES:   { value: 68, note: "discript.sc stride; 33 records {u32 menu_id@0, u32 category@4, CP949 label@8}; SAMPLE-VERIFIED", spec: "Docs/RE/formats/config_tables.md" }

# Runtime behavior constants recovered in the Cycle-2 workflow wave (NOT decompiler output;
# values are interoperability facts promoted via the clean specs referenced).
runtime_constants:
  LOBBY_PORT:                  { value: 10000, note: "synchronous login-server surface; server list query; channel endpoint at 10000+server_id", spec: "Docs/RE/packets/lobby.yaml" }
  LOBBY_FALLBACK_HOST:         { value: "211.196.150.4", note: "hardcoded last-resort lobby host after ip.txt and list.dat", spec: "Docs/RE/packets/lobby.yaml" }
  LISTDAT_RECORD_BYTES:        { value: 768, note: "list.dat: u32 count + records (CP949 name @+0, host string @+256)", spec: "Docs/RE/packets/lobby.yaml" }
  SERVERLIST_RECORD_BYTES:     { value: 8, note: "lobby server entry: server_id u16, status i16, load i16, open_time i16", spec: "Docs/RE/packets/lobby.yaml" }
  KEEPALIVE_INTERVAL_MS:       { value: 20000, note: "CmsgKeepalive cadence (1s poll granularity)", spec: "Docs/RE/packets/2-10000_keepalive.yaml" }
  LOAD_PROGRESS_DENOMINATOR:   { value: 9395240, note: "hardcoded boot progress-bar byte estimate; NOT a completion signal", spec: "Docs/RE/specs/resource_pipeline.md" }
  # --- World-Scene runtime/wire constants promoted in Cycle 3 W2 ---
  MELEE_SKILL_SLOT:            { value: "0xFF", note: "skill-slot byte in C2S 2/52 that marks a basic melee attack; there is NO separate plain-attack opcode", spec: "Docs/RE/specs/combat.md" }
  BUFF_STATE_PACKET_BYTES:     { value: 476, note: "S2C 4/102 fixed body: stat block + 30 x 12B active-buff records at payload+116; server-authoritative buff bar", spec: "Docs/RE/packets/4-102_buff_state.yaml" }
  EXP_GAIN_PACKET_BYTES:       { value: 32, note: "S2C 5/9 ExpGain: 64-bit xp amount added to local current xp; server XP %-bonus", spec: "Docs/RE/packets/5-9_exp_gain.yaml" }
  COIN_ITEM_ID:                { value: 217000501, note: "the coin/money ground-item template id (C2S 2/14 mode 0xFF)", spec: "Docs/RE/specs/inventory_trade.md" }
  GROUND_ITEM_FALLBACK_MODEL:  { value: 201011001, note: "shared 3D model id used for a ground item whose template model is missing", spec: "Docs/RE/specs/inventory_trade.md" }
  LEVELUP_EVOLUTION_PANELS:    { value: "100@lvl12,101@lvl24", note: "class-evolution panels opened by S2C 5/32 LevelUp; UserXEffect 310000002 + sound 800000002", spec: "Docs/RE/specs/progression.md" }
  EFFECT_ID_PC_SPAWN:          { value: 310000001, note: "player materialize effect at world entry", spec: "Docs/RE/specs/effects.md" }
  EFFECT_ID_LEVELUP:           { value: 310000002, note: "level-up effect", spec: "Docs/RE/specs/effects.md" }
  EFFECT_ID_MOB_SPAWN:         { value: 360000001, note: "mob materialize effect", spec: "Docs/RE/specs/effects.md" }
  SPAWN_SFX_ID:                { value: 862010105, note: "world-entry spawn SFX", spec: "Docs/RE/specs/client_runtime.md" }
  ENTRY_BGM_CUE_ID:            { value: 910066000, note: "world-entry BGM cue (the only 'fade-in' — no screen-space fade exists)", spec: "Docs/RE/specs/client_runtime.md" }
  INDOOR_BGM_OVERRIDE_ID:      { value: 863500002, note: "BGM forced while the local player indoor flag is set", spec: "Docs/RE/specs/sound.md" }
  UI_CLICK_SFX_ID:             { value: 861010101, note: "standard button click SFX", spec: "Docs/RE/specs/frontend_scenes.md" }
  CHARSELECT_ACTION_IDS:       { value: "create=4/delete=5/enter=6", note: "corrected from the earlier 413/531 misread (those were atlas src-X values)", spec: "Docs/RE/specs/ui_system.md" }

# Opcodes are the (major:minor) wire tuple. The key is the catalog encoding major<<16|minor
# (see Docs/RE/opcodes.md); `tuple` repeats the human-readable major:minor. Direction is
# from the client's point of view.
