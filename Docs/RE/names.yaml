  Chat:          { note: "chat subsystem: ALL everyday channels send via C2S 2/7 with first payload byte = channel code (say/party/guild/shout/alliance/whisper); 1000-line 36B ring log, per-channel colour+filter, overhead bubbles on the Actor struct (5000ms); S2C 5/7 broadcast", spec: "Docs/RE/specs/chat.md" }
