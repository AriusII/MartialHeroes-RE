crypto:
  # Keyed by canonical ROLE name (not address); see Docs/RE/specs/crypto.md.
  WireCipher:      { note: "keyless/stateless message-tier payload byte cipher (outbound)", spec: "Docs/RE/specs/crypto.md" }
  WireCompression: { note: "LZ4 payload compression applied after the wire cipher (outbound)", spec: "Docs/RE/specs/crypto.md" }
  SecureHandshake: { note: "opcode 0/0 bignum public-key session handshake; reply as Auth 1/4; NOT Windows CryptoAPI", spec: "Docs/RE/specs/crypto.md" }
  ConfigCryptoApi: { note: "ADVAPI32 anti-cheat + signed/encrypted config-file loader; OUT OF SCOPE for Network.Crypto", spec: "Docs/RE/specs/crypto.md" }

client_mechanics:
  # Non-network client subsystems recovered in the client-mechanics RE wave.
  # Keyed by canonical ROLE name (not address); see the referenced specs.
  Terrain:        { note: "cell-streamed terrain; .map/.ted/.mud/.sod/.lst per cell; 1024x1024 wu cells, quality rings", spec: "Docs/RE/formats/terrain.md" }
  Animation:      { note: ".mot skeletal clips, 28-byte keyframes (f32[3] translation + f32[4] quat XYZW), 10 fps fixed", spec: "Docs/RE/formats/animation.md" }
  AnimationMixer: { note: "layered action/cycle mixer; normalized weighted-average blend per bone; no additive/priority", spec: "Docs/RE/formats/animation.md" }
  ConfigTables:   { note: "client-side .scr catalogues in VFS data/script (exp/userlevel/userpoint/users/items/skills/mobs)", spec: "Docs/RE/formats/config_tables.md" }
  SoundTables:    { note: "per-map .wlk/.run/.bgm/.bge/.eff 256x48B tables; .xeff = separate visual-effects format", spec: "Docs/RE/formats/sound_tables.md" }
  GameLoop:       { note: "Win32 message-pump -> render -> tick; subscriber-interval scheduler; timeGetTime ms clock", spec: "Docs/RE/specs/game_loop.md" }
  InputUi:        { note: "WndProc dispatch (IME-first); 20-byte mouse event; UI->world responsibility chain; widget tree", spec: "Docs/RE/specs/input_ui.md" }
  LuaScripting:   { note: "embedded Lua 5.1.2 + lua_tinker; minimal native surface (cpp_load); .lua plaintext in data/script", spec: "Docs/RE/specs/lua_scripting.md" }
  Skinning:       { note: "CPU linear-blend skinning; parent-relative .bnd bind, inverse-bind BAKED at load (pure quaternion math, no 4x4 matrices); major/minor weight accumulation; child bones rotate-only", spec: "Docs/RE/specs/skinning.md" }
  UiSystem:       { note: "retained-mode widget toolkit (component/panel/window/button/textbox/3D-canvas); HARDCODED screen layouts on a 1024x768 canvas; msg.xdb string catalogue; HANGUL system fonts via D3DX", spec: "Docs/RE/specs/ui_system.md" }
  Environment:    { note: "per-area sky/light/fog/water assembled from the %d.bin family; 48-keyframe day/night cycle @1800ms (86.4s day); water = enable flag + Y plane (renderer unrecovered)", spec: "Docs/RE/specs/environment.md" }
  SceneLifecycle: { note: "9-state master scene machine (init/login/load/opening/select/in-game/quit/error/exit); full state-x-trigger transition table recovered; in-game returns to select; enter-world spawn = server X/Z with Y forced 0 then 3x3 terrain ring streams", spec: "Docs/RE/specs/client_runtime.md" }
  ClientWorkflow: { note: "MASTER end-to-end workflow synthesis: boot -> login -> server-select -> load -> [opening] -> char-select -> world; scene chapters + module chapters + interconnection matrix", spec: "Docs/RE/specs/client_workflow.md" }
  FrontendScenes: { note: "login/server-select/char-select flows: action-id dispatch, sub-states 2..41, msg.xdb dialog ids, 880B spawn descriptors, create/delete/rename sends, enter-world cache", spec: "Docs/RE/specs/frontend_scenes.md" }
  Effects:        { note: "XEffect runtime family (timed/bone-socket/world-space + particle + sword-light managers); 8 boot manifests; lazy first-spawn parse; hard-coded trigger effect ids", spec: "Docs/RE/specs/effects.md" }
  Sound:          { note: "DirectSound + statically linked Ogg Vorbis 1.3.2; 3D=mono/2D=stereo rule; 1 MiB BGM streaming ring; terrain-driven ambient; footstep ids from actor-visual fields (NOT mud cells)", spec: "Docs/RE/specs/sound.md" }
  ResourcePipeline: { note: "single VFS open chokepoint (binary search, fresh copy per open, NO file cache); per-subsystem lazy caches without eviction; boot bulk-loader thread; 3x3 sync ring + streamer thread", spec: "Docs/RE/specs/resource_pipeline.md" }
  RuntimeSingletons: { note: "19 Meyers singletons (sizes + key field offsets) + module map; engine brand 'Diamond', MSVC 2005, Lua 5.1.2, static LZ4/Vorbis, XTrap anti-cheat presence", spec: "Docs/RE/structs/runtime_singletons.md" }

gameplay_systems:
  # Gameplay/engine logic subsystems recovered in the gameplay-logic RE wave.
  # Keyed by canonical ROLE name; see the referenced specs. Damage resolution is server-authoritative;
  # the client computes a derived combat-stat model whose coefficients are documented in combat.md.
  Combat:        { note: "derived combat-stat model (server-authoritative HP deltas); attack/secondary bases, PvE/PvP rates, hit penalty tiers", spec: "Docs/RE/specs/combat.md" }
  StatEquip:     { note: "lazy per-stat aggregation: server-base + buff(kind) + all-stat(93) + equip-sum + set bonus", spec: "Docs/RE/specs/combat.md" }
  Skills:        { note: "skill cast pipeline + effect dispatch + buff/debuff model", spec: "Docs/RE/specs/skills.md" }
  InventoryTrade: { note: "inventory grid, equip rules, trade state machine, shop, enchant (+N)", spec: "Docs/RE/specs/inventory_trade.md" }
  CameraMovement: { note: "five view modes + camera clamps; click-to-move; .sod/.ted collision", spec: "Docs/RE/specs/camera_movement.md" }
  Handlers:      { note: "behavior catalogue for opcode handlers beyond opcodes.md", spec: "Docs/RE/specs/handlers.md" }
  LoginFlow:     { note: "login -> char-select -> enter-game; lobby/online server boundary", spec: "Docs/RE/specs/login_flow.md" }
  Social:        { note: "chat channels, whisper, party, guild, friend/block", spec: "Docs/RE/specs/social.md" }
  Quests:        { note: "quest accept/progress/complete, NPC dialog, Lua/npc.arr linkage, rewards", spec: "Docs/RE/specs/quests.md" }
  # --- World-Scene systems promoted in Cycle 3 W2 ---
  WorldSystems:  { note: "MASTER index of the World-Scene gameplay systems (combat/chat/NPC/quest/party/trade/minimap/progression/equip/effects); per-system summary + opcode tables + data files + see-also links", spec: "Docs/RE/specs/world_systems.md" }
  Chat:          { note: "chat subsystem: ALL everyday channels send via C2S 2/7 with first payload byte = channel code (say/party/guild/shout/alliance/whisper); 1000-line 36B ring log, per-channel colour+filter, overhead bubbles on the Actor struct (5000ms); S2C 5/7 broadcast", spec: "Docs/RE/specs/chat.md" }
  NpcInteraction: { note: "NPC click router (~30 KIND -> 117 panel slots): merchant/storage/repair/quest/gather; shop catalog in npc.scr+128; storage 2/142, sell 2/20, repair 2/113, shop 2/115, interact 2/19 (no teleport opcode)", spec: "Docs/RE/specs/npc_interaction.md" }
  Minimap:       { note: "HUD radar + full-screen world map; dot transform px=relX*0.125+66.5, py=relZ*0.125+66.5 (1:8, 133x133); radar streams data/effect/map/d*x*z*.bmp; world map data/ui/map/map%d.dds; mapsetting.scr 52x84B zones; regiontableNNN.bin 52x32B", spec: "Docs/RE/specs/minimap.md" }
  Progression:   { note: "exp/level/rank/stat-alloc/skill-points: S2C 5/9 ExpGain (64-bit xp), 5/11 RankXp, 5/32 LevelUp (evo panels lvl 12/24), 5/67 StatsUpdate, 4/150 SkillPoint; C2S 2/29 StatAllocate (five absolute u32 STR/INT/AGI/DEX/CON)", spec: "Docs/RE/specs/progression.md" }
  EquipmentVisuals: { note: "avatar = per-part mesh recomposition (head/face/hair/body/weapon) under one skeleton @Visual+1300; part table @Visual+204 (16B); weapon -> hand bone; weapon glow tier from item_actor+231 (1..9)", spec: "Docs/RE/specs/equipment_visuals.md" }
  BuffState:     { note: "30-slot HUD buff bar, fully server-driven by S2C 4/102 (476B, 30x12B records @payload+116); icon (srcX,srcY) from data/script/buff_icon_position.xdb (12B {u32 buffId,i32 srcX,i32 srcY}) on shared atlas data/ui/skillicon/stateicon.dds; 23x23 buff (id<=80) / 25x25 state (id>80)", spec: "Docs/RE/formats/misc_data.md" }

