  MINIMAP_DOT_SCALE:       { value: "0.125", note: "world->radar: px = relX*0.125 + 66.5, py = relZ*0.125 + 66.5 (1:8, player centred in a 133x133 body); BYTE-VERIFIED", spec: "Docs/RE/specs/minimap.md" }
