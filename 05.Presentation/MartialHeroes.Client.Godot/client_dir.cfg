# Configuration du chemin vers le client Martial Heroes original.
#
# EMPLACEMENT NATIF (recommandé) : dépose data.inf + data/data.vfs dans le dossier
# clientdata/ du projet Godot (voir clientdata/README.md) — gitignoré, jamais commité :
#   <projet>/clientdata/data.inf          — index VFS
#   <projet>/clientdata/data/data.vfs     — archive VFS
#
# Une valeur RELATIVE ci-dessous est résolue contre la racine du projet (res://).
# Une valeur ABSOLUE (ex: D:\MartialHeroesClient) pointe vers une installation externe.
# Si le répertoire est invalide ou absent, le jeu démarre en mode synthétique.

# Flux de démarrage : login | world. Défaut = login.
#   login = écrans menu (login → sélection de personnage) puis monde — flux légataire (spec §6.2).
#   world = boot direct dans le monde (comportement historique, identique à aujourd'hui).
# spec: Docs/RE/specs/ui_system.md §6.2 (machine d'états 1→4→5), §8.5 (flux de scènes).
boot_flow=login

# Chemin vers le client Martial Heroes original (relatif = res://, absolu = externe).
client_dir=clientdata

# Mettre false pour forcer la scène synthétique même si le client est détecté.
# Par défaut (true) : le rendu réel s'active automatiquement dès que le client est trouvé.
real_assets=true

# Identifiant de l'area (map) à charger au démarrage.
# 0 = map000 (1 cellule dans le VFS de test), 1 = map001 (144 cellules), etc.
# Si l'area demandée n'a aucune cellule .ted, le renderer auto-sélectionne la première area disponible.
area=2

# Rayon de streaming du terrain (Chebyshev). Valeurs valides : 1 ou 2.
#   1 = bague 3×3  (9 secteurs  — qualité Medium/Low)
#   2 = bague 5×5  (25 secteurs — qualité High, défaut)
# spec: Docs/RE/formats/terrain.md §12.2 — High quality → ring-radius cells = 5 (radius 2). CONFIRMED.
ring_radius=2
