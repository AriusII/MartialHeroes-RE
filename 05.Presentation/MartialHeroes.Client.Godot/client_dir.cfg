# Configuration du chemin vers le client Martial Heroes original.
# Edite ce fichier pour pointer vers ton installation locale — aucune variable d'environnement requise.
#
# Le répertoire doit contenir :
#   <client_dir>/data.inf          — index VFS
#   <client_dir>/data/data.vfs     — archive VFS
#
# Si le répertoire est invalide ou absent, le jeu démarre en mode synthétique (scène générée).

# Chemin vers ton client Martial Heroes original.
# Modifie la valeur ci-dessous selon ton installation.
client_dir=D:\MartialHeroesClient

# Mettre false pour forcer la scène synthétique même si le client est détecté.
# Par défaut (true) : le rendu réel s'active automatiquement dès que le client est trouvé.
real_assets=true
